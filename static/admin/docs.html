<!-- 문서 목록 탭 -->
<section class="space-y-4">
    <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
            <h2 class="text-2xl font-extrabold text-slate-800">Data Tables</h2>
            <p class="text-sm text-slate-500">색인 문서 목록을 조회하고 필요 시 즉시 삭제합니다.</p>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="loadDocs()" class="btn-primary px-3 py-2 text-sm">새로고침</button>
            <span id="docTotal" class="text-sm font-bold text-slate-500"></span>
        </div>
    </div>

    <div class="rounded-xl border border-slate-200 bg-white p-4">
        <h3 class="mb-3 text-xl font-bold text-slate-800">Bootstrap Data Table</h3>
        <div class="mb-3 flex flex-wrap gap-2 text-sm text-slate-500">
            <span>Search:</span>
            <input type="text" class="w-56" placeholder="Search..." disabled />
        </div>

        <div class="overflow-auto rounded-lg border border-slate-200">
            <table class="text-sm">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>제목</th>
                        <th>파일명</th>
                        <th>확장자</th>
                        <th>카테고리</th>
                        <th>등록일시</th>
                        <th>미리보기</th>
                        <th>삭제</th>
                    </tr>
                </thead>
                <tbody id="docsBody"></tbody>
            </table>
        </div>
    </div>
</section>

<script>
async function loadDocs() {
    const result = await apiFetch(`${API}/indexed-documents?skip=0&limit=200`, { method: "GET" });
    const data = result.data;
    const items = data.items || [];
    document.getElementById("docTotal").textContent = `총 ${data.total || 0}건`;
    const body = document.getElementById("docsBody");
    body.innerHTML = items.map((row) =>
        `<tr class="border-t border-gray-700">
            <td class="p-2">${fmt(row.id)}</td>
            <td class="p-2">${fmt(row.title)}</td>
            <td class="p-2">${fmt(row.origin_file)}</td>
            <td class="p-2">${fmt(row.file_ext)}</td>
            <td class="p-2">${fmt(row.doc_category)}</td>
            <td class="p-2">${fmt(row.indexed_at)}</td>
            <td class="p-2 max-w-xs truncate text-slate-500">${fmt(row.text_preview)}</td>
            <td class="p-2">${loggedInRole === "viewer" ? '<span class="text-gray-600 opacity-40">삭제</span>' : '<span class="btn-del" onclick="deleteDoc(' + row.id + ')">삭제</span>'}</td>
        </tr>`
    ).join("") || '<tr><td class="p-2" colspan="8">데이터 없음</td></tr>';
}

async function deleteDoc(docId) {
    if (!confirm(`문서 ID ${docId}를 삭제하시겠습니까?`)) return;
    const headers = {};
    if (accessToken) headers["Authorization"] = `Bearer ${accessToken}`;
    try {
        const res = await fetch(`${FILE_API}/document/${docId}`, { method: "DELETE", headers });
        const data = await res.json();
        alert(data.message || "삭제 완료");
        loadDocs();
    } catch (e) {
        alert("삭제 실패: 네트워크 오류");
    }
}
</script>
