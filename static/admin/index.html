<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CleverSearch Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #eceff3;
            --panel: #ffffff;
            --line: #d9dee6;
            --text: #202938;
            --muted: #6c778b;
            --primary: #5b5ce2;
            --primary-weak: #eeecff;
            --danger: #ef4444;
            --success: #12a874;
            --warning: #f4b400;
            --info: #06b6d4;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow: 0 10px 24px rgba(30, 41, 59, 0.06);
        }

        * {
            font-family: "Nunito", sans-serif;
        }

        body {
            margin: 0;
            background: linear-gradient(180deg, #f7f8fc 0%, var(--bg) 100%);
            color: var(--text);
        }

        .admin-shell {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 232px 1fr;
        }

        .side {
            background: #f6f8fc;
            border-right: 1px solid var(--line);
            padding: 18px 14px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
            padding: 4px 8px;
        }

        .brand-mark {
            width: 44px;
            height: 44px;
            object-fit: contain;
            filter: drop-shadow(0 4px 10px rgba(30, 41, 59, 0.18));
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 64px;
            padding: 8px 22px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
        }

        .topbar-title {
            flex: 1;
            min-width: 0;
            font-size: 16px;
            font-weight: 700;
            color: #334155;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 12px;
        }

        .topbar-actions {
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            flex-shrink: 0;
            margin-left: auto;
        }

        .user-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
            border: 1px solid #d7e3fb;
            border-radius: 999px;
            padding: 4px 10px 4px 6px;
            color: #334155;
            box-shadow: 0 6px 12px rgba(59, 130, 246, 0.08);
            min-width: 0;
        }

        .user-chip-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 999px;
            background: #dbeafe;
            color: #1e40af;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .user-chip-name {
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .top-action {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            border: 1px solid #d8dfeb;
            background: linear-gradient(180deg, #ffffff 0%, #f4f7fc 100%);
            color: #334155;
            box-shadow: 0 6px 12px rgba(51, 65, 85, 0.08);
            padding: 6px 11px;
            font-size: 12px;
            font-weight: 700;
            line-height: 1;
            text-decoration: none;
        }

        .top-action:hover {
            background: linear-gradient(180deg, #ffffff 0%, #eaf0fb 100%);
            border-color: #cbd5e1;
            color: #1f2937;
        }

        .top-action.search-link {
            border-color: #cfe0ff;
            color: #1e40af;
            background: linear-gradient(180deg, #f7faff 0%, #e8f0ff 100%);
        }

        .top-action.logout-btn {
            border-color: #ffd6df;
            color: #9f1239;
            background: linear-gradient(180deg, #fff7f9 0%, #ffedf2 100%);
        }

        .top-action-label {
            white-space: nowrap;
        }

        .content-wrap {
            padding: 18px 20px 26px;
        }

        #tabContent {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 18px;
            min-height: calc(100vh - 130px);
        }

        #tabMenu {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #tabMenu .menu-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 4px;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        #tabMenu .menu-section:hover,
        #tabMenu .menu-section:focus-within {
            background: #f8faff;
            border-color: #dbe4ff;
        }

        #tabMenu .menu-title {
            margin: 0;
            padding: 6px 8px;
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            letter-spacing: 0.02em;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 9px;
            transition: color 0.2s ease;
        }

        #tabMenu .menu-items {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            pointer-events: none;
            transform: translateY(-3px);
            transition: max-height 0.2s ease, opacity 0.16s ease, transform 0.2s ease;
        }

        #tabMenu .menu-section:hover .menu-title,
        #tabMenu .menu-section:focus-within .menu-title,
        #tabMenu .menu-section.section-active .menu-title {
            color: #1e293b;
        }

        #tabMenu .menu-section.section-active {
            background: #eef4ff;
            border-color: #bfd1ff;
        }

        #tabMenu .menu-section.section-active .menu-title {
            background: #e1ebff;
            color: #334155;
        }

        #tabMenu .menu-section:hover .menu-items,
        #tabMenu .menu-section:focus-within .menu-items,
        #tabMenu .menu-section.section-active .menu-items {
            max-height: 520px;
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        #tabMenu .tab {
            width: 100%;
            border: 1px solid transparent;
            border-radius: 11px;
            text-align: left;
            padding: 10px 12px;
            color: #334155;
            background: transparent;
            font-weight: 600;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        #tabMenu .tab:hover {
            border-color: #cbd5e1;
            background: #e9eef7;
            color: #1e293b;
        }

        #tabMenu .tab.active {
            background: #edf2ff;
            color: #334155;
            border-color: #c6d3fb;
            box-shadow: none;
        }

        #tabMenu .tab:focus-visible {
            outline: 3px solid #2563eb;
            outline-offset: 2px;
        }

        button,
        .btn,
        .admin-btn {
            border-radius: 999px;
            border: 1px solid #d8dfeb;
            font-weight: 700;
            transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease, background 0.2s ease;
        }

        button:hover,
        .btn:hover,
        .admin-btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(180deg, #f8fbff 0%, #e8f0ff 100%);
            color: #1e40af;
            border-color: #cfe0ff;
            box-shadow: 0 6px 12px rgba(59, 130, 246, 0.12);
        }

        .btn-secondary {
            background: linear-gradient(180deg, #ffffff 0%, #f4f7fc 100%);
            color: #334155;
            border-color: #d8dfeb;
            box-shadow: 0 6px 12px rgba(51, 65, 85, 0.1);
        }

        .btn-success {
            background: linear-gradient(180deg, #f3fff9 0%, #e3f8ef 100%);
            color: #0f766e;
            border-color: #bfe9d6;
            box-shadow: 0 6px 12px rgba(16, 185, 129, 0.1);
        }

        .btn-danger-solid {
            background: linear-gradient(180deg, #fff7f9 0%, #ffedf2 100%);
            color: #9f1239;
            border-color: #ffd6df;
            box-shadow: 0 6px 12px rgba(244, 63, 94, 0.1);
        }

        .btn-warning {
            background: linear-gradient(180deg, #fffdf5 0%, #fff5d8 100%);
            color: #92400e;
            border-color: #fde5a7;
            box-shadow: 0 6px 12px rgba(245, 158, 11, 0.1);
        }

        .btn-info {
            background: linear-gradient(180deg, #f4fbff 0%, #e7f5ff 100%);
            color: #0c4a6e;
            border-color: #cbe8fb;
            box-shadow: 0 6px 12px rgba(14, 165, 233, 0.1);
        }

        .btn-unified {
            border-radius: 999px !important;
            padding: 7px 13px !important;
            font-weight: 700 !important;
            border: 1px solid #d6dfec !important;
            line-height: 1.2 !important;
            box-shadow: 0 6px 12px rgba(51, 65, 85, 0.08);
        }

        .btn-icon {
            margin-right: 6px;
            line-height: 1;
        }

        .btn-soft {
            background: linear-gradient(180deg, #ffffff 0%, #f3f6fb 100%);
            color: #334155;
            border: 1px solid #d6deeb;
        }

        .btn-danger {
            background: #ffe9eb;
            color: #c4283c;
            border: 1px solid #ffcdd4;
        }

        .btn-top {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #f4f6fb;
            color: #384256;
            border: 1px solid #d8dfeb;
            box-shadow: 0 6px 14px rgba(74, 88, 113, 0.1);
        }

        .btn-top:hover {
            background: #e9eef8;
            color: #273247;
        }

        .pill {
            border: 1px solid #dbe1ea;
            border-radius: 999px;
            padding: 4px 10px;
            background: #fff;
            color: #667084;
            font-size: 12px;
            font-weight: 700;
            max-width: 140px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .metric {
            background: #fff;
            border: 1px solid #dbe1ea;
            border-radius: 12px;
            padding: 12px;
        }

        .metric-label {
            color: #6f7991;
            font-size: 12px;
            font-weight: 700;
        }

        .metric-value {
            color: #0f172a;
            font-size: 20px;
            font-weight: 800;
            line-height: 1.15;
            margin-top: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table thead th {
            background: #f5f7fb;
            color: #4a5568;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            white-space: nowrap;
            border-bottom: 1px solid #dbe1ea;
        }

        table th,
        table td {
            border-bottom: 1px solid #edf1f6;
            padding: 10px 12px;
            text-align: left;
            white-space: nowrap;
        }

        input,
        select,
        textarea {
            background: #fff;
            color: #334155;
            border: 1px solid #d7dee9;
            border-radius: 10px;
            padding: 8px 10px;
            outline: none;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #a5b4fc;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.14);
        }

        .drop-zone {
            border: 2px dashed #c4cfde;
            border-radius: 14px;
            padding: 36px 18px;
            text-align: center;
            background: #fbfcff;
            transition: all 0.2s;
        }

        .drop-zone.dragover {
            border-color: #8587ff;
            background: #f2f1ff;
        }

        .badge {
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            border: 1px solid transparent;
        }

        .badge.info { background: #eaf4ff; color: #2469da; border-color: #cfe4ff; }
        .badge.warning { background: #fff5d8; color: #946200; border-color: #ffe6a2; }
        .badge.critical { background: #ffe8ed; color: #bf2942; border-color: #ffcfd8; }

        .btn-del {
            cursor: pointer;
            color: #e53935;
            font-weight: 800;
        }

        .btn-del:hover {
            color: #c62828;
            text-decoration: underline;
        }

        /*
         * Tab fragments still contain old dark classes.
         * Normalize them into light UI colors so text and controls stay readable.
         */
        #tabContent {
            color: #253041;
        }

        #tabContent .bg-gray-900,
        #tabContent .bg-gray-800,
        #tabContent .bg-gray-700,
        #tabContent .bg-gray-600 {
            background: #ffffff !important;
            color: #243045 !important;
            border-color: #dce3ef !important;
        }

        #tabContent .border-gray-900,
        #tabContent .border-gray-800,
        #tabContent .border-gray-700,
        #tabContent .border-gray-600 {
            border-color: #dce3ef !important;
        }

        #tabContent .text-gray-100,
        #tabContent .text-gray-200,
        #tabContent .text-gray-300,
        #tabContent .text-gray-400,
        #tabContent .text-gray-500,
        #tabContent .text-gray-600,
        #tabContent .text-red-200,
        #tabContent .text-red-300,
        #tabContent .text-red-400,
        #tabContent .text-indigo-200,
        #tabContent .text-indigo-300,
        #tabContent .text-indigo-400,
        #tabContent .text-blue-200,
        #tabContent .text-blue-300,
        #tabContent .text-blue-400 {
            color: #5c6b82 !important;
        }

        #tabContent .text-white {
            color: #ffffff !important;
        }

        #tabContent .bg-blue-900\/30,
        #tabContent .bg-blue-900,
        #tabContent .bg-red-900\/30,
        #tabContent .bg-red-900,
        #tabContent .bg-indigo-900,
        #tabContent .bg-indigo-800,
        #tabContent .bg-yellow-900\/30 {
            background: #eef3ff !important;
            color: #3a4963 !important;
            border-color: #ccd8f5 !important;
        }

        #tabContent .bg-blue-600,
        #tabContent .bg-blue-500,
        #tabContent .hover\:bg-blue-500:hover,
        #tabContent .hover\:bg-blue-600:hover,
        #tabContent .bg-indigo-600,
        #tabContent .bg-indigo-500,
        #tabContent .hover\:bg-indigo-500:hover,
        #tabContent .hover\:bg-indigo-600:hover,
        #tabContent .bg-purple-600 {
            background: linear-gradient(180deg, #f8fbff 0%, #e8f0ff 100%) !important;
            color: #1e40af !important;
            border: 1px solid #cfe0ff !important;
            box-shadow: 0 6px 12px rgba(59, 130, 246, 0.12) !important;
        }

        #tabContent .bg-green-600,
        #tabContent .bg-green-500,
        #tabContent .hover\:bg-green-500:hover,
        #tabContent .hover\:bg-green-600:hover {
            background: linear-gradient(180deg, #f3fff9 0%, #e3f8ef 100%) !important;
            color: #0f766e !important;
            border: 1px solid #bfe9d6 !important;
            box-shadow: 0 6px 12px rgba(16, 185, 129, 0.1) !important;
        }

        #tabContent .bg-red-600,
        #tabContent .bg-red-500,
        #tabContent .bg-red-700,
        #tabContent .bg-red-800,
        #tabContent .bg-red-900,
        #tabContent .hover\:bg-red-500:hover,
        #tabContent .hover\:bg-red-600:hover,
        #tabContent .hover\:bg-red-700:hover,
        #tabContent .hover\:bg-red-800:hover,
        #tabContent .hover\:bg-red-900:hover {
            background: linear-gradient(180deg, #fff7f9 0%, #ffedf2 100%) !important;
            color: #9f1239 !important;
            border: 1px solid #ffd6df !important;
            box-shadow: 0 6px 12px rgba(244, 63, 94, 0.1) !important;
        }

        #tabContent .bg-yellow-500,
        #tabContent .bg-yellow-600,
        #tabContent .hover\:bg-yellow-500:hover,
        #tabContent .hover\:bg-yellow-600:hover {
            background: linear-gradient(180deg, #fffdf5 0%, #fff5d8 100%) !important;
            color: #92400e !important;
            border: 1px solid #fde5a7 !important;
            box-shadow: 0 6px 12px rgba(245, 158, 11, 0.1) !important;
        }

        #tabContent .bg-gray-700,
        #tabContent .bg-gray-600,
        #tabContent .hover\:bg-gray-600:hover,
        #tabContent .hover\:bg-gray-700:hover {
            background: linear-gradient(180deg, #ffffff 0%, #f4f7fc 100%) !important;
            color: #334155 !important;
            border: 1px solid #d8dfeb !important;
            box-shadow: 0 6px 12px rgba(51, 65, 85, 0.1) !important;
        }

        #tabContent button,
        #tabContent .admin-write,
        #tabContent a[class*="bg-"] {
            font-weight: 800;
        }

        #tabContent pre {
            background: #f7f9fd !important;
            color: #41516b !important;
            border-color: #dce3ef !important;
        }

        #tabContent [class*="rounded-lg"],
        #tabContent [class*="rounded-xl"] {
            border-radius: 12px !important;
        }

        @media (max-width: 1100px) {
            .admin-shell {
                grid-template-columns: 1fr;
            }

            .side {
                border-right: 0;
                border-bottom: 1px solid var(--line);
                padding: 12px 12px 10px;
            }

            #tabMenu {
                display: flex;
                flex-direction: column;
                gap: 8px;
                width: 100%;
            }

            #tabMenu .menu-items {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 8px;
                max-height: none;
                opacity: 1;
                overflow: visible;
                pointer-events: auto;
                transform: none;
            }

            .topbar {
                position: static;
                align-items: flex-start;
            }

            #tabContent {
                min-height: 50vh;
            }
        }

        @media (max-width: 768px) {
            .topbar {
                padding: 8px 10px;
                gap: 8px;
            }

            .topbar-title {
                font-size: 12px;
                padding-right: 6px;
            }

            .topbar-actions {
                gap: 6px;
            }

            .user-chip {
                padding: 3px 8px 3px 5px;
                gap: 6px;
            }

            .user-chip-icon {
                width: 20px;
                height: 20px;
                font-size: 11px;
            }

            .user-chip-name {
                font-size: 11px;
                max-width: 72px;
            }

            .top-action {
                gap: 4px;
                padding: 5px 8px;
                font-size: 11px;
            }

            .side {
                padding: 10px 10px 8px;
            }

            .brand {
                margin-bottom: 10px;
                padding: 2px 4px;
            }

            #tabMenu .menu-section {
                padding: 4px;
            }

            #tabMenu .menu-items {
                grid-template-columns: 1fr;
                gap: 6px;
            }

            #tabMenu .tab {
                padding: 9px 10px;
                font-size: 13px;
            }

            .content-wrap {
                padding: 10px;
            }

            #tabContent {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-shell">
        <aside class="side">
    <link rel="icon" type="image/png" href="/static/clever-cloud.png" />
            <div class="brand">
                <img class="brand-mark" src="/static/clever-cloud.png" alt="CleverSearch logo" loading="eager" />
                <div>
                    <div class="text-base font-extrabold text-slate-800">CleverSearch</div>
                    <div class="text-xs text-slate-500">Administrator</div>
                </div>
            </div>
            <div id="tabMenuContainer"></div>
        </aside>

        <div>
            <header class="topbar">
                <div id="currentPath" class="topbar-title">🏠 홈</div>
                <div class="topbar-actions">
                    <span class="user-chip" aria-label="현재 사용자">
                        <span class="user-chip-icon" aria-hidden="true">👤</span>
                        <span class="user-chip-name" id="loggedInUser">admin</span>
                    </span>
                    <a href="/" class="top-action search-link" aria-label="검색 페이지로 이동">
                        <span aria-hidden="true">🔎</span>
                        <span class="top-action-label">검색 페이지</span>
                    </a>
                    <button id="logoutBtn" type="button" class="top-action logout-btn" aria-label="로그아웃">
                        <span aria-hidden="true">↪</span>
                        <span class="top-action-label">로그아웃</span>
                    </button>
                </div>
            </header>

            <main class="content-wrap">
                <div id="tabContent"></div>
            </main>
        </div>
    </div>

    <script>
        const _ORIGIN = window.location.origin;
        const API = `${_ORIGIN}/api/v1/admin`;
        const FILE_API = `${_ORIGIN}/api/v1/user/file`;
        const SYS_API = `${_ORIGIN}/api/v1/admin/system`;
        const AUTH_API = `${_ORIGIN}/api/v1/common/auth`;

        let accessToken = localStorage.getItem("cleversearch_admin_token") || "";
        let refreshToken = localStorage.getItem("cleversearch_admin_refresh_token") || "";
        let loggedInUsername = localStorage.getItem("cleversearch_admin_username") || "";
        let loggedInRole = localStorage.getItem("cleversearch_admin_role") || "viewer";

        const TAB_NAMES = [
            "dashboard", "docs", "upload", "popular", "logs", "recent", "failed",
            "dictionary", "smb", "dbsources", "scheduler", "ssl", "scoring", "reset"
        ];

        const tabInitMap = {
            dashboard: () => { if (typeof loadDashboard === "function") loadDashboard(); },
            docs: () => { if (typeof loadDocs === "function") loadDocs(); },
            upload: () => { if (typeof setupUpload === "function") setupUpload(); },
            popular: () => { if (typeof loadPopular === "function") loadPopular(); },
            logs: () => { if (typeof loadLogs === "function") loadLogs(); },
            recent: () => { if (typeof loadRecent === "function") loadRecent(); },
            failed: () => { if (typeof loadFailed === "function") loadFailed(); },
            dictionary: () => { if (typeof loadDictionaryEntries === "function") loadDictionaryEntries(); },
            smb: () => { if (typeof loadSmbSources === "function") loadSmbSources(); },
            dbsources: () => { if (typeof loadDbSources === "function") loadDbSources(); },
            scheduler: () => { if (typeof loadSchedulerStatus === "function") loadSchedulerStatus(); },
            ssl: () => { if (typeof scanCertificates === "function") scanCertificates(); },
            scoring: () => { if (typeof loadScoringWeights === "function") loadScoringWeights(); },
            reset: null
        };

        let activeTab = "dashboard";

        function resolveInitialTab() {
            const forceDashboard = localStorage.getItem("cleversearch_admin_force_dashboard_once") === "1";
            if (forceDashboard) {
                localStorage.removeItem("cleversearch_admin_force_dashboard_once");
                return "dashboard";
            }

            const fromHash = (window.location.hash || "").replace(/^#/, "").trim();
            if (TAB_NAMES.includes(fromHash)) return fromHash;

            const fromStorage = localStorage.getItem("cleversearch_admin_active_tab") || "";
            if (TAB_NAMES.includes(fromStorage)) return fromStorage;

            return "dashboard";
        }

        function persistActiveTab(tabName) {
            if (!TAB_NAMES.includes(tabName)) return;
            localStorage.setItem("cleversearch_admin_active_tab", tabName);
            if (window.location.hash !== `#${tabName}`) {
                window.history.replaceState(null, "", `#${tabName}`);
            }
        }

        function forceLoginRedirect() {
            window.location.replace("/static/admin/login.html");
        }

        async function logoutJwt() {
            try {
                if (accessToken) {
                    await fetch(`${AUTH_API}/logout`, {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${accessToken}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ refresh_token: refreshToken || null })
                    });
                }
            } catch (e) {
                // network error on logout is non-fatal for local session cleanup
            }

            accessToken = "";
            refreshToken = "";
            loggedInUsername = "";
            loggedInRole = "viewer";
            localStorage.removeItem("cleversearch_admin_token");
            localStorage.removeItem("cleversearch_admin_refresh_token");
            localStorage.removeItem("cleversearch_admin_username");
            localStorage.removeItem("cleversearch_admin_role");
            localStorage.removeItem("cleversearch_admin_active_tab");
            localStorage.removeItem("cleversearch_admin_force_dashboard_once");
            forceLoginRedirect();
        }

        async function apiFetch(url, options = {}) {
            const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
            if (accessToken) headers["Authorization"] = `Bearer ${accessToken}`;

            let slowNoticeTimer = null;
            slowNoticeTimer = setTimeout(() => {
                const msg = "요청이 지연되고 있습니다. 네트워크 또는 서버 상태를 확인해 주세요.";
                const target = document.getElementById("tabContent");
                if (target) {
                    const prev = target.querySelector("#apiSlowNotice");
                    if (!prev) {
                        const notice = document.createElement("div");
                        notice.id = "apiSlowNotice";
                        notice.className = "mb-3 rounded-lg border border-amber-300 bg-amber-50 px-3 py-2 text-sm text-amber-800";
                        notice.textContent = msg;
                        target.prepend(notice);
                    }
                }
            }, 10000);

            try {
                const res = await fetch(url, { ...options, headers });
                if (res.status === 401) {
                    await logoutJwt();
                    return { ok: false, status: 401, data: { detail: "세션 만료" } };
                }
                const data = await res.json().catch(() => ({ raw: "json parse fail" }));
                return { ok: res.ok, status: res.status, data };
            } catch (e) {
                return { ok: false, status: 0, data: { detail: "서버 연결 실패" } };
            } finally {
                if (slowNoticeTimer) clearTimeout(slowNoticeTimer);
                const notice = document.getElementById("apiSlowNotice");
                if (notice) notice.remove();
            }
        }

        function fmt(v) {
            if (v === null || v === undefined || v === "") return "-";
            return String(v)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }
        function yesNo(v) { return v ? "Y" : "N"; }

        function writeJson(id, payload) {
            const el = document.getElementById(id);
            if (el) el.textContent = JSON.stringify(payload, null, 2);
        }

        function getFlatText(el) {
            return String(el?.textContent || "").replace(/\s+/g, " ").trim();
        }

        function updateCurrentPath(tabName) {
            const pathEl = document.getElementById("currentPath");
            if (!pathEl) return;

            let activeButton = null;
            document.querySelectorAll("#tabMenuContainer .tab").forEach(btn => {
                if (btn.dataset.tab === tabName) activeButton = btn;
            });

            const home = "🏠 홈";
            if (!activeButton) {
                pathEl.textContent = home;
                pathEl.title = home;
                return;
            }

            const section = activeButton.closest(".menu-section");
            const sectionTitle = getFlatText(section?.querySelector(".menu-title"));
            const tabTitle = getFlatText(activeButton);

            const trail = [home];
            if (sectionTitle) trail.push(sectionTitle);
            if (tabTitle) trail.push(tabTitle);

            const fullPath = trail.join(" > ");
            pathEl.textContent = fullPath;
            pathEl.title = fullPath;
        }

        function applyButtonPreset(button, text) {
            button.classList.remove(
                "btn-primary", "btn-secondary", "btn-success", "btn-danger-solid", "btn-warning", "btn-info"
            );

            if (/삭제|초기화|중지|복원/.test(text)) {
                button.classList.add("btn-danger-solid");
                return;
            }
            if (/저장|적용|생성|업로드/.test(text)) {
                button.classList.add("btn-primary");
                return;
            }
            if (/실행|시작|동기화/.test(text)) {
                button.classList.add("btn-success");
                return;
            }
            if (/상태|조회|전환|토글|추천|디버그/.test(text)) {
                button.classList.add("btn-secondary");
                return;
            }
            button.classList.add("btn-soft");
        }

        function getButtonIcon(text) {
            if (/삭제|초기화|중지|복원/.test(text)) return "❌";
            if (/저장|적용|생성|업로드/.test(text)) return "🛠️";
            if (/실행|시작|동기화/.test(text)) return "🚀";
            if (/상태|조회|전환|토글|추천|디버그/.test(text)) return "📡";
            if (/수정|편집/.test(text)) return "📝";
            if (/다운로드/.test(text)) return "📥";
            return "🔹";
        }

        function decorateButtonLabel(button, text) {
            if (button.dataset.iconized === "1") return;
            const icon = getButtonIcon(text);
            const hasSymbolPrefix = /^[\u2190-\u21FF\u2600-\u27BF\uD83C-\uDBFF\uDC00-\uDFFF]/.test(text);
            if (hasSymbolPrefix) {
                button.dataset.iconized = "1";
                return;
            }

            const iconSpan = document.createElement("span");
            iconSpan.className = "btn-icon";
            iconSpan.setAttribute("aria-hidden", "true");
            iconSpan.textContent = icon;

            const labelSpan = document.createElement("span");
            labelSpan.textContent = String(button.textContent || "").trim();

            button.textContent = "";
            button.appendChild(iconSpan);
            button.appendChild(labelSpan);
            button.dataset.iconized = "1";
        }

        function normalizeTabUi(container) {
            container.querySelectorAll("button").forEach(button => {
                if (button.classList.contains("tab")) return;

                button.classList.add("btn-unified");
                const text = (button.textContent || "").replace(/\s+/g, "").trim();
                applyButtonPreset(button, text);
                decorateButtonLabel(button, text);
            });
        }

        async function loadTabHtml(tabName) {
            try {
                const tabUrl = `/static/admin/${encodeURIComponent(tabName)}.html?v=${Date.now()}`;
                const res = await fetch(tabUrl, { cache: "no-store" });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return await res.text();
            } catch (e) {
                return `<div class="text-red-600 p-4">탭 로드 실패: ${fmt(tabName)} (${fmt(e?.message || "error")})</div>`;
            }
        }

        async function switchTab(tabName) {
            if (!TAB_NAMES.includes(tabName)) {
                tabName = "dashboard";
            }
            activeTab = tabName;
            persistActiveTab(tabName);
            document.querySelectorAll("#tabMenuContainer .tab").forEach(btn => {
                const isActive = btn.dataset.tab === tabName;
                btn.classList.toggle("active", isActive);
                if (isActive) {
                    btn.setAttribute("aria-current", "page");
                } else {
                    btn.removeAttribute("aria-current");
                }
            });
            syncMenuSectionState(tabName);
            updateCurrentPath(tabName);

            const container = document.getElementById("tabContent");
            container.innerHTML = '<div class="text-slate-500 p-4">로딩 중...</div>';
            const html = await loadTabHtml(tabName);
            container.innerHTML = html;

            container.querySelectorAll("script").forEach(oldScript => {
                const newScript = document.createElement("script");
                if (oldScript.src) {
                    newScript.src = oldScript.src;
                } else {
                    newScript.textContent = oldScript.textContent;
                }
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });

            normalizeTabUi(container);

            if (loggedInRole === "viewer") {
                container.querySelectorAll(".admin-write").forEach(btn => {
                    btn.disabled = true;
                    btn.classList.add("opacity-40", "cursor-not-allowed");
                    btn.title = "viewer 권한으로는 사용할 수 없습니다";
                });
                const dz = document.getElementById("dropZone");
                if (dz) {
                    dz.style.pointerEvents = "none";
                    dz.classList.add("opacity-40");
                }
            }

            const initFn = tabInitMap[tabName];
            if (initFn) initFn();
        }

        async function loadMenu() {
            const container = document.getElementById("tabMenuContainer");
            try {
                const res = await fetch("/static/admin/menu.html");
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                container.innerHTML = await res.text();
            } catch (e) {
                const safeError = fmt(e?.message || "error");
                container.innerHTML = `<div id="tabMenu">${TAB_NAMES.map((name, i) =>
                    `<button class="tab ${i===0?"active":""}" data-tab="${name}">${name}</button>`
                ).join("")}</div><div class="text-xs text-red-500 mt-2">메뉴 로드 실패: ${safeError}</div>`;
            }

            container.querySelectorAll(".tab").forEach(btn => {
                btn.addEventListener("click", () => switchTab(btn.dataset.tab));
            });
            syncMenuSectionState(activeTab);
            updateCurrentPath(activeTab);
        }

        function syncMenuSectionState(tabName) {
            document.querySelectorAll("#tabMenuContainer .menu-section").forEach(section => {
                const hasActiveTab = Array.from(section.querySelectorAll(".tab")).some(btn => btn.dataset.tab === tabName);
                section.classList.toggle("section-active", hasActiveTab);
            });
        }

        function toggleDictView() {
            const j = document.getElementById("dictionaryOutput");
            const l = document.getElementById("dictionaryList");
            if (j) j.classList.toggle("hidden");
            if (l) l.classList.toggle("hidden");
        }

        function toggleSmbView() {
            const j = document.getElementById("smbOutput");
            const l = document.getElementById("smbList");
            if (j) j.classList.toggle("hidden");
            if (l) l.classList.toggle("hidden");
        }

        function toggleDbView() {
            const j = document.getElementById("dbOutput");
            const l = document.getElementById("dbList");
            if (j) j.classList.toggle("hidden");
            if (l) l.classList.toggle("hidden");
        }

        function toggleSchedulerView() {
            const j = document.getElementById("schedulerOutput");
            const l = document.getElementById("schedulerList");
            if (j) j.classList.toggle("hidden");
            if (l) l.classList.toggle("hidden");
        }

        function toggleSslView() {
            const j = document.getElementById("sslOutput");
            const l = document.getElementById("sslList");
            if (j) j.classList.toggle("hidden");
            if (l) l.classList.toggle("hidden");
        }

        async function initAdmin() {
            document.getElementById("loggedInUser").textContent = loggedInUsername || "admin";
            await loadMenu();
            await switchTab(resolveInitialTab());
        }

        window.addEventListener("hashchange", () => {
            const fromHash = (window.location.hash || "").replace(/^#/, "").trim();
            if (TAB_NAMES.includes(fromHash) && fromHash !== activeTab) {
                switchTab(fromHash);
            }
        });

        if (!accessToken) {
            forceLoginRedirect();
        } else {
            document.getElementById("logoutBtn")?.addEventListener("click", logoutJwt);
            initAdmin();
        }
    </script>
</body>
</html>
