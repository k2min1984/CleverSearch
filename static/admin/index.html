<!--
########################################################
# Description
# CleverSearch 관리자 페이지
# 14개 탭 기반 운영 관리 프론트엔드 (모듈화 구조)
# - 로그인 + 메뉴 + 동적 탭 로딩
# - 각 탭 HTML은 admin/ 폴더 내 개별 파일로 관리
#
# Modified History
# 강광묵 / 2026-01-20 / 최초생성
# 강광민 / 2026-03-15 / 대시보드 및 관리 탭 추가
# 강광민 / 2026-03-20 / 패널 설명/리스트뷰/RBAC 고도화
# 현승준 / 2026-03-25 / 탭별 HTML 분리 및 동적 로딩 리팩터링
########################################################
-->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleverSearch 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #111827; color: #e5e7eb; }
        .tab.active { background: #1d4ed8; color: #fff; }
        table th, table td { white-space: nowrap; }
        input, select, textarea { color: #e5e7eb; }
        .pill { border: 1px solid #374151; border-radius: 9999px; padding: 0.25rem 0.75rem; font-size: 0.75rem; }
        .metric { background: #111827; border: 1px solid #374151; border-radius: 0.75rem; padding: 0.75rem; }
        .metric-label { color: #9ca3af; font-size: 0.75rem; }
        .metric-value { font-size: 1.25rem; font-weight: 700; }
        .badge { border-radius: 9999px; padding: 0.25rem 0.75rem; font-size: 0.75rem; font-weight: 600; display: inline-flex; align-items: center; }
        .badge.info { background: #1f2937; color: #93c5fd; border: 1px solid #374151; }
        .badge.warning { background: #3f2a03; color: #fbbf24; border: 1px solid #92400e; }
        .badge.critical { background: #450a0a; color: #fca5a5; border: 1px solid #b91c1c; }
        .drop-zone { border: 2px dashed #374151; border-radius: 0.75rem; padding: 2rem; text-align: center; transition: all 0.2s; }
        .drop-zone.dragover { border-color: #3b82f6; background: rgba(59,130,246,0.1); }
        .btn-del { cursor:pointer; color:#ef4444; }
        .btn-del:hover { color:#f87171; text-decoration:underline; }
    </style>
</head>
<body class="min-h-screen">

    <!-- ===== 로그인 화면 (비인증 시 표시) ===== -->
    <div id="loginSection" class="flex items-center justify-center min-h-screen">
        <div class="bg-gray-800 border border-gray-700 rounded-xl p-8 w-full max-w-md shadow-2xl">
            <h1 class="text-2xl font-bold text-center mb-2">CleverSearch</h1>
            <p class="text-gray-400 text-center mb-6 text-sm">관리자 로그인</p>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">아이디</label>
                    <input id="loginUser" value="admin" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500" />
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">비밀번호</label>
                    <input id="loginPass" value="admin123!" type="password" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500" />
                </div>
                <div id="loginError" class="hidden text-red-400 text-sm text-center"></div>
                <button onclick="loginJwt()" class="w-full px-4 py-2 rounded bg-blue-600 hover:bg-blue-500 text-white font-medium transition">로그인</button>
            </div>
            <div class="mt-4 text-center">
                <a href="/" class="text-xs text-gray-500 hover:text-gray-300">검색 페이지로 이동</a>
            </div>
        </div>
    </div>

    <!-- ===== 메인 관리자 콘텐츠 (인증 후 표시) ===== -->
    <div id="mainContent" class="hidden">
        <div class="max-w-7xl mx-auto px-4 py-8">
            <div class="flex items-center justify-between mb-6">
                <h1 class="text-2xl font-bold">CleverSearch 관리자</h1>
                <div class="flex items-center gap-2">
                    <span class="text-sm text-gray-400" id="loggedInUser"></span>
                    <span class="pill" id="authStatus">JWT</span>
                    <button onclick="logoutJwt()" class="px-3 py-1 rounded bg-red-700 hover:bg-red-600 text-sm">로그아웃</button>
                    <a href="/" class="px-3 py-2 rounded bg-gray-700 hover:bg-gray-600 text-sm">검색 페이지</a>
                </div>
            </div>

            <!-- 탭 메뉴 (menu.html에서 동적 로드) -->
            <div id="tabMenuContainer"></div>

            <!-- 탭 콘텐츠 (*.html에서 동적 로드) -->
            <div id="tabContent"></div>

        </div>
    </div>

    <script>
        /* ===== 글로벌 상수 ===== */
        const _ORIGIN = window.location.origin;
        const API = `${_ORIGIN}/api/v1/admin`;
        const FILE_API = `${_ORIGIN}/api/v1/user/file`;
        const SYS_API = `${_ORIGIN}/api/v1/admin/system`;
        const AUTH_API = `${_ORIGIN}/api/v1/common/auth`;

        let accessToken = localStorage.getItem("cleversearch_admin_token") || "";
        let refreshToken = localStorage.getItem("cleversearch_admin_refresh_token") || "";
        let loggedInUsername = localStorage.getItem("cleversearch_admin_username") || "";
        let loggedInRole = localStorage.getItem("cleversearch_admin_role") || "viewer";
        let trendChart = null;
        let keywordChart = null;

        /* 탭 이름 목록 */
        const TAB_NAMES = [
            "upload", "docs", "popular", "logs", "recent", "failed",
            "dashboard", "dictionary", "smb", "dbsources", "scheduler",
            "ssl", "scoring", "reset"
        ];

        /* 현재 활성 탭 */
        let activeTab = "upload";

        /* 탭별 초기화 함수 (탭 로드 후 호출) */
        const tabInitMap = {
            upload: () => { setupUpload(); },
            docs: () => { loadDocs(); },
            popular: () => { loadPopular(); },
            logs: () => { loadLogs(); },
            recent: () => { loadRecent(); },
            failed: () => { loadFailed(); },
            dashboard: () => { loadDashboard(); },
            dictionary: () => { loadDictionaryEntries(); },
            smb: () => { loadSmbSources(); },
            dbsources: () => { loadDbSources(); },
            scheduler: () => { loadSchedulerStatus(); },
            ssl: () => { scanCertificates(); },
            scoring: () => { loadScoringWeights(); },
            reset: null
        };

        /* ===== 인증 상태 UI 전환 ===== */
        function showApp() {
            document.getElementById("loginSection").classList.add("hidden");
            document.getElementById("mainContent").classList.remove("hidden");
            document.getElementById("loggedInUser").textContent = loggedInUsername || "admin";
            initAdmin();
        }

        function showLogin() {
            document.getElementById("loginSection").classList.remove("hidden");
            document.getElementById("mainContent").classList.add("hidden");
        }

        /* ===== 로그인 ===== */
        async function loginJwt() {
            const username = document.getElementById("loginUser").value;
            const password = document.getElementById("loginPass").value;
            const errEl = document.getElementById("loginError");
            errEl.classList.add("hidden");
            try {
                const res = await fetch(`${AUTH_API}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const payload = await res.json();
                if (res.ok && payload.access_token) {
                    accessToken = payload.access_token;
                    refreshToken = payload.refresh_token || "";
                    loggedInUsername = payload.username || username;
                    loggedInRole = payload.role || "viewer";
                    localStorage.setItem("cleversearch_admin_token", accessToken);
                    localStorage.setItem("cleversearch_admin_refresh_token", refreshToken);
                    localStorage.setItem("cleversearch_admin_username", loggedInUsername);
                    localStorage.setItem("cleversearch_admin_role", loggedInRole);
                    location.reload();
                } else {
                    errEl.textContent = payload.detail || "로그인 실패: 아이디 또는 비밀번호를 확인하세요";
                    errEl.classList.remove("hidden");
                }
            } catch (e) {
                errEl.textContent = "서버에 연결할 수 없습니다";
                errEl.classList.remove("hidden");
            }
        }

        /* ===== 로그아웃 ===== */
        async function logoutJwt() {
            try {
                if (accessToken) {
                    await fetch(`${AUTH_API}/logout`, {
                        method: "POST",
                        headers: { "Authorization": `Bearer ${accessToken}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ refresh_token: refreshToken || null })
                    });
                }
            } catch (e) { /* ignore */ }
            accessToken = "";
            refreshToken = "";
            loggedInUsername = "";
            loggedInRole = "viewer";
            localStorage.removeItem("cleversearch_admin_token");
            localStorage.removeItem("cleversearch_admin_refresh_token");
            localStorage.removeItem("cleversearch_admin_username");
            localStorage.removeItem("cleversearch_admin_role");
            showLogin();
        }

        /* ===== API 요청 헬퍼 (지연 안내 메시지) ===== */
        async function apiFetch(url, options = {}) {
            const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
            if (accessToken) {
                headers["Authorization"] = `Bearer ${accessToken}`;
            }

            let slowNoticeTimer = null;
            let slowNoticeShown = false;
            slowNoticeTimer = setTimeout(() => {
                slowNoticeShown = true;
                const msg = "요청이 지연되고 있습니다. 네트워크/서버 상태를 확인해 주세요.";
                const target = document.getElementById("tabContent");
                if (target) {
                    const prev = target.querySelector("#apiSlowNotice");
                    if (!prev) {
                        const notice = document.createElement("div");
                        notice.id = "apiSlowNotice";
                        notice.className = "mb-3 rounded border border-yellow-700 bg-yellow-900/30 px-3 py-2 text-sm text-yellow-200";
                        notice.textContent = msg;
                        target.prepend(notice);
                    }
                }
            }, 10000);

            try {
                const res = await fetch(url, { ...options, headers });
                if (res.status === 401) {
                    logoutJwt();
                    return { ok: false, status: 401, data: { detail: "세션 만료" } };
                }
                const data = await res.json().catch(() => ({ raw: "json parse fail" }));
                return { ok: res.ok, status: res.status, data };
            } catch (e) {
                return { ok: false, status: 0, data: { detail: "서버 연결 실패" } };
            } finally {
                if (slowNoticeTimer) clearTimeout(slowNoticeTimer);
                if (slowNoticeShown) {
                    const notice = document.getElementById("apiSlowNotice");
                    if (notice) notice.remove();
                }
            }
        }

        /* ===== 유틸리티 함수 ===== */
        function fmt(v) { return (v === null || v === undefined || v === "") ? "-" : v; }
        function yesNo(v) { return v ? "Y" : "N"; }

        function writeJson(id, payload) {
            const el = document.getElementById(id);
            if (el) el.textContent = JSON.stringify(payload, null, 2);
        }

        /* ===== 동적 탭 로딩 ===== */
        const tabCache = {};

        async function loadTabHtml(tabName) {
            if (tabCache[tabName]) return tabCache[tabName];
            try {
                const res = await fetch(`/static/admin/${encodeURIComponent(tabName)}.html`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const html = await res.text();
                tabCache[tabName] = html;
                return html;
            } catch (e) {
                return `<div class="text-red-400 p-4">탭 로드 실패: ${tabName} (${e.message})</div>`;
            }
        }

        async function switchTab(tabName) {
            activeTab = tabName;
            /* 메뉴 버튼 활성화 상태 변경 */
            document.querySelectorAll("#tabMenuContainer .tab").forEach(btn => {
                btn.classList.toggle("active", btn.dataset.tab === tabName);
            });
            /* 탭 콘텐츠 로드 */
            const container = document.getElementById("tabContent");
            container.innerHTML = '<div class="text-gray-400 p-4">로딩 중...</div>';
            const html = await loadTabHtml(tabName);
            container.innerHTML = html;
            /* 탭 내 script 태그 실행 */
            container.querySelectorAll("script").forEach(oldScript => {
                const newScript = document.createElement("script");
                if (oldScript.src) {
                    newScript.src = oldScript.src;
                } else {
                    newScript.textContent = oldScript.textContent;
                }
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
            /* viewer 역할이면 쓰기 버튼 비활성화 */
            if (loggedInRole === "viewer") {
                container.querySelectorAll(".admin-write").forEach(btn => {
                    btn.disabled = true;
                    btn.classList.add("opacity-40", "cursor-not-allowed");
                    btn.title = "viewer 권한으로는 이 기능을 사용할 수 없습니다";
                });
                const dz = document.getElementById("dropZone");
                if (dz) { dz.style.pointerEvents = "none"; dz.classList.add("opacity-40"); }
            }
            /* 탭별 초기화 함수 호출 */
            const initFn = tabInitMap[tabName];
            if (initFn) initFn();
        }

        /* ===== 메뉴 로드 및 탭 이벤트 설정 ===== */
        async function loadMenu() {
            const container = document.getElementById("tabMenuContainer");
            try {
                const res = await fetch("/static/admin/menu.html");
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                container.innerHTML = await res.text();
            } catch (e) {
                /* 메뉴 로드 실패 시 인라인 폴백 생성 */
                container.innerHTML = TAB_NAMES.map((name, i) =>
                    `<button class="tab ${i===0?'active':''} px-3 py-2 rounded bg-gray-700 text-sm" data-tab="${name}">${name}</button>`
                ).join("");
            }
            /* 탭 클릭 이벤트 바인딩 */
            container.querySelectorAll(".tab").forEach(btn => {
                btn.addEventListener("click", () => switchTab(btn.dataset.tab));
            });
        }

        /* ===== 파일 업로드 (드래그&드롭) ===== */
        function setupUpload() {
            const dropZone = document.getElementById("dropZone");
            const fileInput = document.getElementById("fileInput");
            if (!dropZone || !fileInput) return;

            dropZone.addEventListener("click", () => fileInput.click());
            dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
            dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
            dropZone.addEventListener("drop", (e) => {
                e.preventDefault();
                dropZone.classList.remove("dragover");
                handleFiles(e.dataTransfer.files);
            });
            fileInput.addEventListener("change", () => { handleFiles(fileInput.files); fileInput.value = ""; });
        }

        async function handleFiles(fileList) {
            const queue = document.getElementById("uploadQueue");
            for (const file of fileList) {
                const row = document.createElement("div");
                row.className = "flex items-center gap-2 bg-gray-800 rounded px-3 py-2 text-sm";
                row.innerHTML = `<span class="flex-1">${file.name}</span><span class="text-yellow-400">업로드 중...</span>`;
                queue.appendChild(row);
                try {
                    const formData = new FormData();
                    formData.append("file", file);
                    const headers = {};
                    if (accessToken) headers["Authorization"] = `Bearer ${accessToken}`;
                    const res = await fetch(`${FILE_API}/upload`, { method: "POST", headers, body: formData });
                    const data = await res.json();
                    const statusText = data.status || (res.ok ? "success" : "fail");
                    const color = statusText === "success" ? "text-green-400" : statusText === "skipped" ? "text-blue-400" : "text-red-400";
                    row.innerHTML = `<span class="flex-1">${file.name}</span><span class="${color}">${statusText}</span><span class="text-gray-500 text-xs">${data.message || data.detail || ""}</span>`;
                } catch (e) {
                    row.innerHTML = `<span class="flex-1">${file.name}</span><span class="text-red-400">네트워크 오류</span>`;
                }
            }
        }

        /* ===== 대시보드 헬퍼 (Chart.js 관련) ===== */
        function toggleDashboardDebug() {
            ["dashboardHealth", "dashboardSummary", "dashboardTrend"].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.toggle("hidden");
            });
        }

        function renderAlertBadges(rows) {
            const container = document.getElementById("alertBadges");
            if (!container) return;
            const data = Array.isArray(rows) ? rows : [];
            container.innerHTML = data.map(row => {
                const severity = row.severity || "info";
                const message = row.message || row.code || "알림";
                return `<span class="badge ${severity}">${message}</span>`;
            }).join("");
        }

        function drawTrendChart(trendRows) {
            const el = document.getElementById("trendChart");
            if (!el) return;
            const labels = (trendRows || []).map(row => row.date);
            const success = (trendRows || []).map(row => row.success || 0);
            const failed = (trendRows || []).map(row => row.failed || 0);
            const ctx = el.getContext("2d");
            if (trendChart) trendChart.destroy();
            trendChart = new Chart(ctx, {
                type: "bar",
                data: { labels, datasets: [
                    { label: "성공", data: success, backgroundColor: "rgba(34,197,94,0.7)" },
                    { label: "실패", data: failed, backgroundColor: "rgba(239,68,68,0.7)" }
                ]},
                options: { responsive: true, plugins: { legend: { labels: { color: "#e5e7eb" } } }, scales: { x: { ticks: { color: "#9ca3af" } }, y: { ticks: { color: "#9ca3af" } } } }
            });
        }

        function drawKeywordChart(summary) {
            const el = document.getElementById("keywordChart");
            if (!el) return;
            const rows = (summary?.top_keywords || []).slice(0, 5);
            const labels = rows.map(row => row.keyword);
            const values = rows.map(row => row.count);
            const ctx = el.getContext("2d");
            if (keywordChart) keywordChart.destroy();
            keywordChart = new Chart(ctx, {
                type: "doughnut",
                data: { labels, datasets: [{ data: values, backgroundColor: ["#60a5fa", "#34d399", "#fbbf24", "#f87171", "#a78bfa"] }] },
                options: { plugins: { legend: { labels: { color: "#e5e7eb" } } } }
            });
        }

        /* ===== JSON / 리스트 전환 토글 ===== */
        function toggleDictView() {
            const j = document.getElementById("dictionaryOutput");
            const l = document.getElementById("dictionaryList");
            if (j) j.classList.toggle("hidden");
            if (l) l.classList.toggle("hidden");
        }
        function toggleSmbView() {
            const j = document.getElementById("smbOutput");
            const l = document.getElementById("smbList");
            if (j) j.classList.toggle("hidden");
            if (l) l.classList.toggle("hidden");
        }
        function toggleDbView() {
            const j = document.getElementById("dbOutput");
            const l = document.getElementById("dbList");
            if (j) j.classList.toggle("hidden");
            if (l) l.classList.toggle("hidden");
        }
        function toggleSchedulerView() {
            const j = document.getElementById("schedulerOutput");
            const l = document.getElementById("schedulerList");
            if (j) j.classList.toggle("hidden");
            if (l) l.classList.toggle("hidden");
        }
        function toggleSslView() {
            const j = document.getElementById("sslOutput");
            const l = document.getElementById("sslList");
            if (j) j.classList.toggle("hidden");
            if (l) l.classList.toggle("hidden");
        }

        /* ===== 엔터 키 로그인 ===== */
        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !document.getElementById("loginSection").classList.contains("hidden")) {
                loginJwt();
            }
        });

        /* ===== 관리자 초기화 (메뉴 + 첫 탭 로드) ===== */
        async function initAdmin() {
            await loadMenu();
            await switchTab("upload");
        }

        /* ===== 시작 ===== */
        if (accessToken) {
            showApp();
        } else {
            showLogin();
        }
    </script>
</body>
</html>
