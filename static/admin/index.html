<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CleverSearch Admin</title>
    <script src="/static/vendor/tailwindcss.3.4.3.min.js"></script>
    <script src="/static/vendor/chart.umd.min.js"></script>
    <link href="/static/fonts/nunito.css" rel="stylesheet" />
    <style>
        :root {
            --bg: #eceff3;
            --panel: #ffffff;
            --line: #d9dee6;
            --text: #202938;
            --muted: #6c778b;
            --primary: #5b5ce2;
            --primary-weak: #eeecff;
            --danger: #ef4444;
            --success: #12a874;
            --warning: #f4b400;
            --info: #06b6d4;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow: 0 10px 24px rgba(30, 41, 59, 0.06);
        }

        * {
            font-family: "Nunito", sans-serif;
        }

        body {
            margin: 0;
            background: linear-gradient(180deg, #f7f8fc 0%, var(--bg) 100%);
            color: var(--text);
            overflow-x: hidden;
        }

        .admin-shell {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 232px 1fr;
        }

        .side {
            background: #f6f8fc;
            border-right: 1px solid var(--line);
            padding: 18px 14px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
            padding: 4px 8px;
        }

        .brand-mark {
            width: 44px;
            height: 44px;
            object-fit: contain;
            filter: drop-shadow(0 4px 10px rgba(30, 41, 59, 0.18));
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 64px;
            padding: 8px 22px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
        }

        .menu-toggle-btn {
            display: none;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 10px;
            border: 1px solid #d8dfeb;
            background: linear-gradient(180deg, #ffffff 0%, #f4f7fc 100%);
            color: #334155;
            font-size: 18px;
            font-weight: 800;
            line-height: 1;
            box-shadow: 0 6px 12px rgba(51, 65, 85, 0.08);
        }

        .topbar-logo-link {
            display: none;
        }

        .topbar-mobile-brand {
            display: none;
        }

        .topbar-logo-img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .topbar-title {
            flex: 1;
            min-width: 0;
            font-size: 16px;
            font-weight: 700;
            color: #334155;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 12px;
        }

        .topbar-actions {
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            flex-shrink: 0;
            margin-left: auto;
        }

        .session-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            border-radius: 999px;
            padding: 4px 10px;
            border: 1px solid #d8dfeb;
            background: linear-gradient(180deg, #ffffff 0%, #f4f7fc 100%);
            box-shadow: 0 6px 12px rgba(51, 65, 85, 0.08);
        }

        .user-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
            border: 1px solid #d7e3fb;
            border-radius: 999px;
            padding: 4px 10px 4px 6px;
            color: #334155;
            box-shadow: 0 6px 12px rgba(59, 130, 246, 0.08);
            min-width: 0;
        }

        .user-chip-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 999px;
            background: #dbeafe;
            color: #1e40af;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .user-chip-name {
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .drawer-overlay {
            display: none;
        }

        .side-head {
            display: block;
        }

        .side-close-btn {
            display: none;
        }

        .top-action {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            border: 1px solid #d8dfeb;
            background: linear-gradient(180deg, #ffffff 0%, #f4f7fc 100%);
            color: #334155;
            box-shadow: 0 6px 12px rgba(51, 65, 85, 0.08);
            padding: 6px 11px;
            font-size: 12px;
            font-weight: 700;
            line-height: 1;
            text-decoration: none;
        }

        .top-action:hover {
            background: linear-gradient(180deg, #ffffff 0%, #eaf0fb 100%);
            border-color: #cbd5e1;
            color: #1f2937;
        }

        .top-action.search-link {
            border-color: #cfe0ff;
            color: #1e40af;
            background: linear-gradient(180deg, #f7faff 0%, #e8f0ff 100%);
        }

        .top-action.logout-btn {
            border-color: #ffd6df;
            color: #9f1239;
            background: linear-gradient(180deg, #fff7f9 0%, #ffedf2 100%);
        }

        .top-action-label {
            white-space: nowrap;
        }

        .content-wrap {
            padding: 18px 20px 26px;
        }

        #tabContent {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 18px;
            min-height: calc(100vh - 130px);
        }

        /* 
         * [다크 테마 -> 라이트 테마 변환 어댑터]
         * 하위 HTML 파일들의 다크 테마 클래스들을 라이트 테마 메인 화면에 맞게 강제 변환하여
         * 모든 페이지의 깨짐 현상을 복구합니다.
         */
        #tabContent .bg-gray-900,
        #tabContent .bg-gray-800,
        #tabContent .bg-gray-700 {
            background-color: #ffffff !important;
            border-color: #dce3ef !important;
        }

        #tabContent .text-gray-100, #tabContent .text-gray-200,
        #tabContent .text-gray-300, #tabContent .text-gray-400,
        #tabContent .text-gray-500, #tabContent .text-white {
            color: #334155 !important;
        }

        #tabContent .border-gray-700, #tabContent .border-gray-600, #tabContent .border-gray-500 {
            border-color: #dce3ef !important;
        }

        /* 텍스트 색상 및 알림 박스 교정 */
        #tabContent .text-blue-200 { color: #1e40af !important; }
        #tabContent .text-red-200, #tabContent .text-red-300 { color: #b91c1c !important; }
        #tabContent .text-amber-200 { color: #b45309 !important; }
        #tabContent .text-emerald-200, #tabContent .text-emerald-300, #tabContent .text-green-400 { color: #047857 !important; }
        #tabContent .text-indigo-200 { color: #4338ca !important; }
        
        #tabContent .bg-blue-900\/30 { background-color: #eff6ff !important; border-color: #bfdbfe !important; }
        #tabContent .bg-red-900\/30 { background-color: #fef2f2 !important; border-color: #fecaca !important; }
        #tabContent .bg-amber-900\/30 { background-color: #fffbeb !important; border-color: #fde68a !important; }

        /* 입력 폼 교정 */
        #tabContent input, #tabContent select, #tabContent textarea {
            background-color: #f8fafc !important;
            color: #0f172a !important;
            border-color: #cbd5e1 !important;
        }
        #tabContent input:focus, #tabContent select:focus, #tabContent textarea:focus {
            background-color: #ffffff !important;
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2) !important;
        }

        /* 테이블 및 코드블럭 교정 */
        #tabContent pre { background-color: #f1f5f9 !important; color: #334155 !important; border-color: #e2e8f0 !important; }
        #tabContent table thead tr { background-color: #f8fafc !important; }
        #tabContent tr.border-t { border-color: #e2e8f0 !important; }

        #tabMenu {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #tabMenu .menu-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 4px;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        #tabMenu .menu-section:hover,
        #tabMenu .menu-section:focus-within {
            background: #f8faff;
            border-color: #dbe4ff;
        }

        #tabMenu .menu-title {
            margin: 0;
            padding: 6px 8px;
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            letter-spacing: 0.02em;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 9px;
            transition: color 0.2s ease;
        }

        #tabMenu .menu-items {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            pointer-events: none;
            transform: translateY(-3px);
            transition: max-height 0.2s ease, opacity 0.16s ease, transform 0.2s ease;
        }

        #tabMenu .menu-section:hover .menu-title,
        #tabMenu .menu-section:focus-within .menu-title,
        #tabMenu .menu-section.section-active .menu-title {
            color: #1e293b;
        }

        #tabMenu .menu-section.section-active {
            background: #eef4ff;
            border-color: #bfd1ff;
        }

        #tabMenu .menu-section.section-active .menu-title {
            background: #e1ebff;
            color: #334155;
        }

        #tabMenu .menu-section:hover .menu-items,
        #tabMenu .menu-section:focus-within .menu-items,
        #tabMenu .menu-section.section-active .menu-items,
        #tabMenu .menu-section.section-expanded .menu-items {
            max-height: 520px;
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        #tabMenu .tab {
            border: 1px solid transparent;
            border-radius: 11px;
            text-align: left;
            padding: 10px 12px;
            padding: 10px 12px 10px 36px;
            color: #334155;
            background: transparent;
            font-weight: 600;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        #tabMenu .tab:hover {
            border-color: #cbd5e1;
            background: #e9eef7;
            color: #1e293b;
        }

        #tabMenu .tab.active {
            background: #edf2ff;
            color: #334155;
            border-color: #c6d3fb;
            box-shadow: none;
        }

        #tabMenu .tab:focus-visible {
            outline: 3px solid #2563eb;
            outline-offset: 2px;
        }

        button,
        .btn,
        .admin-btn {
            border-radius: 999px;
            border: 1px solid #d8dfeb;
            font-weight: 700;
            transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease, background 0.2s ease;
        }

        button:hover,
        .btn:hover,
        .admin-btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(180deg, #f8fbff 0%, #e8f0ff 100%);
            color: #1e40af;
            border-color: #cfe0ff;
            box-shadow: 0 6px 12px rgba(59, 130, 246, 0.12);
        }

        .btn-secondary {
            background: linear-gradient(180deg, #ffffff 0%, #f4f7fc 100%);
            color: #334155;
            border-color: #d8dfeb;
            box-shadow: 0 6px 12px rgba(51, 65, 85, 0.1);
        }

        .btn-success {
            background: linear-gradient(180deg, #f3fff9 0%, #e3f8ef 100%);
            color: #0f766e;
            border-color: #bfe9d6;
            box-shadow: 0 6px 12px rgba(16, 185, 129, 0.1);
        }

        .btn-danger-solid {
            background: linear-gradient(180deg, #fff7f9 0%, #ffedf2 100%);
            color: #9f1239;
            border-color: #ffd6df;
            box-shadow: 0 6px 12px rgba(244, 63, 94, 0.1);
        }

        .btn-warning {
            background: linear-gradient(180deg, #fffdf5 0%, #fff5d8 100%);
            color: #92400e;
            border-color: #fde5a7;
            box-shadow: 0 6px 12px rgba(245, 158, 11, 0.1);
        }

        .btn-info {
            background: linear-gradient(180deg, #f4fbff 0%, #e7f5ff 100%);
            color: #0c4a6e;
            border-color: #cbe8fb;
            box-shadow: 0 6px 12px rgba(14, 165, 233, 0.1);
        }

        .btn-unified {
            border-radius: 999px !important;
            padding: 7px 13px !important;
            font-weight: 700 !important;
            border: 1px solid #d6dfec !important;
            line-height: 1.2 !important;
            box-shadow: 0 6px 12px rgba(51, 65, 85, 0.08);
        }

        .btn-icon {
            margin-right: 6px;
            line-height: 1;
        }

        .btn-soft {
            background: linear-gradient(180deg, #ffffff 0%, #f3f6fb 100%);
            color: #334155;
            border: 1px solid #d6deeb;
        }

        .btn-danger {
            background: #ffe9eb;
            color: #c4283c;
            border: 1px solid #ffcdd4;
        }

        .btn-top {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #f4f6fb;
            color: #384256;
            border: 1px solid #d8dfeb;
            box-shadow: 0 6px 14px rgba(74, 88, 113, 0.1);
        }

        .btn-top:hover {
            background: #e9eef8;
            color: #273247;
        }

        .pill {
            border: 1px solid #dbe1ea;
            border-radius: 999px;
            padding: 4px 10px;
            background: #fff;
            color: #667084;
            font-size: 12px;
            font-weight: 700;
            max-width: 140px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .metric {
            background: #fff;
            border: 1px solid #dbe1ea;
            border-radius: 12px;
            padding: 12px;
        }

        .metric-label {
            color: #6f7991;
            font-size: 12px;
            font-weight: 700;
        }

        .metric-value {
            color: #0f172a;
            font-size: 20px;
            font-weight: 800;
            line-height: 1.15;
            margin-top: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table thead th {
            background: #f5f7fb;
            color: #4a5568;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            white-space: nowrap;
            border-bottom: 1px solid #dbe1ea;
        }

        table th,
        table td {
            border-bottom: 1px solid #edf1f6;
            padding: 10px 12px;
            text-align: left;
            white-space: nowrap;
        }

        input,
        select,
        textarea {
            background: #fff;
            color: #334155;
            border: 1px solid #d7dee9;
            border-radius: 10px;
            padding: 8px 10px;
            outline: none;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #a5b4fc;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.14);
        }

        .drop-zone {
            border: 2px dashed #c4cfde;
            border-radius: 14px;
            padding: 36px 18px;
            text-align: center;
            background: #fbfcff;
            transition: all 0.2s;
        }

        .drop-zone.dragover {
            border-color: #8587ff;
            background: #f2f1ff;
        }

        .badge {
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            border: 1px solid transparent;
        }

        .badge.info { background: #eaf4ff; color: #2469da; border-color: #cfe4ff; }
        .badge.warning { background: #fff5d8; color: #946200; border-color: #ffe6a2; }
        .badge.critical { background: #ffe8ed; color: #bf2942; border-color: #ffcfd8; }

        .btn-del {
            cursor: pointer;
            color: #e53935;
            font-weight: 800;
        }

        .btn-del:hover {
            color: #c62828;
            text-decoration: underline;
        }

        .btn-inline-delete {
            border: 1px solid #fbcfe8;
            border-radius: 8px;
            background: #fff1f6;
            color: #9f1239;
            font-size: 12px;
            font-weight: 700;
            line-height: 1;
            padding: 5px 8px;
            box-shadow: none;
        }

        .btn-inline-delete:hover {
            background: #ffe4ee;
            color: #881337;
            transform: none;
            text-decoration: none;
        }

        @media (max-width: 1100px) {
            .admin-shell {
                grid-template-columns: 1fr;
            }

            .side {
                position: fixed;
                inset: 0 auto 0 0;
                width: min(84vw, 320px);
                z-index: 40;
                border-right: 1px solid var(--line);
                border-bottom: 0;
                padding: 14px 12px 12px;
                overflow-y: auto;
                transform: translateX(-105%);
                transition: transform 0.22s ease;
                box-shadow: 12px 0 26px rgba(15, 23, 42, 0.16);
            }

            body.drawer-open {
                overflow: hidden;
            }

            body.drawer-open .side {
                transform: translateX(0);
            }

            .drawer-overlay {
                display: block;
                position: fixed;
                inset: 0;
                z-index: 30;
                background: rgba(15, 23, 42, 0.28);
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.2s ease;
            }

            body.drawer-open .drawer-overlay {
                opacity: 1;
                pointer-events: auto;
            }

            .menu-toggle-btn {
                display: inline-flex;
            }

            .topbar-logo-link {
                display: none;
            }

            .topbar-mobile-brand {
                position: absolute;
                left: 50%;
                top: 8px;
                transform: translateX(-50%);
                display: inline-flex;
                align-items: center;
                gap: 8px;
                max-width: calc(100% - 130px);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .topbar-mobile-brand .brand-mark {
                width: 28px;
                height: 28px;
            }

            .topbar-mobile-brand-title {
                font-size: 14px;
                font-weight: 800;
                color: #1f2937;
                line-height: 1.1;
            }

            .topbar-mobile-brand-sub {
                font-size: 10px;
                font-weight: 700;
                color: #64748b;
                line-height: 1.1;
            }

            .topbar {
                display: grid;
                grid-template-columns: 42px 1fr auto;
                grid-template-rows: auto auto;
                gap: 8px;
                padding: 10px 12px;
                min-height: auto;
                position: sticky;
            }

            .menu-toggle-btn {
                grid-column: 1;
                grid-row: 1;
            }

            .topbar-actions {
                display: contents;
            }

            #logoutBtn {
                grid-column: 3;
                grid-row: 1;
                justify-self: end;
            }

            .topbar-title {
                grid-column: 1 / 3;
                grid-row: 2;
                font-size: 14px;
                padding-right: 6px;
            }

            .session-chip {
                grid-column: 3;
                grid-row: 2;
                justify-self: end;
                padding: 3px 8px;
                gap: 6px;
            }

            .user-chip,
            .search-link {
                display: none;
            }

            .side-head {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                gap: 8px;
            }

            .side-head .brand {
                margin-bottom: 12px;
                padding: 4px 8px;
                flex-direction: row;
                align-items: center;
                text-align: left;
                gap: 10px;
            }

            .side-close-btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 32px;
                height: 32px;
                flex-shrink: 0;
                border-radius: 10px;
                border: 1px solid #d8dfeb;
                background: #ffffff;
                color: #334155;
                font-size: 18px;
                font-weight: 800;
                line-height: 1;
                box-shadow: 0 6px 12px rgba(51, 65, 85, 0.08);
            }

            #tabMenu .menu-section:hover {
                background: #f4f7ff !important;
                border-color: #d2ddfb !important;
            }

            #tabMenu .menu-section:hover .menu-title {
                background: #edf2ff !important;
                color: #30425e !important;
            }

            #tabMenu .tab:hover:not(.active) {
                border-color: #b9c9ea !important;
                background: #f1f5fd !important;
                color: #2a3b52 !important;
                box-shadow: 0 3px 8px rgba(37, 99, 235, 0.1);
            }

            /* 모바일/태블릿에서도 active와 hover를 명확히 구분 */
            #tabMenu .tab.active {
                border-color: #94aef5 !important;
                background: #dfe8ff !important;
                color: #22324d !important;
            }

            #tabContent {
                min-height: calc(100vh - 168px);
                width: 100%;
                max-width: 100%;
                overflow-x: hidden;
            }

            #tabContent,
            #tabContent * {
                box-sizing: border-box;
            }

            #tabContent > * {
                max-width: 100%;
                min-width: 0;
            }

            #tabContent img,
            #tabContent svg,
            #tabContent canvas,
            #tabContent iframe,
            #tabContent video {
                max-width: 100% !important;
                height: auto !important;
            }

            #tabContent [style*="width:"] {
                max-width: 100% !important;
            }

            #tabContent [style*="min-width"],
            #tabContent [class*="min-w-"] {
                min-width: 0 !important;
            }

            #tabContent [class*="w-"] {
                max-width: 100% !important;
            }

            #tabContent table {
                width: 100% !important;
                table-layout: fixed;
            }

            #tabContent pre {
                white-space: pre-wrap !important;
                word-break: break-word !important;
                overflow-x: hidden !important;
            }

            #tabMenu {

            table th,

            }
        }

        @media (max-width: 720px) {
            .topbar {

            }

            .topbar {

        }
    </style>
</head>
<body>
    <div class="admin-shell">
        <aside class="side">
    <link rel="icon" type="image/png" href="/static/clever-cloud.png" />
            <div class="side-head">
                <div class="brand">
                    <img class="brand-mark" src="/static/clever-cloud.png" alt="CleverSearch logo" loading="eager" />
                    <div>
                        <div class="text-base font-extrabold text-slate-800">CleverSearch</div>
                        <div class="text-xs text-slate-500">Administrator</div>
                    </div>
                </div>
                <button id="menuCloseBtn" class="side-close-btn" type="button" aria-label="메뉴 닫기">✕</button>
            </div>
            <div id="tabMenuContainer"></div>
        </aside>

        <div>
            <header class="topbar">
                <button id="menuToggleBtn" class="menu-toggle-btn" type="button" aria-label="메뉴 열기" aria-expanded="false">☰</button>
                <div class="topbar-mobile-brand" aria-label="CleverSearch 관리자">
                    <img class="brand-mark" src="/static/clever-cloud.png" alt="CleverSearch logo" />
                    <div>
                        <div class="topbar-mobile-brand-title">CleverSearch</div>
                        <div class="topbar-mobile-brand-sub">Administrator</div>
                    </div>
                </div>
                <a href="/" class="topbar-logo-link" aria-label="CleverSearch 홈">
                    <img class="topbar-logo-img" src="/static/clever-cloud.png" alt="CleverSearch" />
                </a>
                <div id="currentPath" class="topbar-title">🏠 홈</div>
                <div class="topbar-actions">
                    <div class="session-chip" aria-label="세션 남은 시간 및 연장">
                        <span aria-hidden="true" class="text-xs">⏱️</span>
                        <span id="sessionTimerDisplay" class="text-xs font-bold text-slate-600 w-10 text-center">--:--</span>
                        <button id="sessionExtendBtn" type="button" class="text-xs font-bold text-blue-600 hover:text-blue-800 transition px-1">연장</button>
                    </div>
                    <span class="user-chip" aria-label="현재 사용자">
                        <span class="user-chip-icon" aria-hidden="true">👤</span>

                    </span>

                        <span aria-hidden="true">🔎</span>

                    <button id="logoutBtn" type="button" class="top-action logout-btn" aria-label="로그아웃">

            <main class="content-wrap">
                <div id="tabContent"></div>
            </main>
        </div>
    </div>
    <div id="drawerOverlay" class="drawer-overlay" aria-hidden="true"></div>

    <script>
        window.__CSP_NONCE__ = document.currentScript ? document.currentScript.nonce : "";
        const _ORIGIN = window.location.origin;
        const API = `${_ORIGIN}/api/v1/admin`;
        const FILE_API = `${_ORIGIN}/api/v1/user/file`;
        const SYS_API = `${_ORIGIN}/api/v1/admin/system`;
        const AUTH_API = `${_ORIGIN}/api/v1/common/auth`;

        let accessToken = "";
        let refreshToken = "";
        let loggedInUsername = localStorage.getItem("cleversearch_admin_username") || "";
        let loggedInRole = localStorage.getItem("cleversearch_admin_role") || "viewer";
        let isRefreshingSession = false;
        let sessionExpireAtMs = 0;

        let sessionInterval = null;

        function syncRequest(url, options = {}) {
            const method = (options.method || "GET").toUpperCase();
            const headers = options.headers || {};
            const body = Object.prototype.hasOwnProperty.call(options, "body") ? options.body : null;
            const xhr = new XMLHttpRequest();

            try {
                xhr.open(method, url, false);
                xhr.withCredentials = true;
                Object.entries(headers).forEach(([k, v]) => {
                    if (v !== undefined && v !== null) {
                        xhr.setRequestHeader(k, String(v));
                    }
                });
                xhr.send(body);
                return {
                    ok: xhr.status >= 200 && xhr.status < 300,
                    status: xhr.status,
                    text: xhr.responseText || ""
                };
            } catch (_) {
                return { ok: false, status: 0, text: "" };
            }
        }

        function parseJsonSafe(text, fallback = {}) {
            try {
                return JSON.parse(text || "{}");
            } catch (_) {
                return fallback;
            }
        }

        function formatSessionRemain(totalSec) {
            const sec = Math.max(0, Number(totalSec) || 0);
            if (sec >= 3600) {
                const h = Math.floor(sec / 3600);
                const m = Math.floor((sec % 3600) / 60).toString().padStart(2, "0");
                const s = (sec % 60).toString().padStart(2, "0");
                return `${h}:${m}:${s}`;
            }
            const m = Math.floor(sec / 60).toString().padStart(2, "0");
            const s = (sec % 60).toString().padStart(2, "0");
            return `${m}:${s}`;
        }

        function setSessionExpiryFromExp(exp) {
            const expSec = Number(exp || 0);
            if (!Number.isFinite(expSec) || expSec <= 0) {
                sessionExpireAtMs = 0;
                updateTimerDisplay();
                return;
            }
            sessionExpireAtMs = expSec * 1000;
            updateTimerDisplay();
            if (sessionInterval) clearInterval(sessionInterval);
            sessionInterval = setInterval(updateTimerDisplay, 1000);
        }

        function updateTimerDisplay() {
            const display = document.getElementById("sessionTimerDisplay");
            if (!display) return;
            if (!sessionExpireAtMs) {
                display.textContent = "--:--";
                display.classList.remove("text-red-600", "text-amber-600");
                display.classList.add("text-slate-600");
                return;
            }

            const remainSec = Math.max(0, Math.ceil((sessionExpireAtMs - Date.now()) / 1000));
            display.textContent = formatSessionRemain(remainSec);

            display.classList.remove("text-slate-600", "text-amber-600", "text-red-600");
            if (remainSec <= 60) {
                display.classList.add("text-red-600");
            } else if (remainSec <= 300) {
                display.classList.add("text-amber-600");
            } else {
                display.classList.add("text-slate-600");
            }
        }

        // 세션 연장(Token Refresh) API 호출
        async function extendSession() {
            try {
                const res = syncRequest(`${AUTH_API}/refresh`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({})
                });
                if (res.ok) {
                    const meRes = syncRequest(`${AUTH_API}/me`, { method: "GET" });
                    const mePayload = parseJsonSafe(meRes.text, {});
                    setSessionExpiryFromExp(mePayload.exp);
                    alert("세션이 성공적으로 연장되었습니다.");
                } else {
                    alert("세션 연장에 실패했습니다. 다시 로그인해주세요.");
                    logoutJwt();
                }
            } catch (e) {
                alert("서버 통신 오류로 세션 연장에 실패했습니다.");
            }
        }

        const TAB_NAMES = [
            "dashboard", "docs", "upload", "popular", "logs", "recent", "failed",
            "dictionary", "smb", "dbsources", "indexing", "watcher", "network",
            "scheduler", "volume", "ssl", "scoring", "reset"
        ];

        const tabInitMap = {
            dashboard: () => { if (typeof loadDashboard === "function") loadDashboard(); },
            docs: () => { if (typeof loadDocs === "function") loadDocs(); },
            upload: () => { if (typeof setupUpload === "function") setupUpload(); },
            popular: () => { if (typeof loadPopular === "function") loadPopular(); },
            logs: () => { if (typeof loadLogs === "function") loadLogs(); },
            recent: () => { if (typeof loadRecent === "function") loadRecent(); },
            failed: () => { if (typeof loadFailed === "function") loadFailed(); },
            dictionary: () => { if (typeof loadDictionaryEntries === "function") loadDictionaryEntries(); },
            smb: () => { if (typeof loadSmbSources === "function") loadSmbSources(); },
            dbsources: () => { if (typeof loadDbSources === "function") loadDbSources(); },
            indexing: () => { if (typeof loadIndexingHistory === "function") loadIndexingHistory(); },
            watcher: () => { if (typeof loadWatcherStatus === "function") loadWatcherStatus(); },
            network: () => { if (typeof loadNetworkEvents === "function") { loadMonitorStatus(); loadNetworkEvents(); } },
            scheduler: () => { if (typeof loadSchedulerStatus === "function") loadSchedulerStatus(); },
            volume: () => { if (typeof loadVolumePanel === "function") loadVolumePanel(); },
            ssl: () => { if (typeof scanCertificates === "function") scanCertificates(); },
            scoring: () => { if (typeof loadScoringWeights === "function") loadScoringWeights(); },
            reset: null
        };

        let activeTab = "dashboard";

        function isCompactMenuViewport() {
            return window.matchMedia("(max-width: 1100px)").matches;
        }

        function setDrawerOpen(open) {
            const shouldOpen = open && isCompactMenuViewport();
            document.body.classList.toggle("drawer-open", shouldOpen);
            const menuToggleBtn = document.getElementById("menuToggleBtn");
            if (menuToggleBtn) {
                menuToggleBtn.setAttribute("aria-expanded", shouldOpen ? "true" : "false");
            }
        }

        function resolveInitialTab() {
            const forceDashboard = localStorage.getItem("cleversearch_admin_force_dashboard_once") === "1";
            if (forceDashboard) {
                localStorage.removeItem("cleversearch_admin_force_dashboard_once");
                return "dashboard";
            }

            const fromHash = (window.location.hash || "").replace(/^#/, "").trim();
            if (TAB_NAMES.includes(fromHash)) return fromHash;

            const fromStorage = localStorage.getItem("cleversearch_admin_active_tab") || "";
            if (TAB_NAMES.includes(fromStorage)) return fromStorage;

            return "dashboard";
        }

        function persistActiveTab(tabName) {
            if (!TAB_NAMES.includes(tabName)) return;
            localStorage.setItem("cleversearch_admin_active_tab", tabName);
            if (window.location.hash !== `#${tabName}`) {
                window.history.replaceState(null, "", `#${tabName}`);
            }
        }

        function forceLoginRedirect() {
            window.location.replace("/static/admin/login.html");
        }

        async function logoutJwt() {
            try {
                syncRequest(`${AUTH_API}/logout`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({})
                });
            } catch (e) {
                // network error on logout is non-fatal for local session cleanup
            }

            accessToken = "";
            refreshToken = "";
            loggedInUsername = "";
            loggedInRole = "viewer";
            localStorage.removeItem("cleversearch_admin_username");
            localStorage.removeItem("cleversearch_admin_role");
            localStorage.removeItem("cleversearch_admin_active_tab");
            localStorage.removeItem("cleversearch_admin_force_dashboard_once");
            forceLoginRedirect();
        }

        async function tryRefreshSessionOnce() {
            if (isRefreshingSession) return false;
            isRefreshingSession = true;
            try {
                const res = syncRequest(`${AUTH_API}/refresh`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({})
                });
                if (res.ok) {
                    const meRes = syncRequest(`${AUTH_API}/me`, { method: "GET" });
                    const mePayload = parseJsonSafe(meRes.text, {});
                    setSessionExpiryFromExp(mePayload.exp);
                }
                return res.ok;
            } catch (_) {
                return false;
            } finally {
                isRefreshingSession = false;
            }
        }

        async function apiFetch(url, options = {}) {
            const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
            try {
                const res = syncRequest(url, { ...options, headers });
                if (res.status === 401) {
                    const alreadyRetried = options._retryAfterRefresh === true;
                    if (!alreadyRetried) {
                        const refreshed = await tryRefreshSessionOnce();
                        if (refreshed) {
                            const retryOptions = { ...options, _retryAfterRefresh: true };
                            return await apiFetch(url, retryOptions);
                        }
                    }
                    await logoutJwt();
                    return { ok: false, status: 401, data: { detail: "세션 만료" } };
                }
                const data = parseJsonSafe(res.text, { raw: "json parse fail" });
                return { ok: res.ok, status: res.status, data };
            } catch (e) {
                return { ok: false, status: 0, data: { detail: "서버 연결 실패" } };
            }
        }

        async function initializeSession() {
            try {
                const res = syncRequest(`${AUTH_API}/me`, { method: "GET" });
                if (!res.ok) return false;
                const payload = parseJsonSafe(res.text, {});
                loggedInUsername = String(payload.username || loggedInUsername || "admin");
                loggedInRole = String(payload.role || loggedInRole || "viewer");
                localStorage.setItem("cleversearch_admin_username", loggedInUsername);
                localStorage.setItem("cleversearch_admin_role", loggedInRole);
                setSessionExpiryFromExp(payload.exp);
                return true;
            } catch (_) {
                return false;
            }
        }

        function fmt(v) {
            if (v === null || v === undefined || v === "") return "-";
            return String(v)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }
        function yesNo(v) { return v ? "Y" : "N"; }

        function writeJson(id, payload) {
            const el = document.getElementById(id);
            if (el) el.textContent = JSON.stringify(payload, null, 2);
        }

        function getFlatText(el) {
            return String(el?.textContent || "").replace(/\s+/g, " ").trim();
        }

        function updateCurrentPath(tabName) {
            const pathEl = document.getElementById("currentPath");
            if (!pathEl) return;

            let activeButton = null;
            document.querySelectorAll("#tabMenuContainer .tab").forEach(btn => {
                if (btn.dataset.tab === tabName) activeButton = btn;
            });

            const home = "🏠 홈";
            if (!activeButton) {
                pathEl.textContent = home;
                pathEl.title = home;
                return;
            }

            const section = activeButton.closest(".menu-section");
            const sectionTitle = getFlatText(section?.querySelector(".menu-title"));
            const tabTitle = getFlatText(activeButton);

            const trail = [home];
            if (sectionTitle) trail.push(sectionTitle);
            if (tabTitle) trail.push(tabTitle);

            const fullPath = trail.join(" > ");
            pathEl.textContent = fullPath;
            pathEl.title = fullPath;
        }

        function applyButtonPreset(button, text) {
            button.classList.remove(
                "btn-primary", "btn-secondary", "btn-success", "btn-danger-solid", "btn-warning", "btn-info"
            );

            if (/삭제|초기화|중지|복원/.test(text)) {
                button.classList.add("btn-danger-solid");
                return;
            }
            if (/저장|적용|생성|업로드/.test(text)) {
                button.classList.add("btn-primary");
                return;
            }
            if (/실행|시작|동기화/.test(text)) {
                button.classList.add("btn-success");
                return;
            }
            if (/상태|조회|전환|토글|추천|디버그/.test(text)) {
                button.classList.add("btn-secondary");
                return;
            }
            button.classList.add("btn-soft");
        }

        function getButtonIcon(text) {
            if (/삭제|초기화|중지|복원/.test(text)) return "❌";
            if (/저장|적용|생성|업로드/.test(text)) return "🛠️";
            if (/실행|시작|동기화/.test(text)) return "🚀";
            if (/상태|조회|전환|토글|추천|디버그/.test(text)) return "📡";
            if (/수정|편집/.test(text)) return "📝";
            if (/다운로드/.test(text)) return "📥";
            return "🔹";
        }

        function decorateButtonLabel(button, text) {
            if (button.dataset.iconized === "1") return;
            const icon = getButtonIcon(text);
            const hasSymbolPrefix = /^[\u2190-\u21FF\u2600-\u27BF\uD83C-\uDBFF\uDC00-\uDFFF]/.test(text);
            if (hasSymbolPrefix) {
                button.dataset.iconized = "1";
                return;
            }

            const iconSpan = document.createElement("span");
            iconSpan.className = "btn-icon";
            iconSpan.setAttribute("aria-hidden", "true");
            iconSpan.textContent = icon;

            const labelSpan = document.createElement("span");
            labelSpan.textContent = String(button.textContent || "").trim();

            button.textContent = "";
            button.appendChild(iconSpan);
            button.appendChild(labelSpan);
            button.dataset.iconized = "1";
        }

        function normalizeTabUi(container) {
            container.querySelectorAll("button").forEach(button => {
                if (button.classList.contains("tab")) return;
                if (button.classList.contains("js-doc-delete")) return;

                button.classList.add("btn-unified");
                const text = (button.textContent || "").replace(/\s+/g, "").trim();
                applyButtonPreset(button, text);
                decorateButtonLabel(button, text);
            });
        }

        async function loadTabHtml(tabName) {
            try {
                const tabUrl = `/static/admin/${encodeURIComponent(tabName)}.html?v=${Date.now()}`;
                const res = syncRequest(tabUrl, { method: "GET" });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res.text;
            } catch (e) {
                return `<div class="text-red-600 p-4">탭 로드 실패: ${fmt(tabName)} (${fmt(e?.message || "error")})</div>`;
            }
        }

        async function switchTab(tabName) {
            if (!TAB_NAMES.includes(tabName)) {
                tabName = "dashboard";
            }
            activeTab = tabName;
            persistActiveTab(tabName);
            document.querySelectorAll("#tabMenuContainer .tab").forEach(btn => {
                const isActive = btn.dataset.tab === tabName;
                btn.classList.toggle("active", isActive);
                if (isActive) {
                    btn.setAttribute("aria-current", "page");
                } else {
                    btn.removeAttribute("aria-current");
                }
            });
            syncMenuSectionState(tabName);
            updateCurrentPath(tabName);

            if (isCompactMenuViewport()) {
                setDrawerOpen(false);
            }

            const container = document.getElementById("tabContent");
            container.innerHTML = '<div class="text-slate-500 p-4">로딩 중...</div>';
            const html = await loadTabHtml(tabName);
            container.innerHTML = html;

            container.querySelectorAll("script").forEach(oldScript => {
                const newScript = document.createElement("script");
                if (window.__CSP_NONCE__) {
                    newScript.setAttribute("nonce", window.__CSP_NONCE__);
                }
                if (oldScript.src) {
                    newScript.src = oldScript.src;
                } else {
                    newScript.textContent = oldScript.textContent;
                }
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });

            normalizeTabUi(container);

            if (loggedInRole === "viewer") {
                container.querySelectorAll(".admin-write").forEach(btn => {
                    btn.disabled = true;
                    btn.classList.add("opacity-40", "cursor-not-allowed");
                    btn.title = "viewer 권한으로는 사용할 수 없습니다";
                });
                const dz = document.getElementById("dropZone");
                if (dz) {
                    dz.style.pointerEvents = "none";
                    dz.classList.add("opacity-40");
                }
            }

            const initFn = tabInitMap[tabName];
            if (initFn) initFn();
        }

        async function loadMenu() {
            const container = document.getElementById("tabMenuContainer");
            try {
                const res = syncRequest("/static/admin/menu.html", { method: "GET" });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                container.innerHTML = res.text;
            } catch (e) {
                const safeError = fmt(e?.message || "error");
                container.innerHTML = `<div id="tabMenu">${TAB_NAMES.map((name, i) =>
                    `<button class="tab ${i===0?"active":""}" data-tab="${name}">${name}</button>`
                ).join("")}</div><div class="text-xs text-red-500 mt-2">메뉴 로드 실패: ${safeError}</div>`;
            }

            container.querySelectorAll(".tab").forEach(btn => {
                btn.addEventListener("click", () => switchTab(btn.dataset.tab));
            });
            syncMenuSectionState(activeTab);
            updateCurrentPath(activeTab);
        }

        function syncMenuSectionState(tabName) {
            document.querySelectorAll("#tabMenuContainer .menu-section").forEach(section => {
                const hasActiveTab = Array.from(section.querySelectorAll(".tab")).some(btn => btn.dataset.tab === tabName);
                section.classList.toggle("section-active", hasActiveTab);
            });
        }

        function toggleDictView() {
            const j = document.getElementById("dictionaryOutput");
            const l = document.getElementById("dictionaryList");
            if (j) j.classList.toggle("hidden");
            if (l) l.classList.toggle("hidden");
        }

        function toggleSmbView() {
            const j = document.getElementById("smbOutput");
            const l = document.getElementById("smbList");
            if (j) j.classList.toggle("hidden");
            if (l) l.classList.toggle("hidden");
        }

        function toggleDbView() {
            const j = document.getElementById("dbOutput");
            const l = document.getElementById("dbList");
            if (j) j.classList.toggle("hidden");
            if (l) l.classList.toggle("hidden");
        }

        function toggleSchedulerView() {
            const j = document.getElementById("schedulerOutput");
            const l = document.getElementById("schedulerList");
            if (j) j.classList.toggle("hidden");
            if (l) l.classList.toggle("hidden");
        }

        function toggleSslView() {
            const j = document.getElementById("sslOutput");
            const l = document.getElementById("sslList");
            if (j) j.classList.toggle("hidden");
            if (l) l.classList.toggle("hidden");
        }

        async function initAdmin() {
            document.getElementById("loggedInUser").textContent = loggedInUsername || "admin";
            await loadMenu();
            await switchTab(resolveInitialTab());
        }

        window.addEventListener("hashchange", () => {
            const fromHash = (window.location.hash || "").replace(/^#/, "").trim();
            if (TAB_NAMES.includes(fromHash) && fromHash !== activeTab) {
                switchTab(fromHash);
            }
        });

        (async () => {
            const ok = await initializeSession();
            if (!ok) {
                forceLoginRedirect();
                return;
            }
            updateTimerDisplay(); // 페이지 로드 시 타이머 시작
            document.getElementById("sessionExtendBtn")?.addEventListener("click", extendSession);
            document.getElementById("logoutBtn")?.addEventListener("click", logoutJwt);
            initAdmin();
        })();

        document.getElementById("menuToggleBtn")?.addEventListener("click", () => {
            const willOpen = !document.body.classList.contains("drawer-open");
            setDrawerOpen(willOpen);
        });

        document.getElementById("drawerOverlay")?.addEventListener("click", () => {
            setDrawerOpen(false);
        });

        document.getElementById("menuCloseBtn")?.addEventListener("click", () => {
            setDrawerOpen(false);
        });

        // 동기식 업로드용 iframe으로부터 메시지 수신
        window.addEventListener("message", (event) => {
            if (event.origin !== window.location.origin || !event.data || event.data.type !== "upload-sync-result") {
                return;
            }
        });

        window.matchMedia("(max-width: 1100px)").addEventListener("change", () => {
            syncMenuSectionState(activeTab);
            setDrawerOpen(false);
        });
    </script>
</body>
</html>
