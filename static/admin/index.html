<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CleverSearch Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #eceff3;
            --panel: #ffffff;
            --line: #d9dee6;
            --text: #202938;
            --muted: #6c778b;
            --primary: #5b5ce2;
            --primary-weak: #eeecff;
            --danger: #ef4444;
            --success: #12a874;
            --warning: #f4b400;
            --info: #06b6d4;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow: 0 10px 24px rgba(30, 41, 59, 0.06);
        }

        * {
            font-family: "Nunito", sans-serif;
        }

        body {
            margin: 0;
            background: linear-gradient(180deg, #f7f8fc 0%, var(--bg) 100%);
            color: var(--text);
        }

        .admin-shell {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 232px 1fr;
        }

        .side {
            background: #f6f8fc;
            border-right: 1px solid var(--line);
            padding: 18px 14px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
            padding: 4px 8px;
        }

        .brand-mark {
            width: 44px;
            height: 44px;
            object-fit: contain;
            filter: drop-shadow(0 4px 10px rgba(30, 41, 59, 0.18));
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 64px;
            padding: 0 22px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
        }

        .content-wrap {
            padding: 18px 20px 26px;
        }

        #tabContent {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 18px;
            min-height: calc(100vh - 130px);
        }

        #tabMenu {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #tabMenu .tab {
            width: 100%;
            border: 1px solid transparent;
            border-radius: 11px;
            text-align: left;
            padding: 10px 12px;
            color: #5f6b81;
            background: transparent;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        #tabMenu .tab:hover {
            border-color: #dbe2ef;
            background: #eef2f9;
            color: #334155;
        }

        #tabMenu .tab.active {
            background: var(--primary-weak);
            color: var(--primary);
            border-color: #ded8ff;
        }

        button,
        .btn,
        .admin-btn {
            border-radius: 10px;
            border: none;
            font-weight: 700;
            transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease;
        }

        button:hover,
        .btn:hover,
        .admin-btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 7px 14px rgba(91, 92, 226, 0.24);
        }

        .btn-secondary {
            background: #5f6b7a;
            color: #fff;
            box-shadow: 0 7px 14px rgba(95, 107, 122, 0.22);
        }

        .btn-success {
            background: #16a56f;
            color: #fff;
            box-shadow: 0 7px 14px rgba(22, 165, 111, 0.22);
        }

        .btn-danger-solid {
            background: #e53935;
            color: #fff;
            box-shadow: 0 7px 14px rgba(229, 57, 53, 0.24);
        }

        .btn-warning {
            background: #f6bd16;
            color: #312700;
            box-shadow: 0 7px 14px rgba(246, 189, 22, 0.24);
        }

        .btn-info {
            background: #20b5d6;
            color: #fff;
            box-shadow: 0 7px 14px rgba(32, 181, 214, 0.24);
        }

        .btn-unified {
            border-radius: 10px !important;
            padding: 7px 12px !important;
            font-weight: 800 !important;
            border: 1px solid transparent !important;
            line-height: 1.2 !important;
        }

        .btn-soft {
            background: #edf1f7;
            color: #374151;
            border: 1px solid #d8dee9;
        }

        .btn-danger {
            background: #ffe9eb;
            color: #c4283c;
            border: 1px solid #ffcdd4;
        }

        .btn-top {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #f4f6fb;
            color: #384256;
            border: 1px solid #d8dfeb;
            box-shadow: 0 6px 14px rgba(74, 88, 113, 0.1);
        }

        .btn-top:hover {
            background: #e9eef8;
            color: #273247;
        }

        .pill {
            border: 1px solid #dbe1ea;
            border-radius: 999px;
            padding: 4px 10px;
            background: #fff;
            color: #667084;
            font-size: 12px;
            font-weight: 700;
        }

        .metric {
            background: #fff;
            border: 1px solid #dbe1ea;
            border-radius: 12px;
            padding: 12px;
        }

        .metric-label {
            color: #6f7991;
            font-size: 12px;
            font-weight: 700;
        }

        .metric-value {
            color: #0f172a;
            font-size: 20px;
            font-weight: 800;
            line-height: 1.15;
            margin-top: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table thead th {
            background: #f5f7fb;
            color: #4a5568;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            white-space: nowrap;
            border-bottom: 1px solid #dbe1ea;
        }

        table th,
        table td {
            border-bottom: 1px solid #edf1f6;
            padding: 10px 12px;
            text-align: left;
            white-space: nowrap;
        }

        input,
        select,
        textarea {
            background: #fff;
            color: #334155;
            border: 1px solid #d7dee9;
            border-radius: 10px;
            padding: 8px 10px;
            outline: none;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #a5b4fc;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.14);
        }

        .drop-zone {
            border: 2px dashed #c4cfde;
            border-radius: 14px;
            padding: 36px 18px;
            text-align: center;
            background: #fbfcff;
            transition: all 0.2s;
        }

        .drop-zone.dragover {
            border-color: #8587ff;
            background: #f2f1ff;
        }

        .badge {
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            border: 1px solid transparent;
        }

        .badge.info { background: #eaf4ff; color: #2469da; border-color: #cfe4ff; }
        .badge.warning { background: #fff5d8; color: #946200; border-color: #ffe6a2; }
        .badge.critical { background: #ffe8ed; color: #bf2942; border-color: #ffcfd8; }

        .btn-del {
            cursor: pointer;
            color: #e53935;
            font-weight: 800;
        }

        .btn-del:hover {
            color: #c62828;
            text-decoration: underline;
        }

        /*
         * Tab fragments still contain old dark classes.
         * Normalize them into light UI colors so text and controls stay readable.
         */
        #tabContent {
            color: #253041;
        }

        #tabContent .bg-gray-900,
        #tabContent .bg-gray-800,
        #tabContent .bg-gray-700,
        #tabContent .bg-gray-600 {
            background: #ffffff !important;
            color: #243045 !important;
            border-color: #dce3ef !important;
        }

        #tabContent .border-gray-900,
        #tabContent .border-gray-800,
        #tabContent .border-gray-700,
        #tabContent .border-gray-600 {
            border-color: #dce3ef !important;
        }

        #tabContent .text-gray-100,
        #tabContent .text-gray-200,
        #tabContent .text-gray-300,
        #tabContent .text-gray-400,
        #tabContent .text-gray-500,
        #tabContent .text-gray-600,
        #tabContent .text-red-200,
        #tabContent .text-red-300,
        #tabContent .text-red-400,
        #tabContent .text-indigo-200,
        #tabContent .text-indigo-300,
        #tabContent .text-indigo-400,
        #tabContent .text-blue-200,
        #tabContent .text-blue-300,
        #tabContent .text-blue-400 {
            color: #5c6b82 !important;
        }

        #tabContent .text-white {
            color: #ffffff !important;
        }

        #tabContent .bg-blue-900\/30,
        #tabContent .bg-blue-900,
        #tabContent .bg-red-900\/30,
        #tabContent .bg-red-900,
        #tabContent .bg-indigo-900,
        #tabContent .bg-indigo-800,
        #tabContent .bg-yellow-900\/30 {
            background: #eef3ff !important;
            color: #3a4963 !important;
            border-color: #ccd8f5 !important;
        }

        #tabContent .bg-blue-600,
        #tabContent .bg-indigo-600,
        #tabContent .bg-purple-600 {
            background: #5b5ce2 !important;
            color: #ffffff !important;
            border: 1px solid #4f50cb !important;
        }

        #tabContent .bg-green-600 {
            background: #16a56f !important;
            color: #ffffff !important;
            border: 1px solid #128a5e !important;
        }

        #tabContent .bg-red-600,
        #tabContent .bg-red-700,
        #tabContent .bg-red-800,
        #tabContent .bg-red-900 {
            background: #e53935 !important;
            color: #ffffff !important;
            border: 1px solid #cf2f2b !important;
        }

        #tabContent .bg-yellow-500,
        #tabContent .bg-yellow-600 {
            background: #f6bd16 !important;
            color: #332700 !important;
            border: 1px solid #e0aa0e !important;
        }

        #tabContent button,
        #tabContent .admin-write,
        #tabContent a[class*="bg-"] {
            font-weight: 800;
        }

        #tabContent pre {
            background: #f7f9fd !important;
            color: #41516b !important;
            border-color: #dce3ef !important;
        }

        #tabContent [class*="rounded-lg"],
        #tabContent [class*="rounded-xl"] {
            border-radius: 12px !important;
        }

        @media (max-width: 1100px) {
            .admin-shell {
                grid-template-columns: 1fr;
            }

            .side {
                border-right: 0;
                border-bottom: 1px solid var(--line);
                padding-bottom: 8px;
            }

            #tabMenu {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 8px;
            }

            .topbar {
                position: static;
            }

            #tabContent {
                min-height: 50vh;
            }
        }
    </style>
</head>
<body>
    <div class="admin-shell">
        <aside class="side">
            <div class="brand">
                <img class="brand-mark" src="/static/clever-cloud.png" alt="CleverSearch logo" loading="eager" />
                <div>
                    <div class="text-base font-extrabold text-slate-800">CleverSearch</div>
                    <div class="text-xs text-slate-500">Administrator</div>
                </div>
            </div>
            <div id="tabMenuContainer"></div>
        </aside>

        <div>
            <header class="topbar">
                <div class="text-lg font-extrabold tracking-tight">Admin Console</div>
                <div class="flex items-center gap-2">
                    <span class="pill" id="loggedInUser">-</span>
                    <a href="/" class="btn-top px-3 py-2 text-sm">검색 페이지</a>
                    <button onclick="logoutJwt()" class="btn-top px-3 py-2 text-sm">로그아웃</button>
                </div>
            </header>

            <main class="content-wrap">
                <div id="tabContent"></div>
            </main>
        </div>
    </div>

    <script>
        const _ORIGIN = window.location.origin;
        const API = `${_ORIGIN}/api/v1/admin`;
        const FILE_API = `${_ORIGIN}/api/v1/user/file`;
        const SYS_API = `${_ORIGIN}/api/v1/admin/system`;
        const AUTH_API = `${_ORIGIN}/api/v1/common/auth`;

        let accessToken = localStorage.getItem("cleversearch_admin_token") || "";
        let refreshToken = localStorage.getItem("cleversearch_admin_refresh_token") || "";
        let loggedInUsername = localStorage.getItem("cleversearch_admin_username") || "";
        let loggedInRole = localStorage.getItem("cleversearch_admin_role") || "viewer";

        const TAB_NAMES = [
            "dashboard", "docs", "upload", "popular", "logs", "recent", "failed",
            "dictionary", "smb", "dbsources", "scheduler", "ssl", "scoring", "reset"
        ];

        const tabInitMap = {
            dashboard: () => { if (typeof loadDashboard === "function") loadDashboard(); },
            docs: () => { if (typeof loadDocs === "function") loadDocs(); },
            upload: () => { if (typeof setupUpload === "function") setupUpload(); },
            popular: () => { if (typeof loadPopular === "function") loadPopular(); },
            logs: () => { if (typeof loadLogs === "function") loadLogs(); },
            recent: () => { if (typeof loadRecent === "function") loadRecent(); },
            failed: () => { if (typeof loadFailed === "function") loadFailed(); },
            dictionary: () => { if (typeof loadDictionaryEntries === "function") loadDictionaryEntries(); },
            smb: () => { if (typeof loadSmbSources === "function") loadSmbSources(); },
            dbsources: () => { if (typeof loadDbSources === "function") loadDbSources(); },
            scheduler: () => { if (typeof loadSchedulerStatus === "function") loadSchedulerStatus(); },
            ssl: () => { if (typeof scanCertificates === "function") scanCertificates(); },
            scoring: () => { if (typeof loadScoringWeights === "function") loadScoringWeights(); },
            reset: null
        };

        let activeTab = "dashboard";

        function resolveInitialTab() {
            const fromHash = (window.location.hash || "").replace(/^#/, "").trim();
            if (TAB_NAMES.includes(fromHash)) return fromHash;

            const fromStorage = localStorage.getItem("cleversearch_admin_active_tab") || "";
            if (TAB_NAMES.includes(fromStorage)) return fromStorage;

            return "dashboard";
        }

        function persistActiveTab(tabName) {
            if (!TAB_NAMES.includes(tabName)) return;
            localStorage.setItem("cleversearch_admin_active_tab", tabName);
            if (window.location.hash !== `#${tabName}`) {
                window.history.replaceState(null, "", `#${tabName}`);
            }
        }

        function forceLoginRedirect() {
            window.location.replace("/static/admin/login.html");
        }

        async function logoutJwt() {
            try {
                if (accessToken) {
                    await fetch(`${AUTH_API}/logout`, {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${accessToken}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ refresh_token: refreshToken || null })
                    });
                }
            } catch (e) {
                // network error on logout is non-fatal for local session cleanup
            }

            accessToken = "";
            refreshToken = "";
            loggedInUsername = "";
            loggedInRole = "viewer";
            localStorage.removeItem("cleversearch_admin_token");
            localStorage.removeItem("cleversearch_admin_refresh_token");
            localStorage.removeItem("cleversearch_admin_username");
            localStorage.removeItem("cleversearch_admin_role");
            forceLoginRedirect();
        }

        async function apiFetch(url, options = {}) {
            const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
            if (accessToken) headers["Authorization"] = `Bearer ${accessToken}`;

            let slowNoticeTimer = null;
            slowNoticeTimer = setTimeout(() => {
                const msg = "요청이 지연되고 있습니다. 네트워크 또는 서버 상태를 확인해 주세요.";
                const target = document.getElementById("tabContent");
                if (target) {
                    const prev = target.querySelector("#apiSlowNotice");
                    if (!prev) {
                        const notice = document.createElement("div");
                        notice.id = "apiSlowNotice";
                        notice.className = "mb-3 rounded-lg border border-amber-300 bg-amber-50 px-3 py-2 text-sm text-amber-800";
                        notice.textContent = msg;
                        target.prepend(notice);
                    }
                }
            }, 10000);

            try {
                const res = await fetch(url, { ...options, headers });
                if (res.status === 401) {
                    await logoutJwt();
                    return { ok: false, status: 401, data: { detail: "세션 만료" } };
                }
                const data = await res.json().catch(() => ({ raw: "json parse fail" }));
                return { ok: res.ok, status: res.status, data };
            } catch (e) {
                return { ok: false, status: 0, data: { detail: "서버 연결 실패" } };
            } finally {
                if (slowNoticeTimer) clearTimeout(slowNoticeTimer);
                const notice = document.getElementById("apiSlowNotice");
                if (notice) notice.remove();
            }
        }

        function fmt(v) { return (v === null || v === undefined || v === "") ? "-" : v; }
        function yesNo(v) { return v ? "Y" : "N"; }

        function writeJson(id, payload) {
            const el = document.getElementById(id);
            if (el) el.textContent = JSON.stringify(payload, null, 2);
        }

        function applyButtonPreset(button, text) {
            button.classList.remove(
                "btn-primary", "btn-secondary", "btn-success", "btn-danger-solid", "btn-warning", "btn-info"
            );

            if (/삭제|초기화|중지|복원/.test(text)) {
                button.classList.add("btn-danger-solid");
                return;
            }
            if (/저장|적용|생성|업로드/.test(text)) {
                button.classList.add("btn-primary");
                return;
            }
            if (/실행|시작|동기화/.test(text)) {
                button.classList.add("btn-success");
                return;
            }
            if (/상태|조회|전환|토글|추천|디버그/.test(text)) {
                button.classList.add("btn-secondary");
                return;
            }
            button.classList.add("btn-soft");
        }

        function normalizeTabUi(container) {
            container.querySelectorAll("button").forEach(button => {
                if (button.classList.contains("tab")) return;

                button.classList.add("btn-unified");
                const text = (button.textContent || "").replace(/\s+/g, "").trim();
                applyButtonPreset(button, text);
            });
        }

        async function loadTabHtml(tabName) {
            try {
                const tabUrl = `/static/admin/${encodeURIComponent(tabName)}.html?v=${Date.now()}`;
                const res = await fetch(tabUrl, { cache: "no-store" });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return await res.text();
            } catch (e) {
                return `<div class="text-red-600 p-4">탭 로드 실패: ${tabName} (${e.message})</div>`;
            }
        }

        async function switchTab(tabName) {
            if (!TAB_NAMES.includes(tabName)) {
                tabName = "dashboard";
            }
            activeTab = tabName;
            persistActiveTab(tabName);
            document.querySelectorAll("#tabMenuContainer .tab").forEach(btn => {
                btn.classList.toggle("active", btn.dataset.tab === tabName);
            });

            const container = document.getElementById("tabContent");
            container.innerHTML = '<div class="text-slate-500 p-4">로딩 중...</div>';
            const html = await loadTabHtml(tabName);
            container.innerHTML = html;

            container.querySelectorAll("script").forEach(oldScript => {
                const newScript = document.createElement("script");
                if (oldScript.src) {
                    newScript.src = oldScript.src;
                } else {
                    newScript.textContent = oldScript.textContent;
                }
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });

            normalizeTabUi(container);

            if (loggedInRole === "viewer") {
                container.querySelectorAll(".admin-write").forEach(btn => {
                    btn.disabled = true;
                    btn.classList.add("opacity-40", "cursor-not-allowed");
                    btn.title = "viewer 권한으로는 사용할 수 없습니다";
                });
                const dz = document.getElementById("dropZone");
                if (dz) {
                    dz.style.pointerEvents = "none";
                    dz.classList.add("opacity-40");
                }
            }

            const initFn = tabInitMap[tabName];
            if (initFn) initFn();
        }

        async function loadMenu() {
            const container = document.getElementById("tabMenuContainer");
            try {
                const res = await fetch("/static/admin/menu.html");
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                container.innerHTML = await res.text();
            } catch (e) {
                container.innerHTML = `<div id="tabMenu">${TAB_NAMES.map((name, i) =>
                    `<button class="tab ${i===0?"active":""}" data-tab="${name}">${name}</button>`
                ).join("")}</div>`;
            }

            container.querySelectorAll(".tab").forEach(btn => {
                btn.addEventListener("click", () => switchTab(btn.dataset.tab));
            });
        }

        function toggleDictView() {
            const j = document.getElementById("dictionaryOutput");
            const l = document.getElementById("dictionaryList");
            if (j) j.classList.toggle("hidden");
            if (l) l.classList.toggle("hidden");
        }

        function toggleSmbView() {
            const j = document.getElementById("smbOutput");
            const l = document.getElementById("smbList");
            if (j) j.classList.toggle("hidden");
            if (l) l.classList.toggle("hidden");
        }

        function toggleDbView() {
            const j = document.getElementById("dbOutput");
            const l = document.getElementById("dbList");
            if (j) j.classList.toggle("hidden");
            if (l) l.classList.toggle("hidden");
        }

        function toggleSchedulerView() {
            const j = document.getElementById("schedulerOutput");
            const l = document.getElementById("schedulerList");
            if (j) j.classList.toggle("hidden");
            if (l) l.classList.toggle("hidden");
        }

        function toggleSslView() {
            const j = document.getElementById("sslOutput");
            const l = document.getElementById("sslList");
            if (j) j.classList.toggle("hidden");
            if (l) l.classList.toggle("hidden");
        }

        async function initAdmin() {
            document.getElementById("loggedInUser").textContent = loggedInUsername || "admin";
            await loadMenu();
            await switchTab(resolveInitialTab());
        }

        window.addEventListener("hashchange", () => {
            const fromHash = (window.location.hash || "").replace(/^#/, "").trim();
            if (TAB_NAMES.includes(fromHash) && fromHash !== activeTab) {
                switchTab(fromHash);
            }
        });

        if (!accessToken) {
            forceLoginRedirect();
        } else {
            initAdmin();
        }
    </script>
</body>
</html>
