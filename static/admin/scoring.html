<!-- 검색 품질 탭 -->
<div class="bg-blue-900/30 border border-blue-700 rounded-lg p-3 mb-4 text-sm text-blue-200">
    <b><span aria-hidden="true">📊</span> 검색 품질 관리란?</b> 검색 결과의 순서를 정하는 점수 규칙(가중치)을 조정하는 메뉴입니다.<br>
    • <b>제목 가중치 ↑</b>: 제목에 검색어가 있는 문서가 더 위로 올라옵니다.<br>
    • <b>본문 가중치 ↑</b>: 본문 일치 문서가 더 위로 올라옵니다.<br>
    • <b>AI 벡터 ↑</b>: 의미가 비슷한 문서가 더 위로 올라옵니다.<br>
    • <b>최소 점수(min_score) ↑</b>: 관련도 낮은 문서를 더 많이 걸러냅니다.<br>
    • <b>한 줄 요약</b>: 가중치를 바꾸면 어떤 문서를 상단에 보여줄지가 달라집니다.
</div>

<div class="grid md:grid-cols-2 gap-4 mb-4">
    <div class="bg-gray-800 border border-gray-700 rounded-lg p-4">
        <h3 class="text-lg font-extrabold mb-4 text-yellow-400">가중치 설정</h3>
        <div class="space-y-3 text-sm">
            <div class="flex items-center gap-2">
                <label class="w-28 text-gray-100 font-medium">제목 구문</label>
                <input id="w_title_phrase" type="number" min="0" max="100" step="1" value="20" class="bg-gray-900 border border-gray-600 rounded px-2 py-1 w-20 text-sm" />
                <input type="range" min="0" max="100" step="1" value="20" class="flex-1 js-sync-range" data-target="w_title_phrase" />
            </div>
            <div class="flex items-center gap-2">
                <label class="w-28 text-gray-100 font-medium">제목 AND</label>
                <input id="w_title_and" type="number" min="0" max="100" step="1" value="10" class="bg-gray-900 border border-gray-600 rounded px-2 py-1 w-20 text-sm" />
                <input type="range" min="0" max="100" step="1" value="10" class="flex-1 js-sync-range" data-target="w_title_and" />
            </div>
            <div class="flex items-center gap-2">
                <label class="w-28 text-gray-100 font-medium">본문 구문</label>
                <input id="w_content_phrase" type="number" min="0" max="100" step="1" value="5" class="bg-gray-900 border border-gray-600 rounded px-2 py-1 w-20 text-sm" />
                <input type="range" min="0" max="100" step="1" value="5" class="flex-1 js-sync-range" data-target="w_content_phrase" />
            </div>
            <div class="flex items-center gap-2">
                <label class="w-28 text-gray-100 font-medium">본문 AND</label>
                <input id="w_content_and" type="number" min="0" max="100" step="1" value="1" class="bg-gray-900 border border-gray-600 rounded px-2 py-1 w-20 text-sm" />
                <input type="range" min="0" max="100" step="1" value="1" class="flex-1 js-sync-range" data-target="w_content_and" />
            </div>
            <div class="flex items-center gap-2">
                <label class="w-28 text-gray-100 font-medium">AI 벡터</label>
                <input id="w_vector" type="number" min="0" max="50" step="0.1" value="1.0" class="bg-gray-900 border border-gray-600 rounded px-2 py-1 w-20 text-sm" />
                <input type="range" min="0" max="50" step="0.1" value="1.0" class="flex-1 js-sync-range" data-target="w_vector" />
            </div>
            <div class="flex items-center gap-2">
                <label class="w-28 text-gray-100 font-medium">초성</label>
                <input id="w_chosung" type="number" min="0" max="100" step="1" value="10" class="bg-gray-900 border border-gray-600 rounded px-2 py-1 w-20 text-sm" />
                <input type="range" min="0" max="100" step="1" value="10" class="flex-1 js-sync-range" data-target="w_chosung" />
            </div>
            <div class="flex items-center gap-2">
                <label class="w-28 text-gray-100 font-medium">최소 점수</label>
                <input id="w_min_score" type="number" min="0" max="10" step="0.0001" value="0.0058" class="bg-gray-900 border border-gray-600 rounded px-2 py-1 w-20 text-sm" />
            </div>
        </div>
        <div class="flex gap-2 mt-3">
            <button id="saveScoringBtn" type="button" class="admin-write px-3 py-1 rounded bg-blue-600 hover:bg-blue-500 text-sm">저장</button>
            <button id="resetScoringBtn" type="button" class="admin-write px-3 py-1 rounded bg-red-700 hover:bg-red-600 text-sm">초기값 복원</button>
        </div>
    </div>

    <div class="bg-gray-800 border border-gray-700 rounded-lg p-4">
        <h3 class="text-lg font-extrabold mb-4 text-green-400">검색 품질 평가</h3>
        <p class="text-xs text-gray-400 mb-2">검색어와 기대 결과를 입력하고 평가를 실행합니다.</p>
        <textarea id="scoringTestCases" rows="8" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-xs font-mono" placeholder='[
  {"query": "연구개발계획서", "expected_title": "연구개발계획서"},
  {"query": "보안", "expected_title": "보안"},
  {"query": "AI개발", "expected_title": "AI개발진행"}
]'>[
  {"query": "연구개발계획서", "expected_title": "연구개발계획서"},
  {"query": "보안", "expected_title": "보안"},
  {"query": "AI개발", "expected_title": "AI개발진행"},
  {"query": "통합검색", "expected_title": "통합검색솔루션"},
  {"query": "운영지침", "expected_title": "운영지침"}
]</textarea>
        <button id="runScoringEvalBtn" type="button" class="admin-write px-3 py-1 rounded bg-green-700 hover:bg-green-600 text-sm mt-2">평가 실행</button>
    </div>
</div>

<pre id="scoringOutput" class="bg-gray-900 border border-gray-700 rounded p-3 text-xs overflow-auto"></pre>

<script>
async function loadScoringWeights() {
    const result = await apiFetch(`${SYS_API}/scoring/weights`, { method: "GET" });
    if (result.data) {
        const d = result.data;
        document.getElementById("w_title_phrase").value = d.title_phrase ?? 20;
        document.getElementById("w_title_and").value = d.title_and ?? 10;
        document.getElementById("w_content_phrase").value = d.content_phrase ?? 5;
        document.getElementById("w_content_and").value = d.content_and ?? 1;
        document.getElementById("w_vector").value = d.vector ?? 1.0;
        document.getElementById("w_chosung").value = d.chosung ?? 10;
        document.getElementById("w_min_score").value = d.min_score ?? 0.0058;
        /* 슬라이더 동기화 */
        document.querySelectorAll("#tabContent input[type=range]").forEach(slider => {
            const numInput = slider.parentElement.querySelector("input[type=number]");
            if (numInput) slider.value = numInput.value;
        });
    }
}

async function saveScoringWeights() {
    const payload = {
        title_phrase: parseFloat(document.getElementById("w_title_phrase").value),
        title_and: parseFloat(document.getElementById("w_title_and").value),
        content_phrase: parseFloat(document.getElementById("w_content_phrase").value),
        content_and: parseFloat(document.getElementById("w_content_and").value),
        vector: parseFloat(document.getElementById("w_vector").value),
        chosung: parseFloat(document.getElementById("w_chosung").value),
        min_score: parseFloat(document.getElementById("w_min_score").value),
    };
    const result = await apiFetch(`${SYS_API}/scoring/weights`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });
    writeJson("scoringOutput", result.data || result);
    if (result.ok) alert("가중치가 저장되었습니다.");
}

async function resetScoringWeights() {
    if (!confirm("검색 가중치를 초기값으로 복원합니다. 계속하시겠습니까?")) return;
    const result = await apiFetch(`${SYS_API}/scoring/reset`, { method: "POST" });
    writeJson("scoringOutput", result.data || result);
    loadScoringWeights();
    alert("초기값으로 복원되었습니다.");
}

async function runScoringEvaluation() {
    let testCases;
    try {
        testCases = JSON.parse(document.getElementById("scoringTestCases").value);
    } catch (e) {
        alert("JSON 형식이 올바르지 않습니다.");
        return;
    }
    writeJson("scoringOutput", "평가 실행 중...");
    const result = await apiFetch(`${SYS_API}/scoring/evaluate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ test_cases: testCases })
    });
    if (result.data) {
        const d = result.data;
        let report = `검색 품질 평가 결과\n`;
        report += `합계: ${d.total}건 | 통과: ${d.passed}건 | 실패: ${d.failed}건 | 통과율: ${d.pass_rate}%\n\n`;
        (d.details || []).forEach((r, i) => {
            const icon = r.found ? "✅" : "❌";
            report += `${icon} [${i+1}] "${r.query}" -> ${r.result_count}건, 최고점수: ${r.top_score}\n`;
            report += `   기대: "${r.expected}" | 상위결과: ${(r.top_titles||[]).join(", ")}\n`;
        });
        document.getElementById("scoringOutput").textContent = report;
    } else {
        writeJson("scoringOutput", result);
    }
}

function bindScoringActions() {
    document.querySelectorAll(".js-sync-range").forEach((slider) => {
        if (slider.dataset.bound === "1") return;
        slider.dataset.bound = "1";
        slider.addEventListener("input", () => {
            const targetId = slider.dataset.target;
            const target = targetId ? document.getElementById(targetId) : null;
            if (target) target.value = slider.value;
        });
    });

    document.getElementById("saveScoringBtn")?.addEventListener("click", saveScoringWeights);
    document.getElementById("resetScoringBtn")?.addEventListener("click", resetScoringWeights);
    document.getElementById("runScoringEvalBtn")?.addEventListener("click", runScoringEvaluation);
}

bindScoringActions();
</script>
