<!-- 대시보드 탭 -->
<section class="space-y-4">
    <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
            <h2 class="text-2xl font-extrabold text-slate-800">Dashboard</h2>
            <p class="text-sm text-slate-500">운영 현황을 카드/차트 중심으로 확인합니다.</p>
        </div>
        <div class="flex flex-wrap gap-2">
            <input id="dashboardDays" type="number" min="1" value="7" class="w-20" />
            <button onclick="loadDashboard()" class="btn-primary px-3 py-2 text-sm">새로고침</button>
            <button onclick="runSmokeFromUI()" class="btn-soft px-3 py-2 text-sm">스모크 실행</button>
            <button onclick="toggleDashboardDebug()" class="btn-soft px-3 py-2 text-sm">디버그</button>
        </div>
    </div>

    <div id="alertBadges" class="flex flex-wrap gap-2"></div>

    <div class="grid gap-3 md:grid-cols-4">
        <div class="metric"><div class="metric-label">TOTAL LOGS</div><div class="metric-value" id="mTotalLogs">0</div></div>
        <div class="metric"><div class="metric-label">FAILED LOGS</div><div class="metric-value" id="mFailedLogs">0</div></div>
        <div class="metric"><div class="metric-label">FAILURE RATE</div><div class="metric-value" id="mFailureRate">0%</div></div>
        <div class="metric"><div class="metric-label">SCHEDULER</div><div class="metric-value" id="mScheduler">stopped</div></div>
    </div>

    <div class="grid gap-3 lg:grid-cols-3">
        <div class="lg:col-span-2 rounded-xl border border-slate-200 bg-white p-4">
            <h4 class="mb-2 text-sm font-extrabold text-slate-700">Site Visits Trend</h4>
            <canvas id="trendChart" height="150"></canvas>
        </div>
        <div class="rounded-xl border border-slate-200 bg-white p-4">
            <h4 class="mb-2 text-sm font-extrabold text-slate-700">Top Keywords</h4>
            <canvas id="keywordChart" height="150"></canvas>
        </div>
    </div>

    <pre id="dashboardHealth" class="hidden rounded-xl border border-slate-200 bg-slate-50 p-3 text-xs text-slate-700 overflow-auto"></pre>
    <pre id="dashboardSummary" class="hidden rounded-xl border border-slate-200 bg-slate-50 p-3 text-xs text-slate-700 overflow-auto"></pre>
    <pre id="dashboardTrend" class="hidden rounded-xl border border-slate-200 bg-slate-50 p-3 text-xs text-slate-700 overflow-auto"></pre>
    <pre id="smokeOutput" class="rounded-xl border border-slate-200 bg-slate-50 p-3 text-xs text-slate-700 overflow-auto"></pre>
</section>

<script>
let trendChart = null;
let keywordChart = null;

function toggleDashboardDebug() {
    ["dashboardHealth", "dashboardSummary", "dashboardTrend"].forEach((id) => {
        document.getElementById(id).classList.toggle("hidden");
    });
}

function renderAlertBadges(rows) {
    const container = document.getElementById("alertBadges");
    const data = Array.isArray(rows) ? rows : [];
    container.innerHTML = data.map((row) => {
        const severity = row.severity || "info";
        const message = row.message || row.code || "알림";
        return `<span class="badge ${severity}">${message}</span>`;
    }).join("");
}

function drawTrendChart(trendRows) {
    const labels = (trendRows || []).map(row => row.date);
    const success = (trendRows || []).map(row => row.success || 0);
    const failed = (trendRows || []).map(row => row.failed || 0);
    const ctx = document.getElementById("trendChart").getContext("2d");
    if (trendChart) trendChart.destroy();
    trendChart = new Chart(ctx, {
        type: "bar",
        data: { labels, datasets: [
            { label: "성공", data: success, backgroundColor: "rgba(34,197,94,0.7)" },
            { label: "실패", data: failed, backgroundColor: "rgba(239,68,68,0.7)" }
        ]},
        options: { responsive: true, plugins: { legend: { labels: { color: "#e5e7eb" } } }, scales: { x: { ticks: { color: "#9ca3af" } }, y: { ticks: { color: "#9ca3af" } } } }
    });
}

function drawKeywordChart(summary) {
    const rows = (summary?.top_keywords || []).slice(0, 5);
    const labels = rows.map(row => row.keyword);
    const values = rows.map(row => row.count);
    const ctx = document.getElementById("keywordChart").getContext("2d");
    if (keywordChart) keywordChart.destroy();
    keywordChart = new Chart(ctx, {
        type: "doughnut",
        data: { labels, datasets: [{ data: values, backgroundColor: ["#60a5fa", "#34d399", "#fbbf24", "#f87171", "#a78bfa"] }] },
        options: { plugins: { legend: { labels: { color: "#e5e7eb" } } } }
    });
}

async function loadDashboard() {
    const days = document.getElementById("dashboardDays").value || 7;
    const health = await apiFetch(`${SYS_API}/health/overview`, { method: "GET" });
    const summary = await apiFetch(`${SYS_API}/dashboard/summary?days=${days}`, { method: "GET" });
    const trend = await apiFetch(`${SYS_API}/dashboard/trend?days=${days}`, { method: "GET" });
    const alerts = await apiFetch(`${SYS_API}/dashboard/alerts?cert_warn_days=7&spike_ratio=1.5`, { method: "GET" });
    writeJson("dashboardHealth", health.data);
    writeJson("dashboardSummary", summary.data);
    writeJson("dashboardTrend", trend.data);
    renderAlertBadges(alerts.data || []);
    document.getElementById("mTotalLogs").innerText = String(summary.data?.total_logs || 0);
    document.getElementById("mFailedLogs").innerText = String(summary.data?.failed_logs || 0);
    document.getElementById("mFailureRate").innerText = `${((summary.data?.failure_rate || 0) * 100).toFixed(1)}%`;
    document.getElementById("mScheduler").innerText = (health.data?.scheduler?.running ? "running" : "stopped");
    drawTrendChart(trend.data || []);
    drawKeywordChart(summary.data || {});
}

async function runSmokeFromUI() {
    const result = await apiFetch(`${SYS_API}/ops/run-smoke-test`, { method: "POST" });
    writeJson("smokeOutput", result.data || result);
}
</script>
