<!--
########################################################
# Description
# CleverSearch 관리자 페이지 - 파일 감시 탭
# 실시간 파일 변경 감지 워처 제어 및 상태 확인
# SMB 소스별 개별 감시 시작/중지 지원
#
# Modified History
# 현승준 / 2026-04-08 / 최초생성
# 현승준 / 2026-04-15 / 소스별 개별 감시 기능 추가, 테이블 UI
########################################################
-->

<!-- 파일 감시 탭 -->
<div class="bg-blue-900/30 border border-blue-700 rounded-lg p-3 mb-4 text-sm text-blue-200">
    <b>👁 파일 감시란?</b> SMB/SSH 소스의 파일 변경(추가/수정/삭제)을 실시간으로 감지하여 자동 색인합니다.<br>
    • 소스별로 개별 감시를 시작/중지할 수 있습니다.<br>
    • 변경 감지 시 해시 기반 증분 색인이 자동 수행됩니다.<br>
    • <b>전체 시작</b> 버튼을 누르면 모든 활성 소스의 감시를 한번에 시작합니다.
</div>

<!-- 워처 전체 제어 -->
<div class="flex gap-2 mb-4 items-center">
    <button id="watcherStartAllBtn" type="button" class="px-5 py-2 rounded-lg bg-green-600 hover:bg-green-500 text-white text-sm font-bold shadow-sm transition-colors">전체 시작</button>
    <button id="watcherStopAllBtn" type="button" class="px-5 py-2 rounded-lg bg-red-600 hover:bg-red-500 text-white text-sm font-bold shadow-sm transition-colors">전체 중지</button>
    <span id="watcherStatusBadge" class="ml-2 px-3 py-1 rounded-full text-xs font-bold"></span>
    <span id="watcherSummary" class="ml-auto text-xs text-gray-400"></span>
</div>

<!-- 소스별 감시 테이블 -->
<div class="bg-white rounded-xl shadow-md overflow-hidden">
    <table class="w-full text-sm">
        <thead>
            <tr class="text-gray-500 text-left bg-gray-50 border-b border-gray-200">
                <th class="px-4 py-3 font-semibold">타입</th>
                <th class="px-4 py-3 font-semibold">소스명</th>
                <th class="px-4 py-3 font-semibold">경로</th>
                <th class="px-4 py-3 font-semibold text-center">소스 상태</th>
                <th class="px-4 py-3 font-semibold text-center">감시 상태</th>
                <th class="px-4 py-3 font-semibold text-center">작업</th>
            </tr>
        </thead>
        <tbody id="watcherBody"></tbody>
    </table>
    <div id="watcherEmpty" class="hidden p-10 text-center text-gray-400 text-sm">
        등록된 SMB/SSH 소스가 없습니다. SMB 색인 탭에서 소스를 먼저 등록하세요.
    </div>
</div>

<pre id="watcherOutput" class="bg-gray-900 border border-gray-700 rounded p-3 text-xs overflow-auto hidden mt-3"></pre>

<script>
var _watcherSources = [];
var _watcherRunningMap = {};

function watcherTypeBadge(connType) {
    if (connType === "ssh") {
        return '<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700">SSH</span>';
    }
    return '<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-blue-100 text-blue-700">SMB</span>';
}

function watcherTypeIcon(connType) {
    return connType === "ssh" ? "🔐" : "📁";
}

function renderWatcherTable() {
    var body = document.getElementById("watcherBody");
    var empty = document.getElementById("watcherEmpty");
    if (!body) return;

    if (_watcherSources.length === 0) {
        body.innerHTML = "";
        if (empty) empty.classList.remove("hidden");
        return;
    }
    if (empty) empty.classList.add("hidden");

    body.innerHTML = _watcherSources.map(function(r) {
        var safeId = Number(r.id);
        var connType = r.connection_type || "smb";
        var isSsh = connType === "ssh";
        var isRunning = !!_watcherRunningMap[safeId];
        var pathDisplay = isSsh ? (fmt(r.ssh_host || "") + ":" + fmt(r.share_path)) : fmt(r.share_path);

        var activeBadge = r.is_active
            ? '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-bold bg-green-100 text-green-700"><svg class="w-2.5 h-2.5" viewBox="0 0 10 10"><circle cx="5" cy="5" r="5" fill="currentColor"/></svg>활성</span>'
            : '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-bold bg-red-100 text-red-600"><svg class="w-2.5 h-2.5" viewBox="0 0 10 10"><circle cx="5" cy="5" r="5" fill="currentColor"/></svg>비활성</span>';

        var watchBadge = isRunning
            ? '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-bold bg-green-100 text-green-700"><svg class="w-2.5 h-2.5" viewBox="0 0 10 10"><circle cx="5" cy="5" r="5" fill="currentColor"/></svg>감시 중</span>'
            : '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-bold bg-gray-200 text-gray-500"><svg class="w-2.5 h-2.5" viewBox="0 0 10 10"><circle cx="5" cy="5" r="5" fill="currentColor"/></svg>중지됨</span>';

        var actionBtn = isRunning
            ? '<button class="js-watcher-stop px-3 py-1.5 rounded-lg text-xs font-bold bg-red-600 hover:bg-red-500 text-white shadow-sm transition-colors" data-id="' + safeId + '">중지</button>'
            : '<button class="js-watcher-start px-3 py-1.5 rounded-lg text-xs font-bold bg-green-600 hover:bg-green-500 text-white shadow-sm transition-colors" data-id="' + safeId + '">시작</button>';

        var rowBg = isRunning ? "" : " bg-gray-50";

        return '<tr class="border-t border-gray-100 hover:bg-blue-50/40 transition-colors' + rowBg + '">' +
            '<td class="px-4 py-3"><span class="text-lg mr-1.5">' + watcherTypeIcon(connType) + '</span>' + watcherTypeBadge(connType) + '</td>' +
            '<td class="px-4 py-3 font-semibold text-gray-900">' + fmt(r.name) + ' <span class="text-xs text-gray-400 font-normal">#' + safeId + '</span></td>' +
            '<td class="px-4 py-3 text-xs text-gray-600 max-w-xs truncate" title="' + pathDisplay + '">' + pathDisplay + '</td>' +
            '<td class="px-4 py-3 text-center">' + activeBadge + '</td>' +
            '<td class="px-4 py-3 text-center">' + watchBadge + '</td>' +
            '<td class="px-4 py-3 text-center">' + actionBtn + '</td>' +
        '</tr>';
    }).join("");
}

function updateWatcherStatusBadge() {
    var runCount = Object.keys(_watcherRunningMap).length;
    var totalCount = _watcherSources.length;
    var badge = document.getElementById("watcherStatusBadge");
    var summary = document.getElementById("watcherSummary");

    if (badge) {
        if (runCount > 0) {
            badge.textContent = "● " + runCount + "개 감시 중";
            badge.className = "ml-2 px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700";
        } else {
            badge.textContent = "● 중지됨";
            badge.className = "ml-2 px-3 py-1 rounded-full text-xs font-bold bg-gray-200 text-gray-500";
        }
    }
    if (summary) {
        summary.textContent = "전체 " + totalCount + "개 소스";
    }
}

async function loadWatcherData() {
    try {
        var srcResult = await apiFetch(SYS_API + "/smb/sources?active_only=false", { method: "GET" });
        var statusResult = await apiFetch(SYS_API + "/watcher/status", { method: "GET" });

        _watcherSources = Array.isArray(srcResult.data) ? srcResult.data : [];

        var statusData = statusResult.data || {};
        _watcherRunningMap = {};
        var runningSources = Array.isArray(statusData.running_sources) ? statusData.running_sources : [];
        runningSources.forEach(function(s) { _watcherRunningMap[s.source_id] = true; });

        renderWatcherTable();
        updateWatcherStatusBadge();
    } catch (e) {
        var body = document.getElementById("watcherBody");
        if (body) body.innerHTML = '<tr><td class="px-4 py-3 text-red-500" colspan="6">데이터 로드 실패: ' + (e.message || e) + '</td></tr>';
    }
}

/* ── 이벤트 위임 ── */
(function() {
    var tableEl = document.getElementById("watcherBody");
    if (tableEl) {
        tableEl.addEventListener("click", async function(ev) {
            var startBtn = ev.target.closest(".js-watcher-start");
            if (startBtn) {
                var id = Number(startBtn.dataset.id);
                startBtn.textContent = "시작 중...";
                startBtn.disabled = true;
                var result = await apiFetch(SYS_API + "/watcher/source/" + id + "/start", { method: "POST" });
                if (result.ok && result.data && result.data.status === "started") {
                    await loadWatcherData();
                } else {
                    alert("감시 시작 실패: " + (result.data && (result.data.message || result.data.detail) || ""));
                    startBtn.textContent = "시작";
                    startBtn.disabled = false;
                }
                return;
            }

            var stopBtn = ev.target.closest(".js-watcher-stop");
            if (stopBtn) {
                var id = Number(stopBtn.dataset.id);
                stopBtn.textContent = "중지 중...";
                stopBtn.disabled = true;
                var result = await apiFetch(SYS_API + "/watcher/source/" + id + "/stop", { method: "POST" });
                if (result.ok && result.data && result.data.status === "stopped") {
                    await loadWatcherData();
                } else {
                    alert("감시 중지 실패: " + (result.data && (result.data.message || result.data.detail) || ""));
                    stopBtn.textContent = "중지";
                    stopBtn.disabled = false;
                }
                return;
            }
        });
    }
})();

document.getElementById("watcherStartAllBtn").addEventListener("click", async function() {
    var btn = document.getElementById("watcherStartAllBtn");
    btn.textContent = "시작 중...";
    btn.disabled = true;
    var result = await apiFetch(SYS_API + "/watcher/start", { method: "POST" });
    if (result.ok) {
        if (typeof showToast === "function") showToast("전체 감시가 시작되었습니다", "success");
    } else {
        alert("전체 시작 실패: " + (result.data && (result.data.message || result.data.detail) || ""));
    }
    btn.textContent = "전체 시작";
    btn.disabled = false;
    await loadWatcherData();
});

document.getElementById("watcherStopAllBtn").addEventListener("click", async function() {
    var btn = document.getElementById("watcherStopAllBtn");
    btn.textContent = "중지 중...";
    btn.disabled = true;
    var result = await apiFetch(SYS_API + "/watcher/stop", { method: "POST" });
    if (result.ok) {
        if (typeof showToast === "function") showToast("전체 감시가 중지되었습니다", "success");
    } else {
        alert("전체 중지 실패: " + (result.data && (result.data.message || result.data.detail) || ""));
    }
    btn.textContent = "전체 중지";
    btn.disabled = false;
    await loadWatcherData();
});

document.getElementById("watcherRefreshBtn")?.addEventListener("click", loadWatcherData);

/* ── 초기 로드 ── */
loadWatcherData();
</script>
