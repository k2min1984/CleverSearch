<!-- 검색 로그 탭 -->
<div class="bg-blue-900/30 border border-blue-700 rounded-lg p-3 mb-4 text-sm text-blue-200">
    <b>📊 검색 로그</b> — 모든 검색 이력을 시간순으로 표시합니다.<br>
    • 검색어, 결과 수, 성공/실패 여부, 사용자 ID, 시각 등을 확인할 수 있습니다.<br>
    • 실패(is_failed=Y)는 결과가 0건인 검색을 의미합니다.
</div>
<div class="flex gap-2 mb-3">
</div>
<div class="overflow-auto border border-gray-700 rounded">
    <table class="w-full text-sm">
        <thead class="bg-gray-800"><tr><th class="p-2 text-left">ID</th><th class="p-2 text-left">사용자</th><th class="p-2 text-left">검색어</th><th class="p-2 text-left">결과수</th><th class="p-2 text-left">실패</th><th class="p-2 text-left">시각</th></tr></thead>
        <tbody id="logsBody"></tbody>
    </table>
</div>

<script>
async function loadLogs() {
    const result = await apiFetch(`${API}/search-logs?skip=0&limit=100`, { method: "GET" });
    const data = result.data;
    const items = data.items || [];
    const body = document.getElementById("logsBody");
    body.innerHTML = items.map((row) =>
        `<tr class="border-t border-gray-700"><td class="p-2">${fmt(row.id)}</td><td class="p-2">${fmt(row.user_id)}</td><td class="p-2">${fmt(row.query)}</td><td class="p-2">${fmt(row.total_hits)}</td><td class="p-2">${yesNo(row.is_failed)}</td><td class="p-2">${fmt(row.created_at)}</td></tr>`
    ).join("") || '<tr><td class="p-2" colspan="6">데이터 없음</td></tr>';
}
</script>
