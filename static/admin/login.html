<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CleverSearch Admin Login</title>
    <link rel="icon" type="image/png" href="/static/clever-cloud.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { font-family: "Nunito", sans-serif; }
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 8% 15%, #d9dfff 0%, transparent 36%),
                        radial-gradient(circle at 92% 86%, #e8f0ff 0%, transparent 28%),
                        linear-gradient(150deg, #f4f6fc 0%, #e7ecf5 100%);
            display: grid;
            place-items: center;
        }
        .card {
            width: min(430px, 92vw);
            border-radius: 20px;
            border: 1px solid #dbe2ef;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 22px 50px rgba(45, 62, 95, 0.12);
            padding: 28px 24px 22px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }
        .mark {
            width: 52px;
            height: 52px;
            object-fit: contain;
            filter: drop-shadow(0 4px 10px rgba(30, 41, 59, 0.18));
        }
        .input {
            width: 100%;
            border: 1px solid #d4dceb;
            border-radius: 11px;
            padding: 10px 12px;
            font-size: 15px;
            color: #243047;
            outline: none;
        }
        .input:focus {
            border-color: #9ea8ff;
            box-shadow: 0 0 0 3px rgba(91, 92, 226, 0.15);
        }
        .login-btn {
            width: 100%;
            border: none;
            border-radius: 11px;
            padding: 11px 14px;
            background: linear-gradient(135deg, #5b5ce2, #6e63f1);
            color: #fff;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(91, 92, 226, 0.27);
            transition: transform .16s ease, box-shadow .16s ease;
        }
        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 20px rgba(91, 92, 226, 0.29);
        }
    </style>
</head>
<body>
    <form class="card" id="loginForm">
        <div class="brand">
            <img class="mark" src="/static/clever-cloud.png" alt="CleverSearch logo" loading="eager" />
            <div>
                <div class="text-lg font-extrabold text-slate-800">CleverSearch</div>
                <div class="text-xs text-slate-500">Administrator Login</div>
            </div>
        </div>

        <div class="text-sm text-slate-500 mb-5">세션이 없거나 만료되어 로그인 페이지로 이동되었습니다.</div>

        <div class="space-y-3">
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1">ID</label>
                <input id="loginUser" class="input" value="admin" autocomplete="username" />
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1">PASSWORD</label>
                <input id="loginPass" class="input" type="password" value="admin123!" autocomplete="current-password" />
            </div>
            <div id="loginError" class="hidden text-sm text-rose-600 font-semibold"></div>
            <button type="submit" class="login-btn">로그인</button>
        </div>

        <a href="/" class="block mt-4 text-center text-xs text-slate-500 hover:text-slate-700">검색 페이지로 이동</a>
    </form>

    <script>
        const AUTH_API = `${window.location.origin}/api/v1/common/auth`;
        const existingToken = localStorage.getItem("cleversearch_admin_token") || "";
        if (existingToken) {
            window.location.replace("/admin");
        }

        async function loginJwt(username, password) {
            const res = await fetch(`${AUTH_API}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });
            const payload = await res.json().catch(() => ({}));
            return { ok: res.ok, payload };
        }

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const errEl = document.getElementById("loginError");
            errEl.classList.add("hidden");

            const username = document.getElementById("loginUser").value.trim();
            const password = document.getElementById("loginPass").value;

            try {
                const { ok, payload } = await loginJwt(username, password);
                if (!ok || !payload.access_token) {
                    errEl.textContent = payload.detail || "로그인 실패: 계정 정보를 확인해 주세요.";
                    errEl.classList.remove("hidden");
                    return;
                }

                localStorage.setItem("cleversearch_admin_token", payload.access_token);
                localStorage.setItem("cleversearch_admin_refresh_token", payload.refresh_token || "");
                localStorage.setItem("cleversearch_admin_username", payload.username || username);
                localStorage.setItem("cleversearch_admin_role", payload.role || "viewer");
                localStorage.setItem("cleversearch_admin_active_tab", "dashboard");
                localStorage.setItem("cleversearch_admin_force_dashboard_once", "1");
                window.location.replace("/admin#dashboard");
            } catch (error) {
                errEl.textContent = "서버 연결 실패";
                errEl.classList.remove("hidden");
            }
        });
    </script>
</body>
</html>
