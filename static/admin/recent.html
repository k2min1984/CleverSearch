<!-- 최근 검색어 탭 -->
<div class="bg-blue-900/30 border border-blue-700 rounded-lg p-3 mb-4 text-sm text-blue-200">
    <b><span aria-hidden="true">🕐</span> 최근 검색어</b> — 사용자별 최근 검색어 목록을 표시합니다.<br>
    • <b>user_id</b> 입력 시 해당 사용자의 검색어만 필터링됩니다.<br>
    • 비워두면 전체 사용자의 최근 검색어를 표시합니다.
</div>
<div class="flex gap-2 mb-3">
    <input id="recentSearch" type="text" placeholder="사용자 / 검색어" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm w-72" />
    <span id="recentTotal" class="ml-auto text-sm font-bold text-slate-500"></span>
</div>
<div class="overflow-auto border border-gray-700 rounded">
    <table class="w-full text-sm">
        <thead class="bg-gray-800"><tr><th class="p-2 text-left">ID</th><th class="p-2 text-left">사용자</th><th class="p-2 text-left">검색어</th><th class="p-2 text-left">시각</th></tr></thead>
        <tbody id="recentBody"></tbody>
    </table>
</div>
<div id="recentPagination" class="hidden mt-2 flex items-center justify-center gap-2 text-sm"></div>

<script>
let recentRows = [];
let recentFilteredRows = [];
let recentPage = 1;
const RECENT_PAGE_SIZE = 10;

function applyRecentFilter() {
    const keyword = (document.getElementById("recentSearch")?.value || "").trim().toLowerCase();
    recentPage = 1;
    if (!keyword) {
        renderRecentRows(recentRows);
        return;
    }
    const filtered = recentRows.filter((row) => {
        const user = String(row?.user_id || "").toLowerCase();
        const query = String(row?.query || "").toLowerCase();
        return user.includes(keyword) || query.includes(keyword);
    });
    renderRecentRows(filtered);
}

function changeRecentPage(nextPage) {
    const totalPages = Math.max(1, Math.ceil(recentFilteredRows.length / RECENT_PAGE_SIZE));
    recentPage = Math.max(1, Math.min(totalPages, nextPage));
    renderRecentRows(recentFilteredRows);
}

function renderRecentPagination() {
    const pager = document.getElementById("recentPagination");
    if (!pager) return;
    if (recentFilteredRows.length <= RECENT_PAGE_SIZE) {
        pager.classList.add("hidden");
        pager.innerHTML = "";
        return;
    }
    const totalPages = Math.max(1, Math.ceil(recentFilteredRows.length / RECENT_PAGE_SIZE));
    pager.classList.remove("hidden");
    pager.innerHTML = `
        <button type="button" class="js-recent-page px-3 py-1 rounded border border-gray-500 text-sm ${recentPage === 1 ? "opacity-40 cursor-not-allowed" : ""}" ${recentPage === 1 ? "disabled" : ""} data-page="${recentPage - 1}">이전</button>
        <span class="text-slate-500 font-semibold">${recentPage} / ${totalPages}</span>
        <button type="button" class="js-recent-page px-3 py-1 rounded border border-gray-500 text-sm ${recentPage === totalPages ? "opacity-40 cursor-not-allowed" : ""}" ${recentPage === totalPages ? "disabled" : ""} data-page="${recentPage + 1}">다음</button>
    `;
}

function bindRecentPagination() {
    const pager = document.getElementById("recentPagination");
    if (!pager || pager.dataset.bound === "1") return;
    pager.dataset.bound = "1";
    pager.addEventListener("click", (event) => {
        const button = event.target.closest(".js-recent-page");
        if (!button) return;
        changeRecentPage(Number(button.dataset.page || 1));
    });
}

function renderRecentRows(rows) {
    const body = document.getElementById("recentBody");
    recentFilteredRows = Array.isArray(rows) ? rows : [];
    const totalPages = Math.max(1, Math.ceil(recentFilteredRows.length / RECENT_PAGE_SIZE));
    recentPage = Math.max(1, Math.min(totalPages, recentPage));
    const start = (recentPage - 1) * RECENT_PAGE_SIZE;
    const pageRows = recentFilteredRows.slice(start, start + RECENT_PAGE_SIZE);

    body.innerHTML = pageRows.map((row) =>
        `<tr class="border-t border-gray-700"><td class="p-2">${fmt(row.id)}</td><td class="p-2">${fmt(row.user_id)}</td><td class="p-2">${fmt(row.query)}</td><td class="p-2">${fmt(row.created_at)}</td></tr>`
    ).join("") || '<tr><td class="p-2" colspan="4">데이터 없음</td></tr>';

    renderRecentPagination();
}

async function loadRecent() {
    const result = await apiFetch(`${API}/recent-searches?skip=0&limit=500`, { method: "GET" });
    const data = result.data;
    recentRows = data.items || [];
    recentPage = 1;
    document.getElementById("recentTotal").textContent = `총 ${data.total || recentRows.length || 0}건`;
    applyRecentFilter();
}

document.getElementById("recentSearch")?.addEventListener("input", applyRecentFilter);
bindRecentPagination();
</script>
