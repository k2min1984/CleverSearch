<!-- SMB 색인 탭 -->
<div class="bg-blue-900/30 border border-blue-700 rounded-lg p-3 mb-4 text-sm text-blue-200">
    <b>📁 SMB 색인이란?</b> 네트워크 공유 폴더(SMB/CIFS)에 있는 파일을 자동으로 수집·색인합니다.<br>
    • <b>name</b>: 소스를 구분할 이름 (예: 본사공유, R&D자료실)<br>
    • <b>share_path</b>: SMB 경로 (예: \\\\server\\share\\docs)<br>
    • <b>username/password</b>: 인증이 필요한 경우 입력
</div>
<div class="grid md:grid-cols-5 gap-2 mb-3">
    <input id="smbName" placeholder="이름 (name)" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm" />
    <input id="smbPath" placeholder="경로 (share_path)" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm" />
    <input id="smbUser" placeholder="계정 (username)" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm" />
    <input id="smbPass" placeholder="비밀번호 (password)" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm" />
    <button onclick="upsertSmbSource()" class="admin-write px-3 py-1 rounded bg-blue-600 hover:bg-blue-500 text-sm">소스 저장</button>
</div>
<div class="flex gap-2 mb-3">
    <input id="smbSyncId" placeholder="동기화할 source_id" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm w-40" />
    <button onclick="syncSmbSource()" class="admin-write px-3 py-1 rounded bg-indigo-600 hover:bg-indigo-500 text-sm">즉시 동기화</button>
    <button onclick="loadSmbSources()" class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500 text-sm">목록 조회</button>
    <button onclick="toggleSmbView()" class="px-3 py-1 rounded bg-gray-700 hover:bg-gray-600 text-sm">JSON / 리스트 전환</button>
</div>
<div id="smbList" class="hidden">
    <table class="w-full text-sm"><thead><tr class="text-gray-400 text-left"><th class="p-2">ID</th><th class="p-2">이름</th><th class="p-2">경로</th><th class="p-2">활성</th><th class="p-2">최근 동기화</th><th class="p-2">관리</th></tr></thead><tbody id="smbBody"></tbody></table>
</div>
<pre id="smbOutput" class="bg-gray-900 border border-gray-700 rounded p-3 text-xs overflow-auto"></pre>

<script>
async function upsertSmbSource() {
    const payload = {
        name: document.getElementById("smbName").value,
        share_path: document.getElementById("smbPath").value,
        username: document.getElementById("smbUser").value || null,
        password: document.getElementById("smbPass").value || null,
        is_active: true
    };
    const result = await apiFetch(`${SYS_API}/smb/sources`, { method: "POST", body: JSON.stringify(payload) });
    writeJson("smbOutput", result);
}

async function loadSmbSources() {
    const result = await apiFetch(`${SYS_API}/smb/sources?active_only=false`, { method: "GET" });
    writeJson("smbOutput", result.data);
    populateSmbList(result.data);
}

async function syncSmbSource() {
    const sourceId = document.getElementById("smbSyncId").value;
    const result = await apiFetch(`${SYS_API}/smb/sources/${sourceId}/sync?max_files=200`, { method: "POST" });
    writeJson("smbOutput", result);
}

function toggleSmbView() {
    document.getElementById("smbOutput").classList.toggle("hidden");
    document.getElementById("smbList").classList.toggle("hidden");
}

function populateSmbList(data) {
    const body = document.getElementById("smbBody");
    if (!body || !Array.isArray(data)) return;
    const isViewer = loggedInRole === "viewer";
    body.innerHTML = data.map(r => {
        const editBtn = isViewer ? '' : `<span class="text-blue-400 cursor-pointer hover:underline mr-2" onclick="editSmbSource(${r.id},'${(r.name||'').replace(/'/g,"\\'")}','${(r.share_path||'').replace(/'/g,"\\'")}','${(r.username||'').replace(/'/g,"\\'")}')">수정</span>`;
        const delBtn = isViewer ? '' : `<span class="btn-del" onclick="deleteSmbSource(${r.id})">삭제</span>`;
        return `<tr class="border-t border-gray-700"><td class="p-2">${fmt(r.id)}</td><td class="p-2">${fmt(r.name)}</td><td class="p-2">${fmt(r.share_path)}</td><td class="p-2">${r.is_active?"✅":"❌"}</td><td class="p-2">${fmt(r.last_seen_at||r.last_synced_at||"-")}</td><td class="p-2">${editBtn}${delBtn}</td></tr>`;
    }).join("");
}

async function deleteSmbSource(sourceId) {
    if (!confirm(`SMB 소스 ID ${sourceId}를 삭제하시겠습니까?`)) return;
    const result = await apiFetch(`${SYS_API}/smb/sources/${sourceId}`, { method: "DELETE" });
    if (result.ok) { alert("삭제 완료"); loadSmbSources(); }
    else { alert("삭제 실패: " + (result.data?.detail || JSON.stringify(result.data))); }
}
function editSmbSource(id, name, sharePath, username) {
    document.getElementById("smbName").value = name;
    document.getElementById("smbPath").value = sharePath;
    document.getElementById("smbUser").value = username === "null" ? "" : username;
    document.getElementById("smbPass").value = "";
    alert("입력란에 데이터를 불러왔습니다. 수정 후 [소스 저장]을 클릭하세요.");
}
</script>
