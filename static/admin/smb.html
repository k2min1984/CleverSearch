<!--
########################################################
# Description
# CleverSearch 관리자 페이지 - SMB/SSH 색인 탭
# 네트워크 공유 폴더(SMB/CIFS) 또는 SSH(SFTP) 파일 자동 수집 및 색인
# 카드형 목록 UI
#
# Modified History
# 현승준 / 2026-03-25 / 최초생성
# 현승준 / 2026-04-08 / domain, port, 연결테스트, 전체동기화, 동기화이력 추가
# 현승준 / 2026-04-15 / SSH(SFTP) 연결 지원 추가, 카드 레이아웃 적용
########################################################
-->

<!-- SMB/SSH 색인 탭 -->
<div class="bg-blue-900/30 border border-blue-700 rounded-lg p-3 mb-4 text-sm text-blue-200">
    <b><span aria-hidden="true">📁</span> SMB/SSH 색인이란?</b> 네트워크 공유 폴더(SMB/CIFS) 또는 SSH(SFTP) 서버에 있는 파일을 자동으로 수집·색인합니다.<br>
    • <b>연결 타입</b>을 선택하면 해당 프로토콜에 맞는 입력 필드가 표시됩니다.<br>
    • 카드의 <b>연결 테스트</b> 버튼으로 접속 가능 여부를 사전에 확인하세요.<br>
    • 카드의 <b>이력</b> 버튼을 클릭하면 해당 소스의 색인 이력을 확인할 수 있습니다.
</div>

<!-- 액션 바 -->
<div class="flex gap-2 flex-wrap mb-4">
    <button id="smbAddBtn" type="button" class="admin-write px-4 py-1.5 rounded bg-blue-600 hover:bg-blue-500 text-sm font-semibold">+ 신규 등록</button>
    <div class="flex-1"></div>
    <input id="smbSyncId" placeholder="동기화할 source_id" class="bg-gray-900 border border-gray-600 rounded px-2 py-1.5 text-sm w-40" />
    <button id="smbSyncBtn" type="button" class="admin-write px-3 py-1.5 rounded bg-indigo-600 hover:bg-indigo-500 text-sm">소스ID 동기화</button>
    <button id="smbTestConnBtn" type="button" class="admin-write px-3 py-1.5 rounded bg-teal-600 hover:bg-teal-500 text-sm">연결 테스트</button>
    <button id="smbSyncAllBtn" type="button" class="admin-write px-3 py-1.5 rounded bg-emerald-600 hover:bg-emerald-500 text-sm">전체 동기화</button>
</div>

<!-- 등록/수정 모달 -->
<div id="smbModal" class="fixed inset-0 z-50 hidden">
    <div id="smbModalOverlay" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4">
        <div class="relative bg-gray-800 border border-gray-600 rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between px-5 py-4 border-b border-gray-700">
                <h3 id="smbModalTitle" class="text-base font-bold text-gray-100">소스 등록</h3>
                <button id="smbModalCloseBtn" type="button" class="w-8 h-8 rounded-lg hover:bg-gray-700 flex items-center justify-center text-gray-400 hover:text-white transition-colors" style="font-size:20px;line-height:1" aria-label="닫기"></button>
            </div>
            <div class="px-5 py-4 space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">연결 타입 *</label>
                        <select id="smbConnType" class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1.5 text-sm">
                            <option value="smb">SMB (네트워크 공유)</option>
                            <option value="ssh">SSH (SFTP)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">소스 이름 *</label>
                        <input id="smbName" placeholder="예: 문서서버, 백업서버" class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1.5 text-sm" />
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">계정</label>
                        <input id="smbUser" placeholder="사용자명" class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1.5 text-sm" />
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">비밀번호</label>
                        <input id="smbPass" type="password" placeholder="비밀번호" class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1.5 text-sm" />
                    </div>
                </div>
                <!-- SMB 전용 필드 -->
                <div id="smbFields">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">SMB 경로 *</label>
                            <input id="smbPath" placeholder="\\\\server\\share\\path" class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1.5 text-sm" />
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs text-gray-400 mb-1">도메인</label>
                                <input id="smbDomain" placeholder="선택" class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1.5 text-sm" />
                            </div>
                            <div>
                                <label class="block text-xs text-gray-400 mb-1">포트</label>
                                <input id="smbPort" type="number" placeholder="445" value="445" min="1" max="65535" class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1.5 text-sm" />
                            </div>
                        </div>
                    </div>
                </div>
                <!-- SSH 전용 필드 -->
                <div id="sshFields" class="hidden">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">SSH 호스트 *</label>
                            <input id="sshHost" placeholder="192.168.1.100" class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1.5 text-sm" />
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">원격 경로 *</label>
                            <input id="sshRemotePath" placeholder="/data/docs" class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1.5 text-sm" />
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mt-3">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">포트</label>
                            <input id="sshPort" type="number" placeholder="22" value="22" min="1" max="65535" class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1.5 text-sm" />
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">키 파일 경로</label>
                            <input id="sshKeyPath" placeholder="선택" class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1.5 text-sm" />
                        </div>
                    </div>
                </div>
            </div>
            <div class="flex items-center justify-end gap-2 px-5 py-4 border-t border-gray-700">
                <button id="smbClearBtn" type="button" class="px-4 py-1.5 rounded bg-gray-700 hover:bg-gray-600 text-sm">초기화</button>
                <button id="smbSaveBtn" type="button" class="admin-write px-5 py-1.5 rounded bg-blue-600 hover:bg-blue-500 text-sm font-semibold">저장</button>
            </div>
        </div>
    </div>
</div>

<!-- 카드 목록 -->
<div class="flex items-center mb-3">
    <span id="smbTotal" class="text-sm font-bold text-slate-500"></span>
</div>
<div id="smbCardList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 mb-3"></div>
<div id="smbPagination" class="hidden mt-2 flex items-center justify-center gap-2 text-sm"></div>
<pre id="smbOutput" class="bg-gray-900 border border-gray-700 rounded p-3 text-xs overflow-auto hidden"></pre>

<script>
let smbRows = [];
let smbPage = 1;
const SMB_PAGE_SIZE = 8;
let _smbSourceCache = [];

function changeSmbPage(nextPage) {
    const totalPages = Math.max(1, Math.ceil(smbRows.length / SMB_PAGE_SIZE));
    smbPage = Math.max(1, Math.min(totalPages, nextPage));
    renderSmbCards();
}

function renderSmbPagination() {
    const pager = document.getElementById("smbPagination");
    if (!pager) return;
    if (smbRows.length <= SMB_PAGE_SIZE) { pager.classList.add("hidden"); pager.innerHTML = ""; return; }
    const totalPages = Math.max(1, Math.ceil(smbRows.length / SMB_PAGE_SIZE));
    pager.classList.remove("hidden");
    pager.innerHTML = `
        <button type="button" class="js-smb-page px-3 py-1 rounded border border-gray-500 text-sm ${smbPage===1?"opacity-40 cursor-not-allowed":""}" ${smbPage===1?"disabled":""} data-page="${smbPage-1}">이전</button>
        <span class="text-slate-500 font-semibold">${smbPage} / ${totalPages}</span>
        <button type="button" class="js-smb-page px-3 py-1 rounded border border-gray-500 text-sm ${smbPage===totalPages?"opacity-40 cursor-not-allowed":""}" ${smbPage===totalPages?"disabled":""} data-page="${smbPage+1}">다음</button>
    `;
}

function renderSmbCards() {
    const container = document.getElementById("smbCardList");
    if (!container) return;
    const isViewer = loggedInRole === "viewer";
    const totalPages = Math.max(1, Math.ceil(smbRows.length / SMB_PAGE_SIZE));
    smbPage = Math.max(1, Math.min(totalPages, smbPage));
    const start = (smbPage - 1) * SMB_PAGE_SIZE;
    const pageRows = smbRows.slice(start, start + SMB_PAGE_SIZE);

    if (pageRows.length === 0) {
        container.innerHTML = '<div class="col-span-full text-center text-gray-500 py-8">등록된 SMB/SSH 소스가 없습니다.</div>';
        renderSmbPagination();
        return;
    }

    container.innerHTML = pageRows.map((r, i) => {
        const globalIdx = start + i;
        const safeId = Number.isFinite(Number(r.id)) ? Number(r.id) : "";
        const connType = r.connection_type || "smb";
        const isSsh = connType === "ssh";
        const typeBadge = isSsh
            ? '<span class="px-2.5 py-1 rounded-full text-xs font-bold bg-emerald-600 text-white tracking-wide">SSH / SFTP</span>'
            : '<span class="px-2.5 py-1 rounded-full text-xs font-bold bg-blue-600 text-white tracking-wide">SMB / CIFS</span>';
        const pathDisplay = isSsh ? `${fmt(r.ssh_host||"")}:${fmt(r.share_path)}` : fmt(r.share_path);
        const port = Number(r.port) || (isSsh ? 22 : 445);
        const active = r.is_active
            ? '<span class="inline-flex items-center gap-1.5 text-xs font-bold text-green-600"><svg class="w-3 h-3" viewBox="0 0 12 12"><circle cx="6" cy="6" r="6" fill="currentColor"/></svg>활성</span>'
            : '<span class="inline-flex items-center gap-1.5 text-xs font-bold text-red-500"><svg class="w-3 h-3" viewBox="0 0 12 12"><circle cx="6" cy="6" r="6" fill="currentColor"/></svg>비활성</span>';
        const toggleSwitch = isViewer ? active : `
            <label class="inline-flex items-center gap-1.5 cursor-pointer select-none" title="${r.is_active ? '클릭하면 비활성(스케줄러 제외)' : '클릭하면 활성(스케줄러 등록)'}">
                <div class="relative">
                    <input type="checkbox" class="sr-only peer smb-toggle-active" data-id="${safeId}" ${r.is_active ? 'checked' : ''} />
                    <div class="w-9 h-5 bg-red-400 rounded-full peer-checked:bg-green-500 transition-colors"></div>
                    <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow peer-checked:translate-x-4 transition-transform"></div>
                </div>
                <span class="text-xs font-bold ${r.is_active ? 'text-green-600' : 'text-red-500'}">${r.is_active ? '활성' : '비활성'}</span>
            </label>`;
        const lastSync = (r.last_seen_at || r.last_synced_at) ? fmt(r.last_seen_at || r.last_synced_at) : null;
        const errorBadge = r.last_error ? `<div class="mt-3 text-xs bg-red-50 border border-red-200 rounded-lg px-3 py-2 text-red-600" title="${(r.last_error||'').replace(/"/g,'&quot;')}"><span class="font-bold">⚠ 오류:</span> ${fmt(r.last_error)}</div>` : '';

        const deleteBtn = isViewer ? '' : `<button type="button" class="absolute top-3 right-3 w-7 h-7 rounded-full bg-gray-100 hover:bg-red-100 text-gray-400 hover:text-red-500 flex items-center justify-center transition-colors btn-smb-delete" data-id="${safeId}" title="삭제">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>`;

        const btns = isViewer ? '' : `
            <div class="grid grid-cols-4 gap-2 mt-auto pt-4">
                <button type="button" class="text-xs font-bold py-2 rounded-lg bg-teal-600 hover:bg-teal-500 text-white btn-smb-test" data-id="${safeId}">접속 테스트</button>
                <button type="button" class="text-xs font-bold py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white btn-smb-sync" data-id="${safeId}">동기화</button>
                <button type="button" class="text-xs font-bold py-2 rounded-lg bg-blue-600 hover:bg-blue-500 text-white btn-smb-edit" data-id="${safeId}" data-idx="${globalIdx}">수정</button>
                <button type="button" class="text-xs font-bold py-2 rounded-lg bg-amber-600 hover:bg-amber-500 text-white btn-smb-hist" data-idx="${globalIdx}">이력</button>
            </div>`;

        return `<div class="relative bg-white rounded-xl p-5 hover:shadow-xl transition-all shadow-md flex flex-col min-h-[260px]">
            ${deleteBtn}
            <!-- 상단: 큰 아이콘 + 이름 + 배지 -->
            <div class="flex items-center gap-3 mb-4">
                <div class="text-5xl leading-none shrink-0">${isSsh ? "🔐" : "📁"}</div>
                <div class="flex-1 min-w-0">
                    <div class="font-bold text-lg text-gray-900 truncate">${fmt(r.name)}</div>
                    <div class="flex items-center gap-2 mt-1">${typeBadge}</div>
                </div>
                <div class="flex flex-col items-end gap-1 shrink-0 mr-10">
                    ${toggleSwitch}
                    <span class="text-xs text-gray-400 font-mono">ID: ${safeId}</span>
                </div>
            </div>
            <!-- 정보 그리드 -->
            <div class="grid grid-cols-2 gap-x-4 gap-y-2 text-sm mb-3">
                <div>
                    <div class="text-gray-400 text-xs mb-0.5 font-medium">${isSsh ? "SSH 호스트" : "공유 경로"}</div>
                    <div class="text-gray-800 font-semibold truncate" title="${pathDisplay}">${pathDisplay}</div>
                </div>
                <div>
                    <div class="text-gray-400 text-xs mb-0.5 font-medium">포트</div>
                    <div class="text-gray-800 font-semibold">${port}</div>
                </div>
                <div>
                    <div class="text-gray-400 text-xs mb-0.5 font-medium">계정</div>
                    <div class="text-gray-800 font-semibold">${r.username ? fmt(r.username) : '<span class="text-gray-300">없음</span>'}</div>
                </div>
                <div>
                    <div class="text-gray-400 text-xs mb-0.5 font-medium">${isSsh ? "키 파일" : "도메인"}</div>
                    <div class="text-gray-800 font-semibold truncate">${isSsh ? (r.ssh_key_path ? fmt(r.ssh_key_path) : '<span class="text-gray-300">없음</span>') : (r.domain ? fmt(r.domain) : '<span class="text-gray-300">없음</span>')}</div>
                </div>
                <div class="col-span-2">
                    <div class="text-gray-400 text-xs mb-0.5 font-medium">최근 동기화</div>
                    <div class="${lastSync ? 'text-gray-800' : 'text-amber-500'} font-semibold">${lastSync || "미동기화"}</div>
                </div>
            </div>
            ${errorBadge}
            ${btns}
            <div id="smbHistPanel-${globalIdx}" class="hidden mt-3 pt-3 border-t border-gray-200">
                <div class="text-sm text-gray-800 mb-2 font-bold">📋 색인 이력</div>
                <div class="bg-gray-50 rounded-lg border border-gray-200 overflow-auto max-h-48">
                    <table class="w-full text-sm"><thead><tr class="bg-gray-100 text-gray-600 text-left sticky top-0"><th class="px-2 py-1.5">시간</th><th class="px-2 py-1.5">파일</th><th class="px-2 py-1.5">액션</th><th class="px-2 py-1.5">상태</th><th class="px-2 py-1.5">메시지</th></tr></thead><tbody id="smbHistBody-${globalIdx}"><tr><td class="px-2 py-1.5 text-gray-400" colspan="5">불러오는 중...</td></tr></tbody></table>
                </div>
            </div>
        </div>`;
    }).join("");
    renderSmbPagination();
}

function bindSmbActions() {
    const pager = document.getElementById("smbPagination");
    if (pager && pager.dataset.bound !== "1") {
        pager.dataset.bound = "1";
        pager.addEventListener("click", (e) => {
            const btn = e.target.closest(".js-smb-page");
            if (btn) changeSmbPage(Number(btn.dataset.page || 1));
        });
    }

    const container = document.getElementById("smbCardList");
    if (!container || container.dataset.actionsBound === "1") return;
    container.dataset.actionsBound = "1";

    /* 활성/비활성 토글 */
    container.addEventListener("change", async (e) => {
        const toggle = e.target.closest(".smb-toggle-active");
        if (!toggle) return;
        const id = Number(toggle.dataset.id || 0);
        if (!Number.isFinite(id) || id <= 0) return;
        const newActive = toggle.checked;
        const result = await apiFetch(`${SYS_API}/smb/sources/${id}/active?is_active=${newActive}`, { method: "PATCH" });
        if (result.ok && result.data?.status === "success") {
            await loadSmbSources();
        } else {
            toggle.checked = !newActive;
            alert("상태 변경 실패: " + (result.data?.message || result.data?.detail || ""));
        }
    });

    container.addEventListener("click", (e) => {
        const histBtn = e.target.closest(".btn-smb-hist");
        if (histBtn) { toggleSmbIndexingHistory(Number(histBtn.dataset.idx)); return; }

        const testBtn = e.target.closest(".btn-smb-test");
        if (testBtn) {
            const id = Number(testBtn.dataset.id || 0);
            if (Number.isFinite(id) && id > 0) testSmbConnectionById(id);
            return;
        }

        const syncBtn = e.target.closest(".btn-smb-sync");
        if (syncBtn) {
            const id = Number(syncBtn.dataset.id || 0);
            if (Number.isFinite(id) && id > 0) {
                document.getElementById("smbSyncId").value = id;
                syncSmbSourceById();
            }
            return;
        }

        const editBtn = e.target.closest(".btn-smb-edit");
        if (editBtn) {
            const idx = Number(editBtn.dataset.idx);
            const src = _smbSourceCache[idx];
            if (src) {
                editSmbSource(
                    src.id,
                    src.connection_type || "smb",
                    src.name || "",
                    src.share_path || "",
                    src.username || "",
                    src.domain || "",
                    Number(src.port) || 445,
                    src.ssh_host || "",
                    src.ssh_key_path || ""
                );
            }
            return;
        }

        const delBtn = e.target.closest(".btn-smb-delete");
        if (delBtn) {
            const id = Number(delBtn.dataset.id || 0);
            if (Number.isFinite(id) && id > 0) deleteSmbSource(id);
        }
    });
}

async function upsertSmbSource() {
    const connType = document.getElementById("smbConnType").value;
    const payload = {
        name: document.getElementById("smbName").value,
        connection_type: connType,
        username: document.getElementById("smbUser").value || null,
        password: document.getElementById("smbPass").value || null,
        is_active: true
    };
    if (connType === "ssh") {
        payload.share_path = document.getElementById("sshRemotePath").value;
        payload.ssh_host = document.getElementById("sshHost").value || null;
        payload.port = parseInt(document.getElementById("sshPort").value) || 22;
        payload.ssh_key_path = document.getElementById("sshKeyPath").value || null;
        payload.domain = null;
    } else {
        payload.share_path = document.getElementById("smbPath").value;
        payload.domain = document.getElementById("smbDomain").value || null;
        payload.port = parseInt(document.getElementById("smbPort").value) || 445;
        payload.ssh_host = null;
        payload.ssh_key_path = null;
    }
    const result = await apiFetch(`${SYS_API}/smb/sources`, { method: "POST", body: JSON.stringify(payload) });
    writeJson("smbOutput", result);
    if (result.ok) {
        alert("SMB/SSH 소스 저장 완료");
        await loadSmbSources();
    } else {
        alert("저장 실패: " + (result.data?.detail || JSON.stringify(result.data)));
    }
}

async function loadSmbSources() {
    const result = await apiFetch(`${SYS_API}/smb/sources?active_only=false`, { method: "GET" });
    writeJson("smbOutput", result.data);
    populateSmbList(result.data);
}

async function syncSmbSourceById() {
    const sourceId = document.getElementById("smbSyncId").value;
    if (!sourceId) { alert("source_id를 입력하세요."); return; }
    const result = await apiFetch(`${SYS_API}/smb/sources/${sourceId}/sync?max_files=200&force_full=false`, { method: "POST" });
    writeJson("smbOutput", result);
    if (result.ok) {
        alert("SMB 동기화 완료");
        await loadSmbSources();
    } else {
        alert("SMB 동기화 실패: " + (result.data?.detail || JSON.stringify(result.data)));
    }
}

async function syncAllSmbSources() {
    const result = await apiFetch(`${SYS_API}/smb/sources/sync-all?max_files_per_source=200`, { method: "POST" });
    writeJson("smbOutput", result);
    if (result.ok) {
        alert(`SMB 전체 동기화 완료 (성공 ${result.data?.success_sources || 0}/${result.data?.total_sources || 0})`);
        await loadSmbSources();
    } else {
        alert("SMB 전체 동기화 실패: " + (result.data?.detail || JSON.stringify(result.data)));
    }
}

/* 연결 테스트 (소스 ID 기반 - 카드 버튼용) */
async function testSmbConnectionById(sourceId) {
    const result = await apiFetch(`${SYS_API}/smb/sources/${sourceId}/test`, { method: "POST" });
    if (result.ok && result.data?.status === "success") {
        alert("✅ 연결 성공: " + (result.data?.message || ""));
    } else {
        alert("❌ 연결 실패: " + (result.data?.message || result.data?.detail || "연결할 수 없습니다."));
    }
}

/* 연결 테스트 (smbSyncId 입력 기반 - 하단 버튼용) */
async function testSmbConnection() {
    const sourceId = document.getElementById("smbSyncId").value;
    if (!sourceId) { alert("source_id를 입력하세요."); return; }
    testSmbConnectionById(sourceId);
}

function populateSmbList(data) {
    if (!Array.isArray(data)) {
        document.getElementById("smbTotal").textContent = "총 0건";
        smbRows = [];
        _smbSourceCache = [];
        renderSmbCards();
        return;
    }
    document.getElementById("smbTotal").textContent = `총 ${data.length}건`;
    smbRows = data;
    _smbSourceCache = data;
    smbPage = 1;
    renderSmbCards();
}

async function toggleSmbIndexingHistory(idx) {
    const panel = document.getElementById(`smbHistPanel-${idx}`);
    const body = document.getElementById(`smbHistBody-${idx}`);
    if (!panel || !body) return;
    panel.classList.toggle("hidden");
    if (panel.classList.contains("hidden")) return;

    const src = _smbSourceCache[idx];
    if (!src) return;
    const srcType = src.connection_type || "smb";
    const url = `${SYS_API}/indexing/history?source_type=${srcType}&source_name=${encodeURIComponent(src.name)}&limit=30`;
    const result = await apiFetch(url, { method: "GET" });
    const data = Array.isArray(result.data) ? result.data : [];
    if (data.length === 0) {
        body.innerHTML = '<tr><td class="px-2 py-1.5 text-gray-400" colspan="5">이력이 없습니다.</td></tr>';
        return;
    }
    body.innerHTML = data.map(r =>
        `<tr class="border-t border-gray-200 hover:bg-gray-50"><td class="px-2 py-1.5 text-gray-600">${fmt(r.created_at)}</td><td class="px-2 py-1.5 text-gray-800">${fmt(r.file_name||"-")}</td><td class="px-2 py-1.5 text-gray-600">${fmt(r.action||"-")}</td><td class="px-2 py-1.5">${r.status==="success"?'<span class="text-green-600 font-semibold">✅ 성공</span>':'<span class="text-red-500 font-semibold">❌ 실패</span>'}</td><td class="px-2 py-1.5 text-gray-600 truncate max-w-xs" title="${(r.message||'').replace(/"/g,'&quot;')}">${fmt(r.message||"-")}</td></tr>`
    ).join("");
}

async function deleteSmbSource(sourceId) {
    if (!confirm(`SMB/SSH 소스 ID ${sourceId}를 삭제하시겠습니까?`)) return;
    const result = await apiFetch(`${SYS_API}/smb/sources/${sourceId}`, { method: "DELETE" });
    if (result.ok) { alert("삭제 완료"); loadSmbSources(); }
    else { alert("삭제 실패: " + (result.data?.detail || JSON.stringify(result.data))); }
}

function openSmbModal(isEdit) {
    const modal = document.getElementById("smbModal");
    document.getElementById("smbModalTitle").textContent = isEdit ? "소스 수정" : "소스 등록";
    modal.classList.remove("hidden");
    document.body.style.overflow = "hidden";
}

function closeSmbModal() {
    document.getElementById("smbModal").classList.add("hidden");
    document.body.style.overflow = "";
}

function editSmbSource(id, connType, name, sharePath, username, domain, port, sshHost, sshKeyPath) {
    clearSmbForm();
    document.getElementById("smbConnType").value = connType;
    toggleSshFields();
    document.getElementById("smbName").value = name;
    document.getElementById("smbUser").value = (username && username !== "null") ? username : "";
    document.getElementById("smbPass").value = "";
    document.getElementById("smbSyncId").value = id;
    if (connType === "ssh") {
        document.getElementById("sshHost").value = (sshHost && sshHost !== "null") ? sshHost : "";
        document.getElementById("sshRemotePath").value = sharePath;
        document.getElementById("sshPort").value = port || 22;
        document.getElementById("sshKeyPath").value = (sshKeyPath && sshKeyPath !== "null") ? sshKeyPath : "";
    } else {
        document.getElementById("smbPath").value = sharePath;
        document.getElementById("smbDomain").value = (domain && domain !== "null") ? domain : "";
        document.getElementById("smbPort").value = port || 445;
    }
    openSmbModal(true);
}

function clearSmbForm() {
    ["smbName","smbPath","smbUser","smbPass","smbDomain","sshHost","sshRemotePath","sshKeyPath"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = "";
    });
    document.getElementById("smbPort").value = 445;
    document.getElementById("sshPort").value = 22;
    document.getElementById("smbConnType").value = "smb";
    toggleSshFields();
}

function toggleSshFields() {
    const connType = document.getElementById("smbConnType").value;
    document.getElementById("smbFields").classList.toggle("hidden", connType === "ssh");
    document.getElementById("sshFields").classList.toggle("hidden", connType !== "ssh");
}

loadSmbSources();
bindSmbActions();
document.getElementById("smbAddBtn")?.addEventListener("click", () => { clearSmbForm(); openSmbModal(false); });
const _smbCloseBtn = document.getElementById("smbModalCloseBtn");
if (_smbCloseBtn) { _smbCloseBtn.textContent = "\u2715"; _smbCloseBtn.addEventListener("click", closeSmbModal); }
document.getElementById("smbModalOverlay")?.addEventListener("click", closeSmbModal);
document.getElementById("smbSaveBtn")?.addEventListener("click", async () => { await upsertSmbSource(); closeSmbModal(); });
document.getElementById("smbSyncBtn")?.addEventListener("click", syncSmbSourceById);
document.getElementById("smbTestConnBtn")?.addEventListener("click", testSmbConnection);
document.getElementById("smbSyncAllBtn")?.addEventListener("click", syncAllSmbSources);
document.getElementById("smbClearBtn")?.addEventListener("click", clearSmbForm);
document.getElementById("smbConnType")?.addEventListener("change", toggleSshFields);
document.addEventListener("keydown", (e) => { if (e.key === "Escape" && !document.getElementById("smbModal").classList.contains("hidden")) closeSmbModal(); });
</script>
