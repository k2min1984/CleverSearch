########################################################

<!-- 실패 검색어 탭 -->
<div class="bg-blue-900/30 border border-blue-700 rounded-lg p-3 mb-4 text-sm text-blue-200">
    <b><span aria-hidden="true">❌</span> 실패 검색어</b> — 검색 결과가 0건인 키워드를 빈도순으로 표시합니다.<br>
    • <b>기간(일)</b>: 집계 기간 설정<br>
    • 실패 키워드 분석을 통해 사전 등록이나 동의어 추가를 검토할 수 있습니다.
</div>
<div class="flex flex-wrap items-center gap-2 mb-3">
    <input id="failedDays" type="number" min="1" value="7" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm w-24 max-w-full" />
    <input id="failedSearch" type="text" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm flex-1 min-w-0 w-full md:w-72" placeholder="키워드" />
    <span id="failedTotal" class="text-sm font-bold text-slate-500 md:ml-auto"></span>
</div>
<div class="overflow-auto border border-gray-700 rounded">
    <table class="w-full text-sm">
        <thead class="bg-gray-800"><tr><th class="p-2 text-left">순위</th><th class="p-2 text-left">키워드</th><th class="p-2 text-left">카운트</th></tr></thead>
        <tbody id="failedBody"></tbody>
    </table>
</div>
<div id="failedPagination" class="hidden mt-2 flex items-center justify-center gap-2 text-sm"></div>

<style>
@media (max-width: 1100px) {
    #failedBody td,
    #failedPagination,
    #failedTotal {
        word-break: break-word;
    }
}
</style>

<script>
var failedRows = [];
var failedFilteredRows = [];
var failedPage = 1;
var FAILED_PAGE_SIZE = 10;

function applyFailedFilter() {
    const keyword = (document.getElementById("failedSearch")?.value || "").trim().toLowerCase();
    failedPage = 1;
    if (!keyword) {
        renderFailedRows(failedRows);
        return;
    }
    const filtered = failedRows.filter((row) => String(row?.keyword || "").toLowerCase().includes(keyword));
    renderFailedRows(filtered);
}

function changeFailedPage(nextPage) {
    const totalPages = Math.max(1, Math.ceil(failedFilteredRows.length / FAILED_PAGE_SIZE));
    failedPage = Math.max(1, Math.min(totalPages, nextPage));
    renderFailedRows(failedFilteredRows);
}

function renderFailedPagination() {
    const pager = document.getElementById("failedPagination");
    if (!pager) return;
    if (failedFilteredRows.length <= FAILED_PAGE_SIZE) {
        pager.classList.add("hidden");
        pager.innerHTML = "";
        return;
    }
    const totalPages = Math.max(1, Math.ceil(failedFilteredRows.length / FAILED_PAGE_SIZE));
    pager.classList.remove("hidden");
    pager.innerHTML = `
        <button type="button" class="js-failed-page px-3 py-1 rounded border border-gray-500 text-sm ${failedPage === 1 ? "opacity-40 cursor-not-allowed" : ""}" ${failedPage === 1 ? "disabled" : ""} data-page="${failedPage - 1}">이전</button>
        <span class="text-slate-500 font-semibold">${failedPage} / ${totalPages}</span>
        <button type="button" class="js-failed-page px-3 py-1 rounded border border-gray-500 text-sm ${failedPage === totalPages ? "opacity-40 cursor-not-allowed" : ""}" ${failedPage === totalPages ? "disabled" : ""} data-page="${failedPage + 1}">다음</button>
    `;
}

function bindFailedPagination() {
    const pager = document.getElementById("failedPagination");
    if (!pager || pager.dataset.bound === "1") return;
    pager.dataset.bound = "1";
    pager.addEventListener("click", (event) => {
        const button = event.target.closest(".js-failed-page");
        if (!button) return;
        changeFailedPage(Number(button.dataset.page || 1));
    });
}

function renderFailedRows(rows) {
    const body = document.getElementById("failedBody");
    failedFilteredRows = Array.isArray(rows) ? rows : [];
    const totalPages = Math.max(1, Math.ceil(failedFilteredRows.length / FAILED_PAGE_SIZE));
    failedPage = Math.max(1, Math.min(totalPages, failedPage));
    const start = (failedPage - 1) * FAILED_PAGE_SIZE;
    const pageRows = failedFilteredRows.slice(start, start + FAILED_PAGE_SIZE);

    body.innerHTML = pageRows.map((row, idx) =>
        `<tr class="border-t border-gray-700"><td class="p-2 align-top">${start + idx + 1}</td><td class="p-2 break-all">${fmt(row.keyword)}</td><td class="p-2 align-top">${fmt(row.count)}</td></tr>`
    ).join("") || '<tr><td class="p-2" colspan="3">데이터 없음</td></tr>';

    renderFailedPagination();
}

async function loadFailed() {
    const days = document.getElementById("failedDays").value || 7;
    const result = await apiFetch(`${API}/failed-keywords?days=${days}&limit=200`, { method: "GET" });
    const data = result.data;
    failedRows = Array.isArray(data) ? data : [];
    failedPage = 1;
    document.getElementById("failedTotal").textContent = `총 ${failedRows.length}건`;
    applyFailedFilter();
}

document.getElementById("failedDays")?.addEventListener("change", loadFailed);
document.getElementById("failedSearch")?.addEventListener("input", applyFailedFilter);
bindFailedPagination();
</script>
