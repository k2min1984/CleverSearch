<!-- 초기화 탭 -->
<div class="bg-red-900/30 border border-red-700 rounded-lg p-3 mb-4 text-sm text-red-200">
    <b><span aria-hidden="true">⚠️</span> 데이터 초기화</b> — OpenSearch 인덱스와 DB의 데이터를 <b>모두 삭제</b>합니다.<br>
    • <b>[전체 데이터 초기화]</b>: 문서 + 검색로그 + 최근검색어를 모두 삭제합니다.<br>
    • <b>[인덱스 완전 삭제 + DB 초기화]</b>: OpenSearch 인덱스 자체를 삭제하고 DB도 초기화합니다.<br>
    • <b>이 작업은 되돌릴 수 없습니다.</b> 테스트 환경 초기화 용도로만 사용하세요.
</div>
<div class="bg-gray-800 border border-gray-700 rounded-xl p-6 max-w-lg">
    <h2 class="text-lg font-bold mb-4 text-red-400">데이터 초기화</h2>
    <p class="text-sm text-gray-400 mb-4">OpenSearch 인덱스의 모든 문서와 업무 DB(문서목록, 검색로그, 최근검색어)를 <strong class="text-red-300">모두 삭제</strong>합니다. 이 작업은 되돌릴 수 없습니다.</p>
    <div class="space-y-3">
        <button id="resetAllDataBtn" type="button" class="admin-write w-full px-4 py-2 rounded bg-red-700 hover:bg-red-600 text-white font-medium">전체 데이터 초기화 (OpenSearch + DB)</button>
        <button id="resetIndexBtn" type="button" class="admin-write w-full px-4 py-2 rounded bg-red-900 hover:bg-red-800 text-white font-medium">인덱스 완전 삭제 + DB 초기화</button>
    </div>
    <pre id="resetOutput" class="bg-gray-900 border border-gray-700 rounded p-3 text-xs overflow-auto mt-4"></pre>
</div>

<script>
async function resetAllData() {
    if (!confirm("모든 데이터(OpenSearch + DB)를 초기화합니다. 계속하시겠습니까?")) return;
    const headers = {};
    if (accessToken) headers["Authorization"] = `Bearer ${accessToken}`;
    try {
        const res = await fetch(`${FILE_API}/clear-all-data`, { method: "DELETE", headers });
        const data = await res.json();
        writeJson("resetOutput", data);
        alert("전체 데이터 초기화 완료");
        loadDocs();
    } catch (e) {
        writeJson("resetOutput", { error: "네트워크 오류" });
    }
}

async function resetIndex() {
    if (!confirm("인덱스 구조까지 완전 삭제 + DB 초기화합니다. 계속하시겠습니까?")) return;
    const headers = {};
    if (accessToken) headers["Authorization"] = `Bearer ${accessToken}`;
    try {
        const res = await fetch(`${FILE_API}/delete-index`, { method: "DELETE", headers });
        const data = await res.json();
        writeJson("resetOutput", data);
        alert("인덱스 삭제 + DB 초기화 완료");
        loadDocs();
    } catch (e) {
        writeJson("resetOutput", { error: "네트워크 오류" });
    }
}

document.getElementById("resetAllDataBtn")?.addEventListener("click", resetAllData);
document.getElementById("resetIndexBtn")?.addEventListener("click", resetIndex);
</script>
