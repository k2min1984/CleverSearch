<!--
########################################################
# Description
# CleverSearch 관리자 페이지 - 파일 업로드 탭
# 문서 파일을 업로드하여 OpenSearch에 색인
# 드래그&드롭 및 클릭 업로드 지원
#
# Modified History
# 현승준 / 2026-03-25 / 최초생성
# 강광민 / 2026-04-06 / 파일선택 대화상자 중복 열림 근본 해결
#   - input[type=file]을 dropZone 바깥으로 이동 (이벤트 버블링 원천 차단)
#   - 재진입 방지 플래그로 이중 대화상자 완전 차단
########################################################
-->

<!-- 파일 업로드 탭 -->
<div class="bg-blue-900/30 border border-blue-700 rounded-lg p-3 mb-4 text-sm text-blue-200">
    <b>📂 파일 업로드</b> — 문서 파일을 업로드하여 OpenSearch에 색인합니다.<br>
    • 아래 영역에 파일을 <b>드래그&드롭</b>하거나 클릭하여 선택합니다.<br>
    • 지원 형식: HWP, HWPX, PDF, DOCX, PPTX, XLSX, XLS, JPG, JPEG, PNG (최대 100MB)<br>
    • 동일 파일 재업로드 시 <b>Hash 중복 방지</b>로 자동 차단됩니다.
</div>

<!-- ★ input을 dropZone 바깥에 배치하여 클릭 버블링 원천 차단 -->
<input type="file" id="fileInput" multiple
       accept=".hwp,.hwpx,.pdf,.docx,.pptx,.xlsx,.xls,.jpg,.jpeg,.png"
       style="display:none" />

<div class="drop-zone mb-4" id="dropZone">
    <p class="text-gray-400 mb-2">파일을 여기에 드래그하거나 클릭하여 선택</p>
    <p class="text-xs text-gray-500">지원 형식: hwp, pdf, docx, pptx, xlsx, xls, hwpx, jpg, jpeg, png (최대 100MB)</p>
</div>
<div id="uploadQueue" class="space-y-2 mb-4"></div>
<div id="uploadResults" class="space-y-1"></div>

<script>
function setupUpload() {
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    if (!dropZone || !fileInput) return;

    /*
     * onclick/onchange 속성 할당 방식 사용 (addEventListener 아님)
     * → switchTab()에서 setupUpload()가 재호출되어도 절대 핸들러가 누적되지 않음
     * → 이전 핸들러는 새 할당으로 덮어쓰기됨
     */

    /* ── 클릭으로 파일 선택 ── */
    dropZone.onclick = () => {
        fileInput.value = "";
        fileInput.click();
    };

    /* ── 파일 선택 완료 ── */
    fileInput.onchange = () => {
        if (fileInput.files.length > 0) {
            handleFiles(fileInput.files);
        }
        fileInput.value = "";
    };

    /* ── 드래그 & 드롭 (속성 할당) ── */
    dropZone.ondragover = (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
    };
    dropZone.ondragleave = () => {
        dropZone.classList.remove("dragover");
    };
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        handleFiles(e.dataTransfer.files);
    };
}

async function handleFiles(fileList) {
    if (!fileList || fileList.length === 0) return;
    const queue = document.getElementById("uploadQueue");

    for (const file of fileList) {
        const row = document.createElement("div");
        row.className = "flex items-center gap-2 bg-gray-800 rounded px-3 py-2 text-sm";
        row.innerHTML = `<span class="flex-1">${file.name}</span><span class="text-yellow-400">업로드 중...</span>`;
        queue.appendChild(row);

        try {
            const formData = new FormData();
            formData.append("file", file);
            const headers = {};
            if (typeof accessToken !== "undefined" && accessToken) {
                headers["Authorization"] = `Bearer ${accessToken}`;
            }
            const res = await fetch(`${FILE_API}/upload`, {
                method: "POST",
                headers,
                body: formData,
            });
            const data = await res.json();

            const statusText = data.status || (res.ok ? "success" : "fail");
            const color = statusText === "success" ? "text-green-400"
                        : statusText === "skipped" ? "text-blue-400"
                        : "text-red-400";
            const msg = data.message || data.detail || "";
            row.innerHTML = `<span class="flex-1">${file.name}</span>`
                          + `<span class="${color}">${statusText}</span>`
                          + `<span class="text-gray-500 text-xs ml-2">${msg}</span>`;
        } catch (e) {
            row.innerHTML = `<span class="flex-1">${file.name}</span>`
                          + `<span class="text-red-400">네트워크 오류</span>`;
        }
    }
}
</script>
