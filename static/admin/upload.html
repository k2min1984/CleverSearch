<!-- 파일 업로드 탭 -->
<div class="bg-blue-900/30 border border-blue-700 rounded-lg p-3 mb-4 text-sm text-blue-200">
    <b>📂 파일 업로드</b> — 문서 파일을 업로드하여 OpenSearch에 색인합니다.<br>
    • 아래 영역에 파일을 <b>드래그&드롭</b>하거나 클릭하여 선택합니다.<br>
    • 지원 형식: HWP, HWPX, PDF, DOCX, PPTX, XLSX, XLS, JPG, JPEG, PNG (최대 100MB)<br>
    • 동일 파일 재업로드 시 <b>Hash 중복 방지</b>로 자동 차단됩니다.
</div>
<div class="drop-zone mb-4" id="dropZone">
    <p class="text-gray-400 mb-2">파일을 여기에 드래그하거나 클릭하여 선택</p>
    <p class="text-xs text-gray-500">지원 형식: hwp, pdf, docx, pptx, xlsx, xls, hwpx, jpg, jpeg, png (최대 100MB)</p>
    <input type="file" id="fileInput" multiple accept=".hwp,.hwpx,.pdf,.docx,.pptx,.xlsx,.xls,.jpg,.jpeg,.png" class="hidden" />
</div>
<div id="uploadQueue" class="space-y-2 mb-4"></div>
<div id="uploadResults" class="space-y-1"></div>

<script>
function setupUpload() {
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");

    dropZone.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
    dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        handleFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener("change", () => { handleFiles(fileInput.files); fileInput.value = ""; });
}

async function handleFiles(fileList) {
    const queue = document.getElementById("uploadQueue");

    for (const file of fileList) {
        const row = document.createElement("div");
        row.className = "flex items-center gap-2 bg-gray-800 rounded px-3 py-2 text-sm";
        row.innerHTML = `<span class="flex-1">${file.name}</span><span class="text-yellow-400">업로드 중...</span>`;
        queue.appendChild(row);

        try {
            const formData = new FormData();
            formData.append("file", file);
            const headers = {};
            if (accessToken) headers["Authorization"] = `Bearer ${accessToken}`;
            const res = await fetch(`${FILE_API}/upload`, { method: "POST", headers, body: formData });
            const data = await res.json();

            const statusText = data.status || (res.ok ? "success" : "fail");
            const color = statusText === "success" ? "text-green-400" : statusText === "skipped" ? "text-blue-400" : "text-red-400";
            row.innerHTML = `<span class="flex-1">${file.name}</span><span class="${color}">${statusText}</span><span class="text-gray-500 text-xs">${data.message || data.detail || ""}</span>`;
        } catch (e) {
            row.innerHTML = `<span class="flex-1">${file.name}</span><span class="text-red-400">네트워크 오류</span>`;
        }
    }
}

setupUpload();
</script>
