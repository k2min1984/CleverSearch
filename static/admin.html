<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleverSearch 관리자 목록</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #111827; color: #e5e7eb; }
        .tab.active { background: #1d4ed8; color: #fff; }
        table th, table td { white-space: nowrap; }
        input, select, textarea { color: #e5e7eb; }
        .pill { border: 1px solid #374151; border-radius: 9999px; padding: 0.25rem 0.75rem; font-size: 0.75rem; }
        .metric { background: #111827; border: 1px solid #374151; border-radius: 0.75rem; padding: 0.75rem; }
        .metric-label { color: #9ca3af; font-size: 0.75rem; }
        .metric-value { font-size: 1.25rem; font-weight: 700; }
        .badge { border-radius: 9999px; padding: 0.25rem 0.75rem; font-size: 0.75rem; font-weight: 600; display: inline-flex; align-items: center; }
        .badge.info { background: #1f2937; color: #93c5fd; border: 1px solid #374151; }
        .badge.warning { background: #3f2a03; color: #fbbf24; border: 1px solid #92400e; }
        .badge.critical { background: #450a0a; color: #fca5a5; border: 1px solid #b91c1c; }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold">CleverSearch 관리자 리스트</h1>
            <div class="flex items-center gap-2">
                <input id="loginUser" value="admin" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm w-28" />
                <input id="loginPass" value="admin123!" type="password" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm w-36" />
                <button onclick="loginJwt()" class="px-3 py-1 rounded bg-green-700 hover:bg-green-600 text-sm">JWT 로그인</button>
                <button onclick="refreshJwt()" class="px-3 py-1 rounded bg-indigo-700 hover:bg-indigo-600 text-sm">토큰 갱신</button>
                <button onclick="logoutJwt()" class="px-3 py-1 rounded bg-red-700 hover:bg-red-600 text-sm">로그아웃</button>
                <select id="roleSelect" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm">
                    <option value="viewer">viewer</option>
                    <option value="operator">operator</option>
                    <option value="admin" selected>admin</option>
                </select>
                <span class="pill" id="authStatus">X-Role 모드</span>
                <a href="/" class="px-3 py-2 rounded bg-gray-700 hover:bg-gray-600 text-sm">검색 페이지로</a>
            </div>
        </div>

        <div class="flex flex-wrap gap-2 mb-4">
            <button class="tab active px-3 py-2 rounded bg-gray-700 text-sm" data-tab="popular">인기검색 카운트</button>
            <button class="tab px-3 py-2 rounded bg-gray-700 text-sm" data-tab="docs">업무DB 문서 목록</button>
            <button class="tab px-3 py-2 rounded bg-gray-700 text-sm" data-tab="logs">검색 로그</button>
            <button class="tab px-3 py-2 rounded bg-gray-700 text-sm" data-tab="recent">최근 검색어</button>
            <button class="tab px-3 py-2 rounded bg-gray-700 text-sm" data-tab="failed">실패 검색어</button>
            <button class="tab px-3 py-2 rounded bg-gray-700 text-sm" data-tab="dashboard">대시보드 지표</button>
            <button class="tab px-3 py-2 rounded bg-gray-700 text-sm" data-tab="dictionary">사전 관리</button>
            <button class="tab px-3 py-2 rounded bg-gray-700 text-sm" data-tab="smb">SMB 색인</button>
            <button class="tab px-3 py-2 rounded bg-gray-700 text-sm" data-tab="dbsources">DB 색인</button>
            <button class="tab px-3 py-2 rounded bg-gray-700 text-sm" data-tab="scheduler">자동 스케줄러</button>
            <button class="tab px-3 py-2 rounded bg-gray-700 text-sm" data-tab="ssl">볼륨/SSL</button>
        </div>

        <div id="panel-popular" class="panel">
            <div class="flex gap-2 mb-3">
                <input id="popularDays" type="number" min="1" value="7" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm w-24" />
                <button onclick="loadPopular()" class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500 text-sm">새로고침</button>
            </div>
            <div class="overflow-auto border border-gray-700 rounded">
                <table class="w-full text-sm">
                    <thead class="bg-gray-800"><tr><th class="p-2 text-left">순위</th><th class="p-2 text-left">키워드</th><th class="p-2 text-left">카운트</th></tr></thead>
                    <tbody id="popularBody"></tbody>
                </table>
            </div>
        </div>

        <div id="panel-docs" class="panel hidden">
            <div class="flex gap-2 mb-3">
                <button onclick="loadDocs()" class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500 text-sm">새로고침</button>
            </div>
            <div class="overflow-auto border border-gray-700 rounded">
                <table class="w-full text-sm">
                    <thead class="bg-gray-800"><tr><th class="p-2 text-left">ID</th><th class="p-2 text-left">제목</th><th class="p-2 text-left">파일명</th><th class="p-2 text-left">확장자</th><th class="p-2 text-left">카테고리</th><th class="p-2 text-left">등록일시</th><th class="p-2 text-left">본문 미리보기</th></tr></thead>
                    <tbody id="docsBody"></tbody>
                </table>
            </div>
        </div>

        <div id="panel-logs" class="panel hidden">
            <div class="flex gap-2 mb-3">
                <button onclick="loadLogs()" class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500 text-sm">새로고침</button>
            </div>
            <div class="overflow-auto border border-gray-700 rounded">
                <table class="w-full text-sm">
                    <thead class="bg-gray-800"><tr><th class="p-2 text-left">ID</th><th class="p-2 text-left">사용자</th><th class="p-2 text-left">검색어</th><th class="p-2 text-left">결과수</th><th class="p-2 text-left">실패여부</th><th class="p-2 text-left">시각</th></tr></thead>
                    <tbody id="logsBody"></tbody>
                </table>
            </div>
        </div>

        <div id="panel-recent" class="panel hidden">
            <div class="flex gap-2 mb-3">
                <input id="recentUserId" type="text" placeholder="user_id (선택)" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm w-48" />
                <button onclick="loadRecent()" class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500 text-sm">새로고침</button>
            </div>
            <div class="overflow-auto border border-gray-700 rounded">
                <table class="w-full text-sm">
                    <thead class="bg-gray-800"><tr><th class="p-2 text-left">ID</th><th class="p-2 text-left">사용자</th><th class="p-2 text-left">검색어</th><th class="p-2 text-left">시각</th></tr></thead>
                    <tbody id="recentBody"></tbody>
                </table>
            </div>
        </div>

        <div id="panel-failed" class="panel hidden">
            <div class="flex gap-2 mb-3">
                <input id="failedDays" type="number" min="1" value="7" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm w-24" />
                <button onclick="loadFailed()" class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500 text-sm">새로고침</button>
            </div>
            <div class="overflow-auto border border-gray-700 rounded">
                <table class="w-full text-sm">
                    <thead class="bg-gray-800"><tr><th class="p-2 text-left">순위</th><th class="p-2 text-left">키워드</th><th class="p-2 text-left">카운트</th></tr></thead>
                    <tbody id="failedBody"></tbody>
                </table>
            </div>
        </div>

        <div id="panel-dashboard" class="panel hidden">
            <div class="flex gap-2 mb-3">
                <input id="dashboardDays" type="number" min="1" value="7" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm w-24" />
                <button onclick="loadDashboard()" class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500 text-sm">새로고침</button>
                <button onclick="runSmokeFromUI()" class="px-3 py-1 rounded bg-indigo-600 hover:bg-indigo-500 text-sm">스모크 실행</button>
                <button onclick="toggleDashboardDebug()" class="px-3 py-1 rounded bg-gray-700 hover:bg-gray-600 text-sm">디버그 토글</button>
            </div>
            <div id="alertBadges" class="flex flex-wrap gap-2 mb-3"></div>
            <div class="grid md:grid-cols-4 gap-3 mb-3">
                <div class="metric"><div class="metric-label">전체 로그</div><div class="metric-value" id="mTotalLogs">0</div></div>
                <div class="metric"><div class="metric-label">실패 로그</div><div class="metric-value" id="mFailedLogs">0</div></div>
                <div class="metric"><div class="metric-label">실패율</div><div class="metric-value" id="mFailureRate">0%</div></div>
                <div class="metric"><div class="metric-label">스케줄러</div><div class="metric-value" id="mScheduler">stopped</div></div>
            </div>
            <div class="grid md:grid-cols-2 gap-3 mb-3">
                <canvas id="trendChart" height="130"></canvas>
                <canvas id="keywordChart" height="130"></canvas>
            </div>
            <pre id="dashboardHealth" class="hidden bg-gray-900 border border-gray-700 rounded p-3 text-xs overflow-auto mb-3"></pre>
            <pre id="dashboardSummary" class="hidden bg-gray-900 border border-gray-700 rounded p-3 text-xs overflow-auto"></pre>
            <pre id="dashboardTrend" class="hidden bg-gray-900 border border-gray-700 rounded p-3 text-xs overflow-auto mt-3"></pre>
            <pre id="smokeOutput" class="bg-gray-900 border border-gray-700 rounded p-3 text-xs overflow-auto mt-3"></pre>
        </div>

        <div id="panel-dictionary" class="panel hidden">
            <div class="grid md:grid-cols-4 gap-2 mb-3">
                <select id="dictType" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm">
                    <option value="synonym">synonym</option>
                    <option value="stopword">stopword</option>
                    <option value="user">user</option>
                </select>
                <input id="dictTerm" placeholder="term" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm" />
                <input id="dictReplacement" placeholder="replacement" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm" />
                <button onclick="upsertDictionaryEntry()" class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500 text-sm">단건 저장</button>
            </div>
            <div class="flex gap-2 mb-3">
                <button onclick="loadDictionaryEntries()" class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500 text-sm">목록 조회</button>
            </div>
            <pre id="dictionaryOutput" class="bg-gray-900 border border-gray-700 rounded p-3 text-xs overflow-auto"></pre>
        </div>

        <div id="panel-smb" class="panel hidden">
            <div class="grid md:grid-cols-5 gap-2 mb-3">
                <input id="smbName" placeholder="name" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm" />
                <input id="smbPath" placeholder="share_path" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm" />
                <input id="smbUser" placeholder="username" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm" />
                <input id="smbPass" placeholder="password" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm" />
                <button onclick="upsertSmbSource()" class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500 text-sm">소스 저장</button>
            </div>
            <div class="flex gap-2 mb-3">
                <input id="smbSyncId" placeholder="source_id" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm w-32" />
                <button onclick="syncSmbSource()" class="px-3 py-1 rounded bg-indigo-600 hover:bg-indigo-500 text-sm">즉시 동기화</button>
                <button onclick="loadSmbSources()" class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500 text-sm">목록 조회</button>
            </div>
            <pre id="smbOutput" class="bg-gray-900 border border-gray-700 rounded p-3 text-xs overflow-auto"></pre>
        </div>

        <div id="panel-dbsources" class="panel hidden">
            <div class="grid md:grid-cols-2 gap-2 mb-2">
                <input id="dbName" placeholder="name" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm" />
                <input id="dbType" placeholder="db_type (mysql|oracle|postgresql|sqlite)" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm" />
                <input id="dbConn" placeholder="connection_url" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm" />
                <input id="dbTitleCol" placeholder="title_column (optional)" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm" />
                <input id="dbChunk" placeholder="chunk_size" value="500" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm" />
                <input id="dbSyncId" placeholder="source_id" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm" />
            </div>
            <textarea id="dbQuery" rows="3" placeholder="query_text" class="w-full bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm mb-3"></textarea>
            <div class="flex gap-2 mb-3">
                <button onclick="upsertDbSource()" class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500 text-sm">소스 저장</button>
                <button onclick="syncDbSource()" class="px-3 py-1 rounded bg-indigo-600 hover:bg-indigo-500 text-sm">즉시 동기화</button>
                <button onclick="loadDbSources()" class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500 text-sm">목록 조회</button>
            </div>
            <pre id="dbOutput" class="bg-gray-900 border border-gray-700 rounded p-3 text-xs overflow-auto"></pre>
        </div>

        <div id="panel-scheduler" class="panel hidden">
            <div class="flex gap-2 mb-3">
                <input id="schedulerInterval" type="number" min="10" value="120" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm w-32" />
                <button onclick="startScheduler()" class="px-3 py-1 rounded bg-green-600 hover:bg-green-500 text-sm">시작</button>
                <button onclick="stopScheduler()" class="px-3 py-1 rounded bg-red-600 hover:bg-red-500 text-sm">중지</button>
                <button onclick="loadSchedulerStatus()" class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500 text-sm">상태 조회</button>
            </div>
            <pre id="schedulerOutput" class="bg-gray-900 border border-gray-700 rounded p-3 text-xs overflow-auto"></pre>
        </div>

        <div id="panel-ssl" class="panel hidden">
            <div class="grid md:grid-cols-4 gap-2 mb-3">
                <input id="volumeName" placeholder="index_name" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm" />
                <input id="sslWarnDays" type="number" min="1" value="30" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm" />
                <input id="renewPath" value="scripts/renew_certs.ps1" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm" />
                <input id="renewRunPath" value="scripts/renew_certs.ps1" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm" />
            </div>
            <div class="flex gap-2 mb-3 flex-wrap">
                <button onclick="createVolume()" class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500 text-sm">볼륨 생성</button>
                <button onclick="scanCertificates()" class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500 text-sm">인증서 상태</button>
                <button onclick="generateRenewScript()" class="px-3 py-1 rounded bg-indigo-600 hover:bg-indigo-500 text-sm">갱신 스크립트 생성</button>
                <button onclick="runRenewScript()" class="px-3 py-1 rounded bg-indigo-600 hover:bg-indigo-500 text-sm">갱신 스크립트 실행</button>
            </div>
            <pre id="sslOutput" class="bg-gray-900 border border-gray-700 rounded p-3 text-xs overflow-auto"></pre>
        </div>
    </div>

    <script>
        const API = "https://127.0.0.1:8000/api/v1/admin";
        const SYS_API = "https://127.0.0.1:8000/api/v1/system";
        const AUTH_API = "https://127.0.0.1:8000/api/v1/auth";

        let accessToken = localStorage.getItem("cleversearch_admin_token") || "";
        let refreshToken = localStorage.getItem("cleversearch_admin_refresh_token") || "";
        let trendChart = null;
        let keywordChart = null;

        function getRole() {
            return document.getElementById("roleSelect").value || "viewer";
        }

        function updateAuthStatus() {
            const status = document.getElementById("authStatus");
            if (accessToken) {
                status.textContent = "JWT 모드";
                status.className = "pill";
            } else {
                status.textContent = "X-Role 모드";
                status.className = "pill";
            }
        }

        async function loginJwt() {
            const username = document.getElementById("loginUser").value;
            const password = document.getElementById("loginPass").value;
            const res = await fetch(`${AUTH_API}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });
            const payload = await res.json();
            if (res.ok && payload.access_token) {
                accessToken = payload.access_token;
                refreshToken = payload.refresh_token || "";
                localStorage.setItem("cleversearch_admin_token", accessToken);
                if (refreshToken) {
                    localStorage.setItem("cleversearch_admin_refresh_token", refreshToken);
                }
                updateAuthStatus();
                await loadDashboard();
            } else {
                alert("JWT 로그인 실패");
            }
        }

        async function refreshJwt() {
            if (!refreshToken) {
                alert("refresh token 없음");
                return;
            }
            const res = await fetch(`${AUTH_API}/refresh`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ refresh_token: refreshToken })
            });
            const payload = await res.json();
            if (res.ok && payload.access_token) {
                accessToken = payload.access_token;
                refreshToken = payload.refresh_token || refreshToken;
                localStorage.setItem("cleversearch_admin_token", accessToken);
                localStorage.setItem("cleversearch_admin_refresh_token", refreshToken);
                updateAuthStatus();
            } else {
                alert("토큰 갱신 실패");
            }
        }

        async function logoutJwt() {
            if (accessToken) {
                await fetch(`${AUTH_API}/logout`, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${accessToken}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ refresh_token: refreshToken || null })
                });
            }
            accessToken = "";
            refreshToken = "";
            localStorage.removeItem("cleversearch_admin_token");
            localStorage.removeItem("cleversearch_admin_refresh_token");
            updateAuthStatus();
        }

        async function apiFetch(url, options = {}) {
            const headers = {
                "Content-Type": "application/json",
                "X-Role": getRole(),
                ...(options.headers || {})
            };
            if (accessToken) {
                headers["Authorization"] = `Bearer ${accessToken}`;
            }
            const res = await fetch(url, { ...options, headers });
            const data = await res.json().catch(() => ({ raw: "json parse fail" }));
            return { ok: res.ok, status: res.status, data };
        }

        function fmt(v) { return (v === null || v === undefined || v === "") ? "-" : v; }
        function yesNo(v) { return v ? "Y" : "N"; }

        async function loadPopular() {
            const days = document.getElementById("popularDays").value || 7;
            const result = await apiFetch(`${API}/popular-keywords?days=${days}&limit=50`, { method: "GET" });
            const data = result.data;
            const body = document.getElementById("popularBody");
            body.innerHTML = (data || []).map((row, i) =>
                `<tr class="border-t border-gray-700"><td class="p-2">${i + 1}</td><td class="p-2">${fmt(row.keyword)}</td><td class="p-2">${fmt(row.count)}</td></tr>`
            ).join("") || '<tr><td class="p-2" colspan="3">데이터 없음</td></tr>';
        }

        async function loadDocs() {
            const result = await apiFetch(`${API}/indexed-documents?skip=0&limit=100`, { method: "GET" });
            const data = result.data;
            const items = data.items || [];
            const body = document.getElementById("docsBody");
            body.innerHTML = items.map((row) =>
                `<tr class="border-t border-gray-700"><td class="p-2">${fmt(row.id)}</td><td class="p-2">${fmt(row.title)}</td><td class="p-2">${fmt(row.origin_file)}</td><td class="p-2">${fmt(row.file_ext)}</td><td class="p-2">${fmt(row.doc_category)}</td><td class="p-2">${fmt(row.indexed_at)}</td><td class="p-2">${fmt(row.text_preview)}</td></tr>`
            ).join("") || '<tr><td class="p-2" colspan="7">데이터 없음</td></tr>';
        }

        async function loadLogs() {
            const result = await apiFetch(`${API}/search-logs?skip=0&limit=100`, { method: "GET" });
            const data = result.data;
            const items = data.items || [];
            const body = document.getElementById("logsBody");
            body.innerHTML = items.map((row) =>
                `<tr class="border-t border-gray-700"><td class="p-2">${fmt(row.id)}</td><td class="p-2">${fmt(row.user_id)}</td><td class="p-2">${fmt(row.query)}</td><td class="p-2">${fmt(row.total_hits)}</td><td class="p-2">${yesNo(row.is_failed)}</td><td class="p-2">${fmt(row.created_at)}</td></tr>`
            ).join("") || '<tr><td class="p-2" colspan="6">데이터 없음</td></tr>';
        }

        async function loadRecent() {
            const userId = document.getElementById("recentUserId").value.trim();
            const query = userId ? `?skip=0&limit=100&user_id=${encodeURIComponent(userId)}` : "?skip=0&limit=100";
            const result = await apiFetch(`${API}/recent-searches${query}`, { method: "GET" });
            const data = result.data;
            const items = data.items || [];
            const body = document.getElementById("recentBody");
            body.innerHTML = items.map((row) =>
                `<tr class="border-t border-gray-700"><td class="p-2">${fmt(row.id)}</td><td class="p-2">${fmt(row.user_id)}</td><td class="p-2">${fmt(row.query)}</td><td class="p-2">${fmt(row.created_at)}</td></tr>`
            ).join("") || '<tr><td class="p-2" colspan="4">데이터 없음</td></tr>';
        }

        async function loadFailed() {
            const days = document.getElementById("failedDays").value || 7;
            const result = await apiFetch(`${API}/failed-keywords?days=${days}&limit=50`, { method: "GET" });
            const data = result.data;
            const body = document.getElementById("failedBody");
            body.innerHTML = (data || []).map((row, i) =>
                `<tr class="border-t border-gray-700"><td class="p-2">${i + 1}</td><td class="p-2">${fmt(row.keyword)}</td><td class="p-2">${fmt(row.count)}</td></tr>`
            ).join("") || '<tr><td class="p-2" colspan="3">데이터 없음</td></tr>';
        }

        function setupTabs() {
            const tabs = document.querySelectorAll(".tab");
            const panels = document.querySelectorAll(".panel");
            tabs.forEach((tab) => {
                tab.addEventListener("click", () => {
                    tabs.forEach((x) => x.classList.remove("active"));
                    tab.classList.add("active");
                    const name = tab.dataset.tab;
                    panels.forEach((p) => p.classList.add("hidden"));
                    document.getElementById(`panel-${name}`).classList.remove("hidden");
                });
            });
        }

        function writeJson(id, payload) {
            document.getElementById(id).textContent = JSON.stringify(payload, null, 2);
        }

        function toggleDashboardDebug() {
            ["dashboardHealth", "dashboardSummary", "dashboardTrend"].forEach((id) => {
                document.getElementById(id).classList.toggle("hidden");
            });
        }

        function renderAlertBadges(rows) {
            const container = document.getElementById("alertBadges");
            const data = Array.isArray(rows) ? rows : [];
            container.innerHTML = data.map((row) => {
                const severity = row.severity || "info";
                const message = row.message || row.code || "알림";
                return `<span class="badge ${severity}">${message}</span>`;
            }).join("");
        }

        function drawTrendChart(trendRows) {
            const labels = (trendRows || []).map(row => row.date);
            const success = (trendRows || []).map(row => row.success || 0);
            const failed = (trendRows || []).map(row => row.failed || 0);
            const ctx = document.getElementById("trendChart").getContext("2d");
            if (trendChart) trendChart.destroy();
            trendChart = new Chart(ctx, {
                type: "bar",
                data: {
                    labels,
                    datasets: [
                        { label: "성공", data: success, backgroundColor: "rgba(34,197,94,0.7)" },
                        { label: "실패", data: failed, backgroundColor: "rgba(239,68,68,0.7)" }
                    ]
                },
                options: { responsive: true, plugins: { legend: { labels: { color: "#e5e7eb" } } }, scales: { x: { ticks: { color: "#9ca3af" } }, y: { ticks: { color: "#9ca3af" } } } }
            });
        }

        function drawKeywordChart(summary) {
            const rows = (summary?.top_keywords || []).slice(0, 5);
            const labels = rows.map(row => row.keyword);
            const values = rows.map(row => row.count);
            const ctx = document.getElementById("keywordChart").getContext("2d");
            if (keywordChart) keywordChart.destroy();
            keywordChart = new Chart(ctx, {
                type: "doughnut",
                data: { labels, datasets: [{ data: values, backgroundColor: ["#60a5fa", "#34d399", "#fbbf24", "#f87171", "#a78bfa"] }] },
                options: { plugins: { legend: { labels: { color: "#e5e7eb" } } } }
            });
        }

        async function loadDashboard() {
            const days = document.getElementById("dashboardDays").value || 7;
            const health = await apiFetch(`${SYS_API}/health/overview`, { method: "GET" });
            const summary = await apiFetch(`${SYS_API}/dashboard/summary?days=${days}`, { method: "GET" });
            const trend = await apiFetch(`${SYS_API}/dashboard/trend?days=${days}`, { method: "GET" });
            const alerts = await apiFetch(`${SYS_API}/dashboard/alerts?cert_warn_days=7&spike_ratio=1.5`, { method: "GET" });
            writeJson("dashboardHealth", health.data);
            writeJson("dashboardSummary", summary.data);
            writeJson("dashboardTrend", trend.data);
            renderAlertBadges(alerts.data || []);

            document.getElementById("mTotalLogs").innerText = String(summary.data?.total_logs || 0);
            document.getElementById("mFailedLogs").innerText = String(summary.data?.failed_logs || 0);
            document.getElementById("mFailureRate").innerText = `${((summary.data?.failure_rate || 0) * 100).toFixed(1)}%`;
            document.getElementById("mScheduler").innerText = (health.data?.scheduler?.running ? "running" : "stopped");

            drawTrendChart(trend.data || []);
            drawKeywordChart(summary.data || {});
        }

        async function runSmokeFromUI() {
            const result = await apiFetch(`${SYS_API}/ops/run-smoke-test`, { method: "POST" });
            writeJson("smokeOutput", result.data || result);
        }

        async function upsertDictionaryEntry() {
            const dictType = document.getElementById("dictType").value;
            const term = document.getElementById("dictTerm").value;
            const replacement = document.getElementById("dictReplacement").value;
            const result = await apiFetch(`${SYS_API}/dictionary/entry?dict_type=${encodeURIComponent(dictType)}&term=${encodeURIComponent(term)}&replacement=${encodeURIComponent(replacement)}`, {
                method: "POST"
            });
            writeJson("dictionaryOutput", result);
        }

        async function loadDictionaryEntries() {
            const result = await apiFetch(`${SYS_API}/dictionary/entries?active_only=true`, { method: "GET" });
            writeJson("dictionaryOutput", result.data);
        }

        async function upsertSmbSource() {
            const payload = {
                name: document.getElementById("smbName").value,
                share_path: document.getElementById("smbPath").value,
                username: document.getElementById("smbUser").value || null,
                password: document.getElementById("smbPass").value || null,
                is_active: true
            };
            const result = await apiFetch(`${SYS_API}/smb/sources`, { method: "POST", body: JSON.stringify(payload) });
            writeJson("smbOutput", result);
        }

        async function loadSmbSources() {
            const result = await apiFetch(`${SYS_API}/smb/sources?active_only=false`, { method: "GET" });
            writeJson("smbOutput", result.data);
        }

        async function syncSmbSource() {
            const sourceId = document.getElementById("smbSyncId").value;
            const result = await apiFetch(`${SYS_API}/smb/sources/${sourceId}/sync?max_files=200`, { method: "POST" });
            writeJson("smbOutput", result);
        }

        async function upsertDbSource() {
            const payload = {
                name: document.getElementById("dbName").value,
                db_type: document.getElementById("dbType").value,
                connection_url: document.getElementById("dbConn").value,
                query_text: document.getElementById("dbQuery").value,
                title_column: document.getElementById("dbTitleCol").value || null,
                chunk_size: Number(document.getElementById("dbChunk").value || 500),
                is_active: true
            };
            const result = await apiFetch(`${SYS_API}/db/sources`, { method: "POST", body: JSON.stringify(payload) });
            writeJson("dbOutput", result);
        }

        async function loadDbSources() {
            const result = await apiFetch(`${SYS_API}/db/sources?active_only=false`, { method: "GET" });
            writeJson("dbOutput", result.data);
        }

        async function syncDbSource() {
            const sourceId = document.getElementById("dbSyncId").value;
            const result = await apiFetch(`${SYS_API}/db/sources/${sourceId}/sync?max_rows=1000`, { method: "POST" });
            writeJson("dbOutput", result);
        }

        async function startScheduler() {
            const interval = Number(document.getElementById("schedulerInterval").value || 120);
            const result = await apiFetch(`${SYS_API}/scheduler/start?interval_seconds=${interval}`, { method: "POST" });
            writeJson("schedulerOutput", result);
        }

        async function stopScheduler() {
            const result = await apiFetch(`${SYS_API}/scheduler/stop`, { method: "POST" });
            writeJson("schedulerOutput", result);
        }

        async function loadSchedulerStatus() {
            const result = await apiFetch(`${SYS_API}/scheduler/status`, { method: "GET" });
            writeJson("schedulerOutput", result.data);
        }

        async function createVolume() {
            const indexName = document.getElementById("volumeName").value || "cleversearch-volume-ui";
            const payload = { index_name: indexName, shards: 1, replicas: 1 };
            const result = await apiFetch(`${SYS_API}/volume/create`, { method: "POST", body: JSON.stringify(payload) });
            writeJson("sslOutput", result);
        }

        async function scanCertificates() {
            const warnDays = Number(document.getElementById("sslWarnDays").value || 30);
            const result = await apiFetch(`${SYS_API}/ssl/certificates?cert_dir=cert&warn_days=${warnDays}`, { method: "GET" });
            writeJson("sslOutput", result.data);
        }

        async function generateRenewScript() {
            const path = document.getElementById("renewPath").value || "scripts/renew_certs.ps1";
            const result = await apiFetch(`${SYS_API}/ssl/renew-script?output_path=${encodeURIComponent(path)}`, { method: "POST" });
            writeJson("sslOutput", result);
        }

        async function runRenewScript() {
            const path = document.getElementById("renewRunPath").value || "scripts/renew_certs.ps1";
            const result = await apiFetch(`${SYS_API}/ssl/renew-run`, { method: "POST", body: JSON.stringify({ script_path: path }) });
            writeJson("sslOutput", result);
        }

        setupTabs();
        updateAuthStatus();
        loadDashboard();
        loadDictionaryEntries();
        loadSmbSources();
        loadDbSources();
        loadSchedulerStatus();
        scanCertificates();
        loadPopular();
        loadDocs();
        loadLogs();
        loadRecent();
        loadFailed();
    </script>
</body>
</html>
