<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HanSeek - 프리미엄 통합검색</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        mark { background-color: #fef08a; color: #b91c1c; font-weight: bold; padding: 0 2px; border-radius: 2px; }
        body.has-results .main-wrapper { padding-top: 2rem; justify-content: flex-start; min-height: auto; }
        body:not(.has-results) .main-wrapper { min-height: 80vh; display: flex; flex-direction: column; justify-content: center; }
        .filter-btn.active { background-color: #3b82f6; color: white; border-color: #3b82f6; }
        /* 탭 스크롤바 숨기기 */
        #categoryTabs::-webkit-scrollbar { display: none; }
        #categoryTabs { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#202124] text-gray-100 min-h-screen">

    <div class="main-wrapper max-w-5xl mx-auto px-4 transition-all duration-500">
        <div class="text-center mb-6" id="headerArea">
            <h1 class="text-5xl font-bold mb-8 cursor-pointer tracking-tight" onclick="location.reload()">
                <span class="text-blue-500">Han</span><span class="text-white">Seek</span>
            </h1>
            
            <div class="relative w-full max-w-2xl mx-auto group">
                <div class="search-container flex items-center bg-[#303134] rounded-full border border-[#5f6368] px-5 py-3 shadow-sm focus-within:shadow-lg transition-all">
                    <i class="fas fa-search text-gray-400 mr-3"></i>
                    <input type="text" id="searchInput" class="flex-1 bg-transparent border-none text-white focus:outline-none text-lg" placeholder="검색어 입력..." autocomplete="off">
                    <button onclick="performSearch()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full font-medium ml-2 transition">검색</button>
                </div>
                <div id="autocompleteList" class="absolute top-full left-0 w-full bg-[#303134] border border-[#5f6368] rounded-b-2xl shadow-xl z-50 hidden overflow-hidden mt-1 text-left"></div>
            </div>

            <div id="trendingSection" class="mt-4 text-sm text-gray-400">
                인기 검색어: 
                <span class="inline-flex gap-2 ml-2" id="popularTags">
                    <button onclick="quickSearch('지능')" class="hover:text-blue-400">#지능</button>
                    <button onclick="quickSearch('계획서')" class="hover:text-blue-400">#계획서</button>
                    <button onclick="quickSearch('연구')" class="hover:text-blue-400">#연구</button>
                </span>
            </div>
        </div>

        <div id="categoryTabs" class="hidden max-w-3xl mx-auto mb-4 flex gap-6 text-sm text-gray-400 border-b border-gray-700 overflow-x-auto">
            <button onclick="filterCategory('all')" class="category-tab pb-2 border-b-2 border-blue-500 text-blue-500 font-bold" id="tab-all">전체</button>
            <button onclick="filterCategory('PLAN')" class="category-tab pb-2 border-b-2 border-transparent hover:text-white" id="tab-PLAN">사업계획서 <span class="text-xs opacity-60" id="count-PLAN"></span></button>
            <button onclick="filterCategory('REPORT')" class="category-tab pb-2 border-b-2 border-transparent hover:text-white" id="tab-REPORT">결과보고서 <span class="text-xs opacity-60" id="count-REPORT"></span></button>
            <button onclick="filterCategory('RULE')" class="category-tab pb-2 border-b-2 border-transparent hover:text-white" id="tab-RULE">사내규정 <span class="text-xs opacity-60" id="count-RULE"></span></button>
        </div>

        <div id="filterArea" class="hidden max-w-3xl mx-auto mb-6 flex flex-wrap gap-3 border-b border-gray-700 pb-4">
            <select id="dateFilter" class="bg-[#303134] border border-[#5f6368] rounded px-3 py-1 text-sm focus:outline-none">
                <option value="all">전체 기간</option>
                <option value="1d">최근 24시간</option>
                <option value="1w">최근 1주일</option>
                <option value="1m">최근 1개월</option>
            </select>
            <select id="extFilter" class="bg-[#303134] border border-[#5f6368] rounded px-3 py-1 text-sm focus:outline-none">
                <option value="all">모든 파일</option>
                <option value="pdf">PDF 문서</option>
                <option value="docx">Word 문서</option>
                <option value="hwp">한글(HWP)</option>
            </select>
        </div>

        <div id="resultCount" class="mb-4 text-gray-400 text-sm hidden max-w-3xl mx-auto text-left">
            약 <span id="countNumber" class="text-blue-400 font-bold">0</span>개의 결과가 검색되었습니다.
        </div>
        <div id="resultList" class="space-y-6 max-w-3xl mx-auto pb-20 text-left"></div>
    </div>

    <script>
        const API_BASE = "https://127.0.0.1:8000/api/v1/search";
        const FILE_BASE = "https://127.0.0.1:8000/api/v1/file";

        async function loadPopularTags() {
            try {
                const response = await fetch(`${API_BASE}/popular`);
                const tags = await response.json();
                const container = document.getElementById('popularTags');
                
                if (tags && tags.length > 0) {
                    container.innerHTML = tags.map(tag => 
                        `<button onclick="quickSearch('${tag}')" class="hover:text-blue-400">#${tag}</button>`
                    ).join('');
                }
            } catch (error) {
                console.error("인기 검색어 로드 실패:", error);
            }
        }

        // 페이지 로드 시 즉시 실행하도록 이벤트 등록
        window.addEventListener('DOMContentLoaded', loadPopularTags);        

        const searchInput = document.getElementById('searchInput');
        const autocompleteList = document.getElementById('autocompleteList');
        const resultList = document.getElementById('resultList');
        const resultCount = document.getElementById('resultCount');
        const filterArea = document.getElementById('filterArea');

        // [추가] 카테고리 상태 관리 변수
        let currentCategory = 'all';

        // [기능 1] 자동완성
        searchInput.addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            if (query.length < 1) { autocompleteList.classList.add('hidden'); return; }
            try {
                const response = await fetch(`${API_BASE}/autocomplete?q=${encodeURIComponent(query)}`);
                const suggestions = await response.json();
                if (suggestions.length > 0) {
                    autocompleteList.innerHTML = suggestions.map(item => `
                        <div class="px-5 py-3 hover:bg-[#3c4043] cursor-pointer text-gray-200" onclick="selectSuggestion('${item}')">
                            <i class="fas fa-history text-gray-500 mr-3 text-xs"></i><span>${item}</span>
                        </div>
                    `).join('');
                    autocompleteList.classList.remove('hidden');
                } else { autocompleteList.classList.add('hidden'); }
            } catch (error) { console.error(error); }
        });

        function selectSuggestion(text) {
            searchInput.value = text;
            autocompleteList.classList.add('hidden');
            performSearch();
        }

        function quickSearch(text) {
            searchInput.value = text;
            performSearch();
        }

        // [추가] 카테고리 탭 클릭 함수
        function filterCategory(category) {
            currentCategory = category;
            
            // UI 탭 활성화 변경
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.classList.remove('border-blue-500', 'text-blue-500', 'font-bold');
                tab.classList.add('border-transparent');
            });
            const activeTab = document.getElementById(`tab-${category}`);
            if (activeTab) activeTab.classList.add('border-blue-500', 'text-blue-500', 'font-bold');
            
            performSearch(); 
        }

        // [수정] 통합 검색 실행 (카테고리 필터 및 통계 연동)
        async function performSearch() {
            const query = searchInput.value.trim();
            if (!query) return;

            const dateRange = document.getElementById('dateFilter').value;
            const fileExt = document.getElementById('extFilter').value;

            let startDate = null;
            if (dateRange !== 'all') {
                const now = new Date();
                if (dateRange === '1d') now.setDate(now.getDate() - 1);
                else if (dateRange === '1w') now.setDate(now.getDate() - 7);
                else if (dateRange === '1m') now.setMonth(now.getMonth() - 1);
                startDate = now.toISOString();
            }

            document.body.classList.add('has-results');
            filterArea.classList.remove('hidden');
            resultList.innerHTML = '<div class="text-center py-20 text-blue-400 animate-pulse">필터를 적용하여 분석 중...</div>';

            try {
                const response = await fetch(`${API_BASE}/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: query,
                        include_keywords: [],
                        exclude_keywords: [],
                        start_date: startDate,
                        file_ext: fileExt === 'all' ? null : fileExt,
                        doc_category: currentCategory === 'all' ? null : currentCategory, // [카테고리 전송]
                        size: 20
                    })
                });

                const data = await response.json();

                // [카테고리 탭 노출 및 통계 업데이트]
                document.getElementById('categoryTabs').classList.remove('hidden');
                if (data.category_stats) {
                    document.getElementById('count-PLAN').innerText = data.category_stats['PLAN'] || 0;
                    document.getElementById('count-REPORT').innerText = data.category_stats['REPORT'] || 0;
                    document.getElementById('count-RULE').innerText = data.category_stats['RULE'] || 0;
                }

                renderResults(data);
            } catch (error) {
                resultList.innerHTML = `<div class="text-center py-10 text-red-400">오류: ${error.message}</div>`;
            }
        }
        async function checkFailedSearch() {
            try {
                console.log("🔍 실패 로그 분석 시도 중..."); // 실행 확인용
                const res = await fetch(`${API_BASE}/failed-analysis`);
                
                if (!res.ok) throw new Error(`HTTP 에러! 상태: ${res.status}`);
                
                const data = await res.json();
                console.log("📥 서버에서 받은 데이터:", data); // 데이터 확인용

                if (Array.isArray(data) && data.length > 0) {
                    console.log("⚠️ 관리자 분석: 검색 결과가 없어 실패한 키워드들:", data);
                } else {
                    console.log("ℹ️ 아직 실패한 검색 기록이 없습니다.");
                }
            } catch (e) {
                console.error("❌ 실패 로그 분석 호출 실패:", e);
            }
        }

        // 페이지 로드 시 혹은 검색 직후에 실행되도록 설정
        window.addEventListener('DOMContentLoaded', checkFailedSearch);

        function renderResults(data) {
            resultCount.classList.remove('hidden');
            document.getElementById('countNumber').innerText = data.total || 0;
            resultList.innerHTML = '';

            if (!data.items || data.items.length === 0) {
                resultList.innerHTML = '<div class="text-center py-20 text-gray-500 font-light text-xl">일치하는 문서를 찾지 못했습니다.</div>';
                return;
            }

            data.items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'group bg-[#303134] p-6 rounded-xl border border-[#5f6368] hover:border-blue-500 transition-all shadow-md mb-4';
                
                card.onclick = () => {
                    const fileId = item.id;
                    window.open(`${FILE_BASE}/download/${fileId}`, '_blank');
                };

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex-1">
                            <div class="text-xs font-bold text-blue-300 bg-blue-900/40 px-2 py-1 rounded inline-block mb-2">
                                <i class="far fa-file-alt mr-1"></i> ${item.location}
                            </div>
                            <h3 class="text-xl text-[#8ab4f8] group-hover:underline font-medium cursor-pointer">
                                ${item.content.Title || item.content.origin_file}
                            </h3>
                        </div>
                        <button class="text-gray-500 hover:text-white transition px-2 py-1">
                            <i class="fas fa-ellipsis-v"></i>
                        </button>
                    </div>
                    <p class="text-gray-300 text-sm leading-relaxed mb-4">${item.summary}</p>
                    <div class="flex items-center gap-4 text-[11px] text-gray-500 border-t border-gray-700 pt-3">
                        <span><i class="far fa-hdd mr-1"></i> ${item.content.origin_file}</span>
                        <span><i class="far fa-calendar-alt mr-1"></i> ${item.indexed_at ? item.indexed_at.substring(0,10) : '2026.01.20'}</span>
                        <span class="ml-auto bg-gray-800 px-2 py-0.5 rounded italic">Score: ${item.score.toFixed(2)}</span>
                    </div>
                `;
                resultList.appendChild(card);
            });
        }

        // 필터 변경 감지 이벤트
        document.getElementById('dateFilter').addEventListener('change', performSearch);
        document.getElementById('extFilter').addEventListener('change', performSearch);

        // 엔터키 처리 및 외부 클릭 제어
        searchInput.addEventListener('keyup', (e) => { if (e.key === 'Enter') performSearch(); });
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.group')) autocompleteList.classList.add('hidden');
        });
    </script>
</body>
</html>
