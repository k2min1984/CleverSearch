name: upload-security-regression

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  upload-security-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run upload security regression tests
        run: |
          pytest -q tests/test_upload_security_regression.py tests/test_auth_security.py tests/test_csrf_cookie_protection.py
